          <td className="px-4 py-3 text-center"><StatusPill st={p.status}/></td>
          <td className="px-4 py-3"><div className="flex items-center justify-end gap-1">
            <button onClick={()=>onVer(p)} title="Abrir" className="p-1.5 text-slate-400 hover:text-slate-700"><Search size={15}/></button>
            <button onClick={()=>onEditar(p)} title="Alterar" className="p-1.5 text-slate-400 hover:text-slate-700"><Pencil size={15}/></button>
            <button onClick={()=>onExcluir(p)} title="Excluir" className="p-1.5 text-slate-400 hover:text-rose-500"><Trash2 size={15}/></button>
          </div></td></tr>)}</tbody>
      </table> : <Empty texto="Nenhuma proposta. Clique em “Nova proposta”."/>}
    </Card>
  </div>;
}
function StatusPill({st}){ const m={Rascunho:"bg-slate-100 text-slate-600",Enviada:"bg-teal-50 text-teal-700",Fechada:"text-white",Perdida:"bg-rose-50 text-rose-600"};
  return <span className={"px-2.5 py-1 rounded-full text-xs font-medium "+(m[st]||m.Rascunho)} style={st==="Fechada"?{backgroundColor:C.navy}:{}}>{st}</span>; }

// Consulta dados cadastrais do CNPJ na Receita Federal (via provedores públicos).
async function buscarCNPJ(limpo){
  const norm=(o)=>o; // placeholder
  // 1) BrasilAPI
  try{
    const r=await fetch("https://brasilapi.com.br/api/cnpj/v1/"+limpo);
    if(r.ok){ const d=await r.json();
      return {
        razao:d.razao_social||d.nome_fantasia||"",
        fantasia:d.nome_fantasia||"",
        endereco:[d.descricao_tipo_de_logradouro,d.logradouro,d.numero,d.complemento,d.bairro,d.municipio,d.uf,d.cep].filter(Boolean).join(", "),
        telefone:d.ddd_telefone_1||"",
      };
    }
  }catch(e){}
  // 2) publica.cnpj.ws (CORS habilitado)
  try{
    const r=await fetch("https://publica.cnpj.ws/cnpj/"+limpo);
    if(r.ok){ const d=await r.json(); const e=d.estabelecimento||{};
      return {
        razao:d.razao_social||(e.nome_fantasia||""),
        fantasia:e.nome_fantasia||"",
        endereco:[e.tipo_logradouro,e.logradouro,e.numero,e.complemento,e.bairro,(e.cidade&&e.cidade.nome),(e.estado&&e.estado.sigla),e.cep].filter(Boolean).join(", "),
        telefone:[e.ddd1,e.telefone1].filter(Boolean).join(" "),
      };
    }
  }catch(e){}
  throw new Error("indisponível");
}

// Máscara CNPJ: XX.XXX.XXX/XXXX-XX (apenas dígitos)
function maskCNPJ(v){
  const d=(v||"").replace(/\D/g,"").slice(0,14);
  let o=d.slice(0,2);
  if(d.length>2) o+="."+d.slice(2,5);
  if(d.length>5) o+="."+d.slice(5,8);
  if(d.length>8) o+="/"+d.slice(8,12);
  if(d.length>12) o+="-"+d.slice(12,14);
  return o;
}
// Máscara CPF: XXX.XXX.XXX-XX (apenas dígitos)
function maskCPF(v){
  const d=(v||"").replace(/\D/g,"").slice(0,11);
  let o=d.slice(0,3);
  if(d.length>3) o+="."+d.slice(3,6);
  if(d.length>6) o+="."+d.slice(6,9);
  if(d.length>9) o+="-"+d.slice(9,11);
  return o;
}
// Máscara Telefone: (XX) X XXXX-XXXX (apenas dígitos)
function maskTel(v){
  const d=(v||"").replace(/\D/g,"").slice(0,11);
  if(d.length===0) return "";
  if(d.length<3) return "("+d;
  let o="("+d.slice(0,2)+")";
  if(d.length>=3) o+=" "+d.slice(2,3);
  if(d.length>3) o+=" "+d.slice(3,7);
  if(d.length>7) o+="-"+d.slice(7,11);
  return o;
}

function PropEditor({me, sind, uniformes, empresas, cndEmpresa, propEdit, clientes, saveClientes, onCancel, onSalvar, extra=false}){
  const isExtra = !!(propEdit ? propEdit.extra : extra);
  const [regiao,setRegiao]=useState(propEdit?.regiao || "FPOLIS");
  const [segAtual,setSegAtual]=useState(propEdit?.segmento && propEdit.segmento!=="misto" ? propEdit.segmento : "asseio");
  const [cnpj,setCnpj]=useState(maskCNPJ(propEdit?.clienteCnpj||""));
  const [razao,setRazao]=useState(propEdit?.razaoSocial||"");
  const [endereco,setEndereco]=useState(propEdit?.endereco||"");
  const [sindico,setSindico]=useState(propEdit?.sindicoNome||"");
  const [cpf,setCpf]=useState(maskCPF(propEdit?.sindicoCpf||""));
  const [tel,setTel]=useState(maskTel(propEdit?.sindicoTel||""));
  const [meses,setMeses]=useState(propEdit?.meses||12);
  const [itens,setItens]=useState(propEdit? propEdit.itens.map(it=>({segmento: it.segmento||propEdit.segmento||"asseio", tab:it.tab, qtd:it.qtd, insMax:!!it.insMax, gratOn:!!it.gratOn, gratTipo:it.gratTipo||"assid", gratValor:it.gratValor||""})) : []);
  const [materiais,setMateriais]=useState(propEdit?.materiais? propEdit.materiais.map(m=>({desc:m.desc||"", total:m.total||"", meses:m.meses||""})) : []);
  const [altAdm,setAltAdm]=useState(propEdit?.precoAlt?.admPct!=null? String(propEdit.precoAlt.admPct) : "");
  const [altLucro,setAltLucro]=useState(propEdit?.precoAlt?.lucroPct!=null? String(propEdit.precoAlt.lucroPct) : "");
  const [buscaCnpj,setBuscaCnpj]=useState(false); const [erroCnpj,setErroCnpj]=useState("");

  const addMat=()=> setMateriais([...materiais,{desc:"",total:"",meses:""}]);
  const rmMat=(i)=> setMateriais(materiais.filter((_,x)=>x!==i));
  const upMat=(i,patch)=> setMateriais(materiais.map((m,x)=>x===i?{...m,...patch}:m));
  const matMensalTotal = materiais.reduce((s,m)=>{ const t=parseFloat(String(m.total).replace(",","."))||0; const me_=parseInt(m.meses)||0; return s + (me_>0? t/me_ : 0); },0);

  const SEGNOME={asseio:"Asseio", vigilancia:"Vigilância"};
  const exOf=(s)=>{ const l=sind[s]||[]; return l[l.length-1]; };
  const funcoesOf=(s)=> (exOf(s)?.regioes?.[regiao]?.funcoes)||[];
  const salOf=(s,tab)=>{ const f=funcoesOf(s).find(f=>f.tab===tab); return f?f.sal:undefined; };
  const empresaIdDe=(s,tab)=>{ const f=funcoesOf(s).find(f=>f.tab===tab); return (f&&f.empresaId) || empresaDefaultDe(tab); };
  const cndMap = cndEmpresa || CND_EMPRESA_SEED;

  const funcoesAtual = funcoesOf(segAtual);
  const semFuncoesAtual = funcoesAtual.length===0;

  const consultarCnpj=async()=>{
    const limpo=cnpj.replace(/\D/g,""); if(limpo.length!==14){setErroCnpj("CNPJ deve ter 14 dígitos.");return;}
    setBuscaCnpj(true); setErroCnpj("");
    try{
      const d=await buscarCNPJ(limpo);
      setRazao(d.razao||""); setEndereco(d.endereco||"");
      if(d.telefone && !tel) setTel(maskTel(d.telefone));
      if(!d.razao) setErroCnpj("CNPJ consultado, mas sem razão social retornada.");
    }catch{ setErroCnpj("Não foi possível consultar a Receita agora (verifique a conexão). Preencha manualmente."); }
    setBuscaCnpj(false);
  };

  const addItem=()=>{ const fs=funcoesOf(segAtual); if(!fs.length) return; setItens([...itens,{segmento:segAtual, tab:fs[0].tab, qtd:1, insMax:false, gratOn:false, gratTipo:"assid", gratValor:""}]); };
  const rmItem=(i)=> setItens(itens.filter((_,x)=>x!==i));
  const upItem=(i,patch)=> setItens(itens.map((it,x)=>x===i?{...it,...patch}:it));
  const ehServenteOuAsg=(tab)=> /^(servente|asg)\b/i.test(tab||"");

  const totalPostos = itens.reduce((s,it)=>s+(parseInt(it.qtd)||0),0);
  const maqShare = totalPostos>0 ? ADICIONAL_PADRAO/totalPostos : 0;
  const matShare = totalPostos>0 ? matMensalTotal/totalPostos : 0;   // materiais específicos rateados por posto

  // Solicitação de Alteração de Preços — sobrescreve % do Quadro V (Linha A adm / Linha B lucro)
  const baseAL = isExtra ? (EXTRA_ADMLUCRO[regiao]||SEED[regiao].admLucro) : SEED[regiao].admLucro;
  const admDef = baseAL[0], lucroDef = baseAL[1];
  const admDefPct = +(admDef*100).toFixed(4), lucroDefPct = +(lucroDef*100).toFixed(4);
  const admOverPct = String(altAdm).trim()!==""? parseFloat(String(altAdm).replace(",","."))/100 : null;
  const lucroOverPct = String(altLucro).trim()!==""? parseFloat(String(altLucro).replace(",","."))/100 : null;
  const haAlt = admOverPct!=null || lucroOverPct!=null;
  const admUse = admOverPct!=null? admOverPct : admDef;
  const lucroUse = lucroOverPct!=null? lucroOverPct : lucroDef;
  const prodUse = (1+admUse)*(1+lucroUse), prodDef = (1+admDef)*(1+lucroDef);
  const ehReducao = haAlt && prodUse < prodDef - 1e-9;
  const ehAumento = haAlt && prodUse > prodDef + 1e-9;

  const uniDataRef = propEdit?.uniformeVigencia || today();   // edição usa a vigência salva; nova usa hoje
  const calculo = useMemo(()=>{
    const linhas = itens.map(it=>{
      const prof = SEED[regiao].funcoes.find(f=>f.t===it.tab);
      if(!prof) return null;
      const sa = salOf(it.segmento, it.tab);
      const salAtual = (sa==null) ? prof.sal : sa;
      const over = { unif: uniformeDeFuncao(uniformes, it.tab, uniDataRef), matShare };
      if(salAtual!==prof.sal) over.sal=salAtual;
      if(it.insMax && ehServenteOuAsg(it.tab)) over.insPct=0.40;
      if(haAlt){ over.adm=admUse; over.lucro=lucroUse; }
      const gv = parseFloat(String(it.gratValor).replace(",","."))||0;
      if(it.gratOn && gv>0){ over.gratTipo = it.gratTipo==="va"?"va":"assid"; over.gratValor = gv; }
      const comp = computePosto(prof, regiao, maqShare, over);
      const qtd=parseInt(it.qtd)||0;
      const exx=exOf(it.segmento);
      return { segmento:it.segmento, tab:it.tab, qtd, empresaId:empresaIdDe(it.segmento,it.tab), insMax:!!it.insMax, gratOn:!!it.gratOn, gratTipo:it.gratTipo, gratValor:gv, comp, exercicio:exx&&exx.exercicio, vigencia:exx&&exx.vigenciaInicio, mensalPosto:comp.p1, mensalLinha:comp.p1*qtd, globalLinha:comp.p1*qtd*meses };
    }).filter(Boolean);
    const valorMensalTotal = linhas.reduce((s,l)=>s+l.mensalLinha,0);
    return { linhas, valorMensalTotal, valorGlobal:valorMensalTotal*meses };
  },[itens, regiao, meses, maqShare, matShare, uniformes, uniDataRef, haAlt, admUse, lucroUse]);

  const segmentos = [...new Set(calculo.linhas.map(l=>l.segmento))];
  // Empresas presentes (via cargo→empresa) e CND's competentes (empresa→CND)
  const empresasIds = [...new Set(calculo.linhas.map(l=>l.empresaId).filter(Boolean))];
  const cndGrupos = ["asseio","vigilancia"].filter(g=> empresasIds.includes(cndMap[g]));
  const prestadoras = empresasIds.map(id=>{ const e=empById(empresas,id); return e? {id:e.id, razaoSocial:e.razaoSocial, fantasia:e.fantasia, cnpj:e.cnpj, regime:e.regime, diretor:e.diretor, cargo:e.cargo, endereco:e.endereco, numero:e.numero, bairro:e.bairro, municipio:e.municipio, estado:e.estado, cep:e.cep} : null; }).filter(Boolean);

  // Campos livres, exceto Razão Social (obrigatória) e ao menos um posto
  const podeSalvar = calculo.linhas.length>0 && totalPostos>0 && !!razao.trim();

  const salvar=()=>{
    if(!podeSalvar) return;
    const numero = propEdit?.numero || ("PROP-"+new Date().getFullYear()+"-"+String(Math.floor(Math.random()*9000+1000)));
    const primeiro = exOf(segmentos[0]);
    // metadados da Solicitação de Alteração de Preços
    let precoAlt=null, precoAltTipo, precoAltAuth, precoAltAutorizadoPor, precoAltAutorizadoEm;
    if(haAlt){
      precoAlt = { admPct:+(admUse*100).toFixed(4), lucroPct:+(lucroUse*100).toFixed(4), admDec:admUse, lucroDec:lucroUse, admPadraoPct:admDefPct, lucroPadraoPct:lucroDefPct };
      if(ehReducao){
        precoAltTipo="reducao";
        const igual = propEdit?.precoAlt && propEdit?.precoAltAuth==="autorizado"
          && Math.abs((propEdit.precoAlt.admDec??-1)-admUse)<1e-9 && Math.abs((propEdit.precoAlt.lucroDec??-1)-lucroUse)<1e-9;
        precoAltAuth = igual ? "autorizado" : "rascunho";  // só vira "pendente" quando o consultor clicar em Solicitar Autorização
        if(igual){ precoAltAutorizadoPor=propEdit.precoAltAutorizadoPor; precoAltAutorizadoEm=propEdit.precoAltAutorizadoEm; }
      } else {
        precoAltTipo="aumento"; precoAltAuth="liberado";
      }
    }
    const p={ id:propEdit?.id || uid(), numero, criadoEm:propEdit?.criadoEm || today(), extra:isExtra,
      clienteCnpj:cnpj, razaoSocial:razao, endereco, sindicoNome:sindico, sindicoCpf:cpf, sindicoTel:tel,
      regiao, meses, consultorId:propEdit?.consultorId || me.id, consultorNome:propEdit?.consultorNome || me.nome,
      segmento: segmentos.length===1?segmentos[0]:"misto", segmentos, cndVinculo: cndGrupos[0], cndGrupos,
      empresas: empresasIds, prestadoras,
      exercicioRef: primeiro&&primeiro.exercicio, vigenciaRef: primeiro&&primeiro.vigenciaInicio, adicional:ADICIONAL_PADRAO, maqShare,
      materiais: materiais.map(m=>({desc:m.desc, total:parseFloat(String(m.total).replace(",","."))||0, meses:parseInt(m.meses)||0})).filter(m=>m.total>0&&m.meses>0),
      materialMensal: matMensalTotal,
      uniformeVigencia: (versaoUni(uniformes, uniDataRef)||{}).vigencia,
      precoAlt, precoAltTipo, precoAltAuth, precoAltAutorizadoPor, precoAltAutorizadoEm,
      itens:calculo.linhas.map(l=>({segmento:l.segmento, tab:l.tab, qtd:l.qtd, empresaId:l.empresaId, insMax:l.insMax, gratOn:l.gratOn, gratTipo:l.gratTipo, gratValor:l.gratValor, comp:l.comp, exercicio:l.exercicio, mensalPosto:l.mensalPosto, mensalLinha:l.mensalLinha})),
      valorMensalTotal:calculo.valorMensalTotal, valorGlobal:calculo.valorGlobal, status:propEdit?.status || "Rascunho",
      atualizadoEm: propEdit? today() : undefined,
    };
    if(cnpj && !clientes.find(c=>c.cnpj===cnpj)) saveClientes([...clientes,{cnpj, razao, endereco}]);
    onSalvar(p);
  };

  const ast = null;
  const ring=()=> inputCls;

  return <div>
    <Header title={propEdit?`Alterar proposta ${propEdit.numero}${isExtra?" · Extra":""}`:(isExtra?"Nova proposta Extra":"Nova proposta")} sub={`${isExtra?"Base Quadro V "+(regiao==="FPOLIS"?"9%/9%":"10%/10%")+" · ":""}${segmentos.length>1?"Multi-segmento (Asseio + Vigilância)":SEGNOME[segAtual]} · ${regiao==="FPOLIS"?"Florianópolis":"Litoral Norte"} · consultor ${me.nome.split(" ")[0]}`}
      right={<div className="flex gap-2"><Btn variant="ghost" onClick={onCancel}>Cancelar</Btn><Btn onClick={salvar} disabled={!podeSalvar}><Save size={16}/>{propEdit?"Salvar alterações":"Gerar e salvar"}</Btn></div>}/>

    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div className="lg:col-span-2 space-y-4">
        <Card className="p-4">
          <div className="text-sm font-semibold text-slate-700 mb-3">Cliente</div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div className="sm:col-span-2"><Field label={<>CNPJ{ast}</>}>
              <div className="flex gap-2">
                <input className={ring(cnpj.replace(/\D/g,"").length!==14)} value={cnpj} onChange={e=>setCnpj(maskCNPJ(e.target.value))} inputMode="numeric" placeholder="00.000.000/0000-00"/>
                <Btn variant="soft" onClick={consultarCnpj} disabled={buscaCnpj}><Search size={15}/>{buscaCnpj?"…":"Buscar"}</Btn>
              </div></Field></div>
            <Field label="Região / tabela">
              <select value={regiao} onChange={e=>{setRegiao(e.target.value);setItens([]);}} className={inputCls}>
                <option value="FPOLIS">Grande Fpolis</option><option value="BC">Litoral Norte</option></select></Field>
          </div>
          {erroCnpj && <div className="text-xs text-amber-600 mt-2">{erroCnpj}</div>}
          <div className="grid grid-cols-1 gap-3 mt-3">
            <Field label={<>Razão social <span className="text-rose-500">*</span></>}><input className={ring(!razao.trim())} value={razao} onChange={e=>setRazao(e.target.value)} placeholder="Obrigatório"/></Field>
            <Field label={<>Endereço{ast}</>}><input className={ring(!endereco.trim())} value={endereco} onChange={e=>setEndereco(e.target.value)}/></Field>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-3">
            <Field label={<>Síndico(a){ast}</>}><input className={ring(!sindico.trim())} value={sindico} onChange={e=>setSindico(e.target.value)}/></Field>
            <Field label={<>CPF{ast}</>}><input className={ring(cpf.replace(/\D/g,"").length!==11)} value={cpf} onChange={e=>setCpf(maskCPF(e.target.value))} inputMode="numeric" placeholder="000.000.000-00"/></Field>
            <Field label={<>Telefone{ast}</>}><input className={ring(tel.replace(/\D/g,"").length!==11)} value={tel} onChange={e=>setTel(maskTel(e.target.value))} inputMode="numeric" placeholder="(00) 0 0000-0000"/></Field>
          </div>
        </Card>

        <Card className="p-4">
          <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
            <div className="text-sm font-semibold text-slate-700">Escopo do contrato (postos)</div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-500">Adicionar de:</span>
              <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">
                {[["asseio","Asseio"],["vigilancia","Vigilância"]].map(([k,l])=>
                  <button key={k} onClick={()=>setSegAtual(k)} className={`px-3 py-1 rounded-md text-xs font-medium ${segAtual===k?"text-white":"text-slate-600"}`} style={segAtual===k?{backgroundColor:C.navy}:{}}>{l}</button>)}
              </div>
              <Btn variant="soft" onClick={addItem} disabled={semFuncoesAtual}><Plus size={16}/>Adicionar função</Btn>
            </div>
          </div>
          <div className="text-[11px] text-slate-400 mb-3 inline-flex items-center gap-1 flex-wrap"><FileCheck2 size={13}/>As CND's são puxadas pela empresa de cada cargo. Empresas: {prestadoras.length?prestadoras.map(p=>p.fantasia||p.razaoSocial).join(" + "):"—"} · CND's anexadas: {cndGrupos.length?cndGrupos.map(g=>CND_GRUPOS[g]).join(" + "):"—"}</div>
          {semFuncoesAtual && <div className="text-sm text-slate-600 bg-amber-50 border border-amber-100 rounded-lg px-4 py-3">O segmento <b>{SEGNOME[segAtual]}</b> ainda não tem funções cadastradas para {regiao==="FPOLIS"?"Florianópolis":"Litoral Norte"}. Cadastre as tabelas em <b>Sindicatos → {SEGNOME[segAtual]}</b> para adicionar funções deste segmento.</div>}
          {itens.length===0 && <Empty texto="Adicione as funções conforme a necessidade do condomínio."/>}
          <div className="space-y-2">
            {itens.map((it,i)=>{ const linha=calculo.linhas[i]; const servASG=ehServenteOuAsg(it.tab); const fs=funcoesOf(it.segmento);
              return <div key={i} className="p-2.5 rounded-lg border border-slate-200">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className={`shrink-0 text-[10px] font-semibold px-2 py-1 rounded ${it.segmento==="vigilancia"?"bg-teal-50 text-teal-700":"bg-slate-100 text-slate-600"}`}>{SEGNOME[it.segmento]}</span>
                  <select value={it.tab} onChange={e=>upItem(i,{tab:e.target.value})} className="flex-1 min-w-[170px] px-3 py-2 rounded-lg border border-slate-300 text-sm">
                    {fs.map(f=><option key={f.tab} value={f.tab}>{f.tab}</option>)}
                  </select>
                  <div className="flex items-center gap-1 shrink-0">
                    <button onClick={()=>upItem(i,{qtd:Math.max(1,(parseInt(it.qtd)||1)-1)})} className="w-8 h-8 grid place-items-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50"><Minus size={15}/></button>
                    <input type="number" min="1" value={it.qtd} onChange={e=>upItem(i,{qtd:e.target.value})} className="w-14 text-center px-2 py-1.5 rounded-lg border border-slate-300"/>
                    <button onClick={()=>upItem(i,{qtd:(parseInt(it.qtd)||1)+1})} className="w-8 h-8 grid place-items-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50"><Plus size={15}/></button>
                  </div>
                  <div className="ml-auto text-right shrink-0 min-w-[110px]">
                    <div className="text-sm font-medium text-slate-700">{linha?BRL(linha.mensalLinha):"—"}</div>
                    <div className="text-[11px] text-slate-400">{linha?BRL(linha.mensalPosto)+"/posto":""}</div>
                  </div>
                  <button onClick={()=>rmItem(i)} className="w-8 h-8 grid place-items-center rounded-lg text-rose-400 hover:bg-rose-50 shrink-0"><Trash2 size={16}/></button>
                </div>
                {servASG && <label className="mt-2 flex items-center gap-2 text-xs text-slate-600 cursor-pointer w-fit">
                  <input type="checkbox" checked={!!it.insMax} onChange={e=>upItem(i,{insMax:e.target.checked})} className="rounded"/>
                  Insalubridade Grau Máximo (40%) <span className="text-slate-400">— sem marcar: 20%</span>
                </label>}
                <label className="mt-2 flex items-center gap-2 text-xs text-slate-600 cursor-pointer w-fit">
                  <input type="checkbox" checked={!!it.gratOn} onChange={e=>upItem(i,{gratOn:e.target.checked})} className="rounded"/>
                  Gratificação
                </label>
                {it.gratOn && <div className="mt-2 flex items-center gap-2 flex-wrap pl-6">
                  <select value={it.gratTipo||"assid"} onChange={e=>upItem(i,{gratTipo:e.target.value})} className="px-3 py-1.5 rounded-lg border border-slate-300 text-sm">
                    <option value="assid">Na Assiduidade</option>
                    <option value="va">No Vale Alimentação</option>
                  </select>
                  <input type="number" min="0" step="0.01" value={it.gratValor} onChange={e=>upItem(i,{gratValor:e.target.value})} placeholder="Valor da gratificação (R$)" className="w-56 px-3 py-1.5 rounded-lg border border-slate-300 text-sm"/>
                  <span className="text-[11px] text-slate-400">{it.gratTipo==="va"?"entra no quadro VIII (dias 01)":"soma após os 7% da assiduidade"}</span>
                </div>}
              </div>;})}
          </div>
          {itens.length>0 && <div className="mt-3 text-xs text-slate-500 bg-slate-50 rounded-lg p-3">
            Adicional de {BRL(ADICIONAL_PADRAO)} por proposta, rateado em <b>{BRL(maqShare)}</b> por posto na linha <b>C – Máquinas/Equipamentos</b> (IV – Insumos de Mão de Obra).</div>}
        </Card>
      </div>

      {/* Resumo lateral */}
      <div className="space-y-4">
        <Card className="p-4">
          <div className="text-sm font-semibold text-slate-700 mb-3">Resumo do orçamento</div>
          <div className="space-y-2 text-sm">
            <Row k="Postos" v={totalPostos}/>
            <Row k="Segmentos" v={segmentos.length?segmentos.map(s=>SEGNOME[s]).join(" + "):"—"}/>
            <Field label={<>Nº de meses{ast}</>}><input type="number" min="1" value={meses} onChange={e=>setMeses(parseInt(e.target.value)||1)} className={ring(!(meses>=1))}/></Field>
            <div className="border-t border-slate-100 pt-2 mt-2"></div>
            <Row k="Valor mensal total" v={BRL(calculo.valorMensalTotal)}/>
            <div className="flex items-center justify-between pt-1">
              <span className="text-slate-600 font-medium">Valor global</span>

                  <div className="text-right w-24"><span className="text-[10px] text-slate-400">Mensal</span><div className="text-sm font-medium text-slate-700">{BRL(mensal)}</div></div>
                </div>
              </div>;})}
          </div>
          {materiais.length>0 && <div className="mt-2 flex items-center justify-between text-sm border-t border-slate-100 pt-2">
            <span className="text-slate-500">Material mensal total</span><span className="font-semibold text-slate-700">{BRL(matMensalTotal)}</span></div>}

        <Card className="p-4">

          <div className="space-y-2">
            <div className="flex items-center gap-2">

              <div className="relative w-24">
                <input type="number" step="0.01" min="0" value={altAdm} onChange={e=>setAltAdm(e.target.value)} placeholder={String(admDefPct)} className="w-full text-right pr-6 pl-2 py-1.5 rounded-lg border border-slate-300 text-sm"/>
                <span className="absolute right-2 top-1.5 text-slate-400 text-sm">%</span>

            </div>
            <div className="flex items-center gap-2">
              <div className="flex-1 text-sm text-slate-600">B – Lucro</div>
              <div className="relative w-24">

            {ehReducao
              ? <>Os percentuais informados <b>reduzem</b> o preço. A proposta poderá ser gerada e salva, mas o <b>PDF ao cliente ficará bloqueado</b> até a autorização de um administrador.</>
              : <>Os percentuais informados <b>aumentam</b> o preço. Liberado para gerar, salvar e emitir o PDF.</>}
          </div>}
          {(altAdm!==""||altLucro!=="") && <button onClick={()=>{setAltAdm("");setAltLucro("");}} className="mt-2 text-[11px] text-slate-400 hover:text-slate-600 underline">Limpar e voltar ao padrão</button>}

function Row({k,v}){ return <div className="flex items-center justify-between"><span className="text-slate-500">{k}</span><span className="font-medium text-slate-700">{v}</span></div>; }

/* ===================== VISUALIZAR PROPOSTA + PLANILHA + PDF ===================== */
function loadScript(src){
  return new Promise((res,rej)=>{
    if([...document.scripts].some(s=>s.src===src)) return res();
    const s=document.createElement("script"); s.src=src; s.onload=()=>res(); s.onerror=()=>rej(new Error("load "+src));
    document.head.appendChild(s);
  });
}
function baixarDataURL(dataURL, nome){
  const a=document.createElement("a"); a.href=dataURL; a.download=nome; document.body.appendChild(a); a.click(); a.remove();
}
// Converte dataURL (base64) em bytes sem usar fetch (evita bloqueios de CSP).
function dataURLparaBytes(dataURL){
  const base64 = (dataURL.split(",")[1]) || "";
  const bin = atob(base64); const len = bin.length; const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}
// Gera um arquivo HTML autossuficiente (estilizado, com quebra de página por posto) que
// abre a janela de impressão sozinho — caminho garantido quando a geração direta de PDF é bloqueada.
function baixarHTMLImprimivel(innerHTML, titulo){
  const html = `<!doctype html><html lang="pt-br"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>${titulo}</title>
<script src="https://cdn.tailwindcss.com"><\/script>
<style>
  @page { size: A4; margin: 10mm; }
  body { background:#fff; color:#0f172a; font-family: ui-sans-serif, system-ui, Arial, sans-serif; }
  .folha { page-break-before: always; }
  .folha:first-child { page-break-before: auto; }
  .folha.fz-92 td,.folha.fz-92 th{font-size:9.2px!important;padding-top:1px!important;padding-bottom:1px!important;line-height:1.18!important}
  .folha.fz-85 td,.folha.fz-85 th{font-size:8.5px!important;padding-top:0!important;padding-bottom:0!important;line-height:1.12!important}
  .folha.fz-78 td,.folha.fz-78 th{font-size:7.8px!important;padding-top:0!important;padding-bottom:0!important;line-height:1.08!important}
  .folha.fz-72 td,.folha.fz-72 th{font-size:7.2px!important;padding-top:0!important;padding-bottom:0!important;line-height:1.04!important}
  .folha.fz-85,.folha.fz-78,.folha.fz-72{padding:14px!important}
  .quadro { break-inside: avoid; page-break-inside: avoid; }
  table { width: 100%; border-collapse: collapse; }
  .no-print { display:none !important; }
  @media screen { body { max-width: 820px; margin: 0 auto; padding: 16px; } }
</style></head>
<body>${innerHTML}
<script>window.addEventListener('load', function(){ setTimeout(function(){ try{ window.print(); }catch(e){} }, 900); });<\/script>
</body></html>`;
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=titulo+".html"; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
// Carrega os PDFs (dataURL) das certidões de um grupo, na ordem dos campos.
async function carregarCNDs(grupo){
  const meta = (await sgetS(K.cnds(grupo))) || {};
  const arr=[];
  for(const [key] of CND_CAMPOS){
    if(meta[key] && meta[key].nome){
      const rec=await sgetS(K.cnd(grupo,key));
      if(rec && rec.data) arr.push({ key, nome:rec.nome||meta[key].nome, data:rec.data });
    }
  }
  return arr;
}
function PropView({prop, empresas, onVoltar, onStatus, onEditar, onExcluir, onSolicitarAut}){
  const prest = (prop.prestadoras && prop.prestadoras.length) ? prop.prestadoras
    : [{razaoSocial:EMPRESA.nome, cnpj:EMPRESA.cnpj, regime:EMPRESA.regime, diretor:EMPRESA.diretor, cargo:EMPRESA.cargo}];
  const prestPrinc = prest[0];
  const [pdfMsg,setPdfMsg]=useState("");
  const [pdfBusy,setPdfBusy]=useState(false);
  const precoBloqueado = prop.precoAltTipo==="reducao" && prop.precoAltAuth!=="autorizado";
  const aguardando = prop.precoAltTipo==="reducao" && prop.precoAltAuth==="pendente";
  const solicitarAut = ()=>{ onSolicitarAut && onSolicitarAut(); setPdfMsg("Solicitação enviada aos administradores. Assim que for autorizada, o botão PDF (Apresentação + Planilhas) será liberado aqui."); };

  const gerarPDF=async(incluirApres)=>{
    setPdfBusy(true); setPdfMsg("Gerando documento…");
    const el=document.getElementById("prop-print-area");
    // Compacta automaticamente cada folha que não couber em 1 página A4 (cargos com mais rubricas de salário)
    const restaurarFolhas = (()=>{
      const niveis=["fz-92","fz-85","fz-78","fz-72"]; const tocadas=[];
      try{
        const wEl = el.offsetWidth || 760;
        const maxH = wEl * (276/194); // altura útil de 1 pág A4 (margens 8/8/10/8mm) com folga de segurança
        el.querySelectorAll(".folha").forEach(f=>{
          niveis.forEach(n=>f.classList.remove(n));
          let i=0;
          while(f.offsetHeight > maxH && i < niveis.length){
            if(i>0) f.classList.remove(niveis[i-1]);
            f.classList.add(niveis[i]); i++;
          }
          if(i>0) tocadas.push(f);
        });
      }catch(_){}
      return ()=>{ try{ tocadas.forEach(f=>niveis.forEach(n=>f.classList.remove(n))); }catch(_){} };
    })();
    try{
    const nome=`${prop.numero} - ${prop.razaoSocial}`;
    const gruposCND = (prop.cndGrupos && prop.cndGrupos.length) ? [...new Set(prop.cndGrupos)] : [prop.cndVinculo || prop.segmento || "asseio"];
    const grupoCND = gruposCND[0];
    const nomesGrupos = gruposCND.map(g=>CND_GRUPOS[g]).join(" + ");
    // 1) Caminho ideal: PDF real via biblioteca (quando o ambiente permite cdnjs)
    try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js");
      if(!window.html2pdf) throw new Error("html2pdf indisponível");
      const opt={ margin:[8,8,10,8], image:{type:"jpeg",quality:0.97},
        html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff"},
        jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}, pagebreak:{mode:["css","legacy"], before:".folha", avoid:".quadro"} };
      if(!incluirApres){
        await window.html2pdf().set({...opt, filename:nome+".pdf"}).from(el).save();
        setPdfMsg("PDF salvo nos downloads."); setTimeout(()=>setPdfMsg(""),5000); setPdfBusy(false); return;
      }
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js");
      const apres = await sgetS(K.apres(prop.consultorId));
      setPdfMsg("Renderizando proposta e planilhas…");
      const planilhaBytes = await window.html2pdf().set(opt).from(el).outputPdf("arraybuffer");
      const { PDFDocument } = window.PDFLib;
      const out = await PDFDocument.create();
      let avisos=[];
      // 1º Apresentação (PDF). Outros formatos não podem ser embutidos.
      if(apres?.data){
        const ehPdf = (apres.tipo==="application/pdf") || /^data:application\/pdf/.test(apres.data) || /\.pdf$/i.test(apres.nome||"");
        if(ehPdf){
          try{
            const apDoc = await PDFDocument.load(dataURLparaBytes(apres.data), { ignoreEncryption:true });
            // Carimba a Razão Social da proposta na 1ª página, abaixo de "PROPOSTA COMERCIAL", centralizada e menor que o título
            try{
              const razao = (prop.razaoSocial||"").trim().toUpperCase();
              const pgs = apDoc.getPages();
              if(razao && pgs.length){
                const { StandardFonts, rgb } = window.PDFLib;
                const pg = pgs[0]; const { width, height } = pg.getSize();
                const fb = await apDoc.embedFont(StandardFonts.HelveticaBold);
                const limpa = razao.replace(/[^\x20-\x7EÀ-ÿ]/g,""); // mantém acentos Latin-1
                let sz = 22, maxW = width - 90;
                let tw = fb.widthOfTextAtSize(limpa, sz);
                while(tw > maxW && sz > 9){ sz -= 1; tw = fb.widthOfTextAtSize(limpa, sz); }
                pg.drawText(limpa, { x:(width - tw)/2, y: height*0.485, size:sz, font:fb, color: rgb(1,1,1) });
              }
            }catch(_){ /* se não puder carimbar, anexa a apresentação como está */ }
            (await out.copyPages(apDoc, apDoc.getPageIndices())).forEach(p=>out.addPage(p));
          }catch(err){ avisos.push("apresentação não pôde ser anexada"); }
        } else { avisos.push("apresentação não é PDF (não embutível)"); }
      } else { avisos.push("nenhuma apresentação cadastrada para o consultor"); }
      // 2º Proposta Comercial + 3º Planilhas (estão no print-area)
      const plDoc = await PDFDocument.load(planilhaBytes, { ignoreEncryption:true });
      (await out.copyPages(plDoc, plDoc.getPageIndices())).forEach(p=>out.addPage(p));
      // 4º CND's de todos os segmentos da proposta — normalizadas para A4 retrato (formato uniforme)
      setPdfMsg("Anexando CND's…");
      const A4=[595.28, 841.89];
      let cndOk=0;
      for(const grupo of gruposCND){
        const cnds = await carregarCNDs(grupo);
        for(const cnd of cnds){ try{
          const srcDoc = await PDFDocument.load(dataURLparaBytes(cnd.data), { ignoreEncryption:true });
          const limpo = await srcDoc.save();
          const nn = srcDoc.getPageCount();
          const embeds = await out.embedPdf(limpo, Array.from({length:nn},(_,k)=>k));
          for(const emb of embeds){
            const scale = Math.min(A4[0]/emb.width, A4[1]/emb.height);
            const w=emb.width*scale, h=emb.height*scale;
            const page = out.addPage(A4);
            page.drawPage(emb, { x:(A4[0]-w)/2, y:(A4[1]-h)/2, width:w, height:h });
          }
          cndOk++;
        }catch(err){ avisos.push(`CND ${cnd.nome} (${CND_GRUPOS[grupo]}) não pôde ser anexada`); } }
      }
      const blob = new Blob([await out.save()], {type:"application/pdf"});
      const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u; a.download=nome+".pdf"; document.body.appendChild(a); a.click(); a.remove();
      setPdfMsg(`PDF completo salvo (proposta + planilhas${cndOk?` + ${cndOk} CND's (${nomesGrupos})`:""}).${avisos.length?" Obs.: "+avisos.join("; ")+".":""}`); setTimeout(()=>setPdfMsg(""),9000); setPdfBusy(false); return;
    }catch(e){ /* segue para o caminho garantido */ }

    // 2) Caminho garantido: baixa um HTML que abre a impressão sozinho (Salvar como PDF)
    try{
      baixarHTMLImprimivel(el.outerHTML, nome);
      if(incluirApres){
        const apres = await sgetS(K.apres(prop.consultorId));
        if(apres?.data) baixarDataURL(apres.data, apres.nome||"apresentacao.pdf");
        let totCnd=0;
        for(const grupo of gruposCND){ const cnds = await carregarCNDs(grupo);
          for(const cnd of cnds){ baixarDataURL(cnd.data, `CND ${CND_GRUPOS[grupo]} - ${cnd.nome}`); totCnd++; } }
        setPdfMsg(`Baixados: planilhas (abra para salvar em PDF)${apres?.data?" + apresentação":""}${totCnd?` + ${totCnd} CND's (${nomesGrupos})`:""}. Monte o PDF final na ordem: apresentação, proposta+planilhas, CND's.`);
      }else{
        setPdfMsg("Documento baixado. Abra o arquivo: ele abre a janela de impressão sozinho — escolha “Salvar como PDF”.");
      }
    }catch(err){
      setPdfMsg("Não foi possível gerar o arquivo neste ambiente. Tente novamente ou use Ctrl+P (Cmd+P no Mac).");
    }
    setPdfBusy(false);
    } finally { restaurarFolhas(); }
  };

  return <div>
    <div className="flex items-center justify-between mb-4 no-print gap-2 flex-wrap">
      <Btn variant="ghost" onClick={onVoltar}><ChevronRight size={16} className="rotate-180"/>Voltar</Btn>
      <div className="flex items-center gap-2 flex-wrap">
        <select value={prop.status} onChange={e=>onStatus(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white">
          {["Rascunho","Enviada","Fechada","Perdida"].map(s=><option key={s}>{s}</option>)}</select>
        {onEditar && <Btn variant="ghost" onClick={onEditar}><Pencil size={16}/>Alterar</Btn>}
        {onExcluir && <Btn variant="ghost" onClick={onExcluir}><Trash2 size={16}/>Excluir</Btn>}
        {precoBloqueado
          ? (aguardando
              ? <Btn variant="soft" disabled><Clock size={16}/>Aguardando autorização…</Btn>
              : <Btn variant="soft" onClick={solicitarAut}><Clock size={16}/>Solicitar Autorização de Preços</Btn>)
          : <Btn onClick={()=>gerarPDF(true)} disabled={pdfBusy}><FileText size={16}/>{pdfBusy?"Gerando…":"PDF (Apresentação + Planilhas)"}</Btn>}
      </div>
    </div>
    {prop.precoAltTipo==="reducao" && <div className={`no-print mb-3 text-xs rounded-lg px-3 py-2 border ${precoBloqueado?"bg-amber-50 border-amber-200 text-amber-700":"bg-emerald-50 border-emerald-200 text-emerald-700"}`}>
      {precoBloqueado
        ? (aguardando
            ? <>Solicitação de <b>redução de preço</b> (Quadro V — A {prop.precoAlt?.admPct}% · B {prop.precoAlt?.lucroPct}%) <b>enviada</b> e aguardando autorização de um administrador. O PDF ao cliente fica bloqueado até a aprovação.</>
            : <>Esta proposta tem <b>redução de preço</b> (Quadro V — A {prop.precoAlt?.admPct}% · B {prop.precoAlt?.lucroPct}%, padrão A {prop.precoAlt?.admPadraoPct}% · B {prop.precoAlt?.lucroPadraoPct}%). Clique em <b>Solicitar Autorização de Preços</b> para enviar aos administradores — o PDF ao cliente fica bloqueado até a aprovação.</>)
        : <><CheckCircle2 size={13} className="inline mb-0.5"/> Alteração de preço <b>autorizada</b>{prop.precoAltAutorizadoPor?` por ${prop.precoAltAutorizadoPor}`:""}{prop.precoAltAutorizadoEm?` em ${prop.precoAltAutorizadoEm}`:""}. PDF liberado.</>}
    </div>}
    {pdfMsg && <div className="no-print mb-3 text-xs text-slate-600 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">{pdfMsg}</div>}

    <div id="prop-print-area" className="bg-white rounded-xl border border-slate-200 print-area">
      {/* Capa proposta */}
      <div className="p-6 border-b border-slate-100">
        <div className="flex items-start justify-between">
          <Logo size={34}/>
          <div className="text-right text-xs text-slate-500">
            <div className="font-semibold text-slate-700 text-sm">{prop.numero}</div>
            <div>Emitida em {prop.criadoEm}</div>
            <div>Consultor: {prop.consultorNome}</div>
          </div>
        </div>
        <h2 className="text-lg font-bold text-slate-800 mt-4">Proposta Comercial — Prestação de Serviços</h2>

        <div className="grid grid-cols-2 gap-x-8 gap-y-1 mt-4 text-sm">
          <Info k="Cliente" v={prop.razaoSocial}/>
          <Info k="CNPJ" v={prop.clienteCnpj||"—"}/>
          <Info k="Endereço" v={prop.endereco||"—"}/>
          <Info k="Síndico(a)" v={prop.sindicoNome||"—"}/>
          <Info k="Telefone" v={prop.sindicoTel||"—"}/>
        </div>
      </div>

      {/* Resumo dos postos */}
      <div className="p-6 border-b border-slate-100">
        <div className="text-sm font-semibold text-slate-700 mb-2">Escopo contratado</div>
        <table className="w-full text-sm">
          <thead className="text-xs text-slate-500 border-b border-slate-100"><tr>
            <th className="text-left py-2">Posto</th><th className="text-center py-2">Qtd</th>
            <th className="text-right py-2">Mensal/posto</th><th className="text-right py-2">Mensal</th></tr></thead>
          <tbody>{prop.itens.map((it,i)=><tr key={i} className="border-b border-slate-50">
            <td className="py-2 text-slate-700">{it.tab}</td><td className="py-2 text-center">{it.qtd}</td>
            <td className="py-2 text-right text-slate-600">{BRL(it.mensalPosto)}</td>
            <td className="py-2 text-right font-medium text-slate-800">{BRL(it.mensalLinha)}</td></tr>)}</tbody>
          <tfoot><tr className="font-semibold"><td className="py-2.5" colSpan={3}>Valor mensal total</td><td className="py-2.5 text-right" style={{color:C.navy}}>{BRL(prop.valorMensalTotal)}</td></tr></tfoot>
        </table>
      </div>

      {/* Planilhas de custo detalhadas (fiéis à planilha oficial) */}
      {prop.itens.map((it,i)=><PlanilhaCusto key={i} it={it} prop={prop} totalProf={prop.itens.reduce((s,x)=>s+(parseInt(x.qtd)||0),0)}/>)}
    </div>
  </div>;
}
function Info({k,v}){ return <div><span className="text-slate-400">{k}: </span><span className="text-slate-700 font-medium">{v}</span></div>; }

/* Planilha de Custos fiel — reproduz linha a linha a planilha oficial (seções I a IX) */
function PlanilhaCusto({it, prop, totalProf}){

  // célula de % : número→"12,00%", "-"→traço, null→vazio
  const pctCell=(p)=> p==="-" ? "–" : (p==null ? "" : PCT(p));
  // Linha padrão: rótulo | % | VALOR | por extenso. Oculta linhas zeradas (exceto totais/bold).
  const R=({lb, p, v, bold, ext=true, hide})=> (hide || (v===0 && !bold)) ? null : (
    <tr className={bold?"font-semibold bg-slate-50/60":""}>
      <td className="px-2 py-[2px] text-slate-700 border border-slate-200">{lb}</td>
      <td className="px-2 py-[2px] text-right text-slate-500 border border-slate-200 whitespace-nowrap w-16">{pctCell(p)}</td>
      <td className="px-2 py-[2px] text-right text-slate-800 border border-slate-200 whitespace-nowrap w-28">{v!=null?BRL(v):""}</td>
      <td className="px-2 py-[2px] text-slate-400 italic border border-slate-200 text-[9px] leading-tight">{ext&&v!=null?extenso(v):""}</td>
    </tr>);

  const SUB=(t)=> <tr><td colSpan={4} className="px-2 py-[2px] font-semibold text-slate-600 border border-slate-200 bg-slate-100">{t}</td></tr>;

  return <div className="posto text-[10px]">

      <div className="quadro mb-1">

            <tr><td className="px-2 py-[2px] border border-slate-200 text-center font-semibold">B</td><td className="px-2 py-[2px] border border-slate-200">Local de Prestação dos Serviços</td><td className="px-2 py-[2px] border border-slate-200 text-right">{REG_TAB[regiao]||regiao}</td></tr>
            <tr><td className="px-2 py-[2px] border border-slate-200 text-center font-semibold">C</td><td className="px-2 py-[2px] border border-slate-200">Salário Normativo da Categoria</td><td className="px-2 py-[2px] border border-slate-200 text-right">{BRL(c.normativo)}</td></tr>
            <tr><td className="px-2 py-[2px] border border-slate-200 text-center font-semibold">D</td><td className="px-2 py-[2px] border border-slate-200">Categoria Profissional</td><td className="px-2 py-[2px] border border-slate-200 text-right">{CATEGORIA(it.tab)}</td></tr>
            <tr><td className="px-2 py-[2px] border border-slate-200 text-center font-semibold">E</td><td className="px-2 py-[2px] border border-slate-200">Quantidade (total) de postos a contratar</td><td className="px-2 py-[2px] border border-slate-200 text-right">{qtd}</td></tr>

/* ===================== APRESENTAÇÃO ===================== */
const MAX_APRES_MB = 4;
function fmtTam(bytes){ if(bytes==null) return ""; const mb=bytes/1048576; return mb>=1? mb.toFixed(1)+" MB" : Math.max(1,Math.round(bytes/1024))+" KB"; }
function Apresentacao({me, users, saveUsers}){
  const meu = users.find(u=>u.id===me.id);
  const ap = meu.apresentacao;
  const [busy,setBusy]=useState(false);
  const [erro,setErro]=useState("");

  const onFile=(e)=>{
    const f=e.target.files?.[0]; if(!f) return; setErro("");
    if(f.size > MAX_APRES_MB*1048576){ setErro(`Arquivo de ${fmtTam(f.size)}. Envie um PDF padrão até ${MAX_APRES_MB} MB (sem vídeos).`); e.target.value=""; return; }
    setBusy(true);
    const r=new FileReader();
    r.onload=async()=>{
      try{
        await ssetS(K.apres(me.id), { data:r.result, nome:f.name, tipo:f.type, tam:f.size });
        const novo=users.map(u=>u.id===me.id?{...u,apresentacao:{nome:f.name, tipo:f.type, tam:f.size, em:today()}}:u);
        saveUsers(novo);
      }catch(err){ setErro("Não foi possível salvar (arquivo muito grande para o armazenamento local)."); }
      setBusy(false); e.target.value="";
    };
    r.onerror=()=>{ setErro("Falha ao ler o arquivo."); setBusy(false); };
    r.readAsDataURL(f);
  };

  const baixar=async()=>{
    const rec=await sgetS(K.apres(me.id)); if(!rec){ setErro("Conteúdo não encontrado. Reenvie o arquivo."); return; }
    const a=document.createElement("a"); a.href=rec.data; a.download=rec.nome||"apresentacao"; a.click();
  };
  const remover=async()=>{
    try{ await sdelS(K.apres(me.id)); }catch{}
    const novo=users.map(u=>u.id===me.id?{...u,apresentacao:null}:u); saveUsers(novo);
  };

  return <div>
    <Header title="Apresentação" sub="Arquivo institucional padrão do consultor, anexado à proposta"/>
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <Card className="p-6">
        <div className="text-sm font-semibold text-slate-700 mb-3">Minha apresentação padrão</div>
        {ap? <div className="flex items-center gap-3 p-3 rounded-lg bg-slate-50 border border-slate-100">
          <div className="w-10 h-10 rounded-lg grid place-items-center text-white" style={{backgroundColor:C.teal}}><Presentation size={20}/></div>
          <div className="flex-1 min-w-0"><div className="text-sm font-medium text-slate-700 truncate">{ap.nome}</div>
            <div className="text-xs text-slate-400">{fmtTam(ap.tam)} · Atualizada em {ap.em}</div></div>
          <button onClick={baixar} title="Baixar / visualizar" className="text-slate-400 hover:text-slate-700 p-1.5"><Download size={18}/></button>
          <button onClick={remover} title="Remover" className="text-slate-400 hover:text-rose-500 p-1.5"><Trash2 size={18}/></button>
        </div> : <Empty texto="Nenhuma apresentação enviada ainda."/>}
        {erro && <div className="mt-3 text-xs text-rose-600 bg-rose-50 border border-rose-100 rounded-lg px-3 py-2">{erro}</div>}
        <label className={`mt-4 inline-flex items-center gap-2 px-3.5 py-2 rounded-lg text-sm font-medium text-white ${busy?"opacity-60 pointer-events-none":"cursor-pointer"}`} style={{backgroundColor:C.navy}}>
          <Plus size={16}/>{busy?"Enviando…":(ap?"Substituir arquivo":"Enviar arquivo (.pdf)")}
          <input type="file" accept=".pdf,application/pdf" className="hidden" onChange={onFile} disabled={busy}/>
        </label>
      </Card>
      <Card className="p-6">
        <div className="text-sm font-semibold text-slate-700 mb-2">Como funciona</div>
        <p className="text-sm text-slate-500 leading-relaxed">Cada consultor mantém aqui sua apresentação institucional padrão — um <b>PDF leve (até {MAX_APRES_MB} MB, sem vídeos)</b>. Ao gerar uma proposta, o consultor imprime/baixa o PDF das planilhas de custos e o entrega junto desta apresentação ao cliente.</p>
        <p className="text-sm text-slate-500 leading-relaxed mt-3">A versão de alta resolução com vídeos (~67 MB) deve ser usada à parte; para anexar ao sistema, exporte uma versão enxuta em PDF. A junção automática num único PDF entra numa fase futura com processamento em servidor.</p>

/* ===================== CND's (certidões — compartilhado entre todos) ===================== */
const CND_CAMPOS = [
  ["cnpj","01 - CNPJ"],["consultaSimples","02 - Consulta Simples"],["capitalSocial","03 - Capital Social"],
  ["federal","04 - Federal"],["estadual","05 - Estadual"],["municipal","06 - Municipal"],
  ["fgts","07 - FGTS"],["trabalhista","08 - Trabalhista"],["falencia","09 - Falência"],
];
const CND_GRUPOS = { asseio:"CND's Asseio", vigilancia:"CND's Vigilância" };
const MAX_CND_MB = 8;
function CNDs({me, grupo, empresas=[], cndEmpresa={}, saveCndEmpresa, isAdmin}){
  const [meta,setMeta]=useState(null);     // { key: {nome, em, tam, por, vencTipo, venc} }
  const [busy,setBusy]=useState("");       // key em upload
  const [erro,setErro]=useState("");
  const [confExc,setConfExc]=useState(null);

  useEffect(()=>{(async()=>{ setMeta((await sgetS(K.cnds(grupo)))||{}); })();},[grupo]);

  const onFile=(key,e)=>{
    const f=e.target.files?.[0]; if(!f){ return; } setErro("");
    if(f.type!=="application/pdf" && !/\.pdf$/i.test(f.name)){ setErro("Envie um arquivo PDF."); e.target.value=""; return; }
    if(f.size > MAX_CND_MB*1048576){ setErro(`Arquivo de ${fmtTam(f.size)}. Limite de ${MAX_CND_MB} MB por certidão.`); e.target.value=""; return; }
    setBusy(key);
    const r=new FileReader();
    r.onload=async()=>{
      try{
        await ssetS(K.cnd(grupo,key), { data:r.result, nome:f.name, tipo:f.type, tam:f.size });
        const novo={ ...(meta||{}), [key]:{ ...(meta&&meta[key]||{}), nome:f.name, em:today(), tam:f.size, por:me.nome.split(" ")[0] } };
        await ssetS(K.cnds(grupo), novo); setMeta(novo);
      }catch(err){ setErro("Não foi possível salvar (arquivo grande demais para o armazenamento)."); }
      setBusy(""); e.target.value="";
    };
    r.onerror=()=>{ setErro("Falha ao ler o arquivo."); setBusy(""); };
    r.readAsDataURL(f);
  };
  const baixar=async(key)=>{
    const rec=await sgetS(K.cnd(grupo,key)); if(!rec){ setErro("Conteúdo não encontrado. Reenvie."); return; }
    baixarDataURL(rec.data, rec.nome||(key+".pdf"));
  };
  const excluir=(key)=>{
    setConfExc({ titulo:"Excluir certidão", msg:"Excluir esta certidão? Esta ação não pode ser desfeita.", acao: async()=>{
      await sdelS(K.cnd(grupo,key));
      const novo={ ...(meta||{}) }; delete novo[key];
      await ssetS(K.cnds(grupo), novo); setMeta(novo);
    }});
  };
  const setVenc=async(key,patch)=>{
    const novo={ ...(meta||{}), [key]:{ ...(meta&&meta[key]||{}), ...patch } };
    setMeta(novo); await ssetS(K.cnds(grupo), novo);
  };

  // helpers de data/vencimento
  const fmtData=(iso)=> iso? iso.split("-").reverse().join("/") : "";
  const statusVenc=(m)=>{
    if(!m || m.vencTipo!=="vence" || !m.venc) return null;
    const hoje=new Date(); hoje.setHours(0,0,0,0);
    const d=new Date(m.venc+"T00:00:00");
    const dias=Math.round((d-hoje)/86400000);
    if(dias<0) return {txt:`Vencida em ${fmtData(m.venc)}`, cor:"#e11d48", bg:"#fff1f2"};
    if(dias<=15) return {txt:`Vence em ${fmtData(m.venc)} (${dias}d)`, cor:"#b45309", bg:"#fffbeb"};
    return {txt:`Vence em ${fmtData(m.venc)}`, cor:"#0f766e", bg:"#f0fdfa"};
  };

  if(meta===null) return <div className="text-slate-400 text-sm">Carregando…</div>;
  const preenchidas = CND_CAMPOS.filter(([k])=>meta[k]&&meta[k].nome).length;

  return <div>
    <ConfirmDialog pend={confExc} onClose={()=>setConfExc(null)}/>
    <Header title={CND_GRUPOS[grupo]||"CND's"} sub={`Documentos compartilhados · ${preenchidas}/9 atualizadas`}
      right={<div className="flex items-center gap-2">
        <Building size={16} className="text-slate-400"/>
        <span className="text-sm text-slate-500">Empresa vinculada:</span>
        <select value={(cndEmpresa&&cndEmpresa[grupo])||(grupo==="vigilancia"?"emp02":"emp01")} disabled={!isAdmin}
          onChange={e=>saveCndEmpresa && saveCndEmpresa({...cndEmpresa, [grupo]:e.target.value})}
          className="px-3 py-1.5 rounded-lg border border-slate-300 text-sm bg-white disabled:bg-slate-50">
          {empresas.map(em=><option key={em.id} value={em.id}>{empLabel(em)}</option>)}
        </select>
      </div>}/>
    {erro && <div className="mb-3 text-xs text-rose-600 bg-rose-50 border border-rose-100 rounded-lg px-3 py-2">{erro}</div>}
    <div className="mb-4 text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
      Um arquivo PDF por certidão (até {MAX_CND_MB} MB). Ao atualizar, o documento fica disponível para todos os usuários. Substituir envia uma nova versão; só se mantém o arquivo mais recente. Defina o vencimento para acompanhar o controle.
    </div>
    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
      {CND_CAMPOS.map(([key,label])=>{ const m=meta[key]||{}; const temArq=!!m.nome; const carregando=busy===key; const sv=statusVenc(m);
        return <Card key={key} className="p-4 flex flex-col">
          <div className="text-sm font-semibold text-slate-700 mb-3">{label}</div>
          {temArq ? <div className="flex items-start gap-3 p-3 rounded-lg bg-slate-50 border border-slate-100">
            <div className="w-9 h-9 rounded-lg grid place-items-center text-white shrink-0" style={{backgroundColor:C.teal}}><FileCheck2 size={18}/></div>
            <div className="flex-1 min-w-0">
              <div className="text-sm font-medium text-slate-700 truncate">{m.nome}</div>
              <div className="text-[11px] text-slate-400">{fmtTam(m.tam)} · {m.em}{m.por?` · por ${m.por}`:""}</div>
            </div>
          </div> : <div className="p-4 rounded-lg border border-dashed border-slate-200 text-slate-400 text-xs text-center">Nenhum arquivo enviado</div>}

          {/* badge de vencimento */}
          {sv && <div className="mt-2 inline-flex items-center gap-1.5 text-[11px] font-medium px-2 py-1 rounded-md w-fit" style={{color:sv.cor, backgroundColor:sv.bg}}>
            <Calendar size={12}/>{sv.txt}</div>}

          {/* ações: enviar + vencimento */}
          <div className="flex items-center gap-2 mt-3 flex-wrap">
            <label className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-white cursor-pointer ${carregando?"opacity-60 pointer-events-none":""}`} style={{backgroundColor:C.navy}}>
              {carregando? "Enviando…" : (<><Plus size={14}/>{temArq?"Substituir":"Enviar PDF"}</>)}
              <input type="file" accept=".pdf,application/pdf" className="hidden" onChange={(e)=>onFile(key,e)} disabled={carregando}/>
            </label>
            <select value={m.vencTipo||"sem"} onChange={(e)=>setVenc(key,{vencTipo:e.target.value})}
              className="px-2.5 py-1.5 rounded-lg border border-slate-300 text-xs bg-white">
              <option value="sem">Sem vencimento</option>
              <option value="vence">Vence em</option>
            </select>
            {m.vencTipo==="vence" && <input type="date" value={m.venc||""} onChange={(e)=>setVenc(key,{venc:e.target.value})}
              className="px-2.5 py-1.5 rounded-lg border border-slate-300 text-xs bg-white"/>}
            {temArq && <>
              <button onClick={()=>baixar(key)} title="Baixar / visualizar" className="p-1.5 text-slate-400 hover:text-slate-700"><Download size={16}/></button>
              <button onClick={()=>excluir(key)} title="Excluir" className="p-1.5 text-slate-400 hover:text-rose-500"><Trash2 size={16}/></button>
            </>}
          </div>
        </Card>;})}
    </div>
  </div>;
}

/* Listas suspensas — fiéis ao modelo ORDEM DE SERVIÇO (aba Planilha1) */
const OS_MODALIDADES = ["CONTRATO INDETERMINADO","CONTRATO COM PRAZO DETERMINADO","COBERTURA DE FÉRIAS","COBERTURA DE AFASTAMENTO COM PRAZO DETERMINADO","COBERTURA DE AFASTAMENTO SEM PRAZO DETERMINADO","REDUÇÃO DE CARGA HORÁRIA","REDUÇÃO DE POSTO DE TRABALHO","ADITIVO DE CONTRATO INDETERMINADO","ADITIVO DE CONTRATO TEMPORÁRIO","TÉRMINO DE CONTRATO","SERVIÇO EXTRA"];
const OS_CARGOS = ["SERVENTE","SERVENTE SDF","AUX. DE SERVIÇOS GERAIS","AUX. DE SERVIÇOS GERAIS SDF","RECEPCIONISTA","ZELADOR","LIDER DE GRUPO","AUX. ADMINISTRATIVO","PORTEIRO (A) DIURNO","PORTEIRO (A) NOTURNO","PORTEIRO (A) SDF","VIGIA DIURNO","VIGIA NOTURNO","VIGIA SDF","LOCADOR DE CADEIRA DE PRAIA","OFICIAL DE MANUTENÇÃO","VIGILANTE DIURNO","VIGILANTE NOTURNO","ENCARREGADO NIVEL I","ENCARREGADO NIVEL II","ENCARREGADO NIVEL III"];
const OS_JORNADAS = ["44HS","40HS","36HS","30HS","24HS","20HS","12 X 36"];
const OS_ADICIONAIS = ["GRATIFICAÇÃO NO VALE ALIMENTAÇÃO","PRÊMIO ASSIDUIDADE","SEM DESCONTO 6% VT","GRATIFICAÇÃO POR CARGO","PRÊMIO"];
const OS_INSUMOS = ["LIMPEZA POR CORTESIA","LIMPEZA FIXA DE SALÕES","RADIOS","KIT RONDA","MATERIAIS DE ESCRITÓRIO","CELULAR PARA ZELADORIA","BODYCAM","PONTO ELETRONICO","MOTO"];
const OS_CLASSIF = ["PERÍODO","QUANTIDADE","ITEM","TIPO"];
const OS_DOCS = ["CRONOGRAMA OPERACIONAL","COMUNICADOS EM GERAL","CHEK-LIST LIMPEZA","CHEK-LIST VISTORIA"];

const jornadaTab=(tab)=>{ if(!tab) return ""; if(/12x36/i.test(tab)) return "12X36";
  const m=tab.match(/(\d+)\s*h/i); if(m) return m[1]+"HS";
  const sufixo=tab.split(" ").slice(1).join(" "); return sufixo.toUpperCase()||"—"; };
// Jornada no padrão do modelo (12 X 36 / 44HS / ...)
const jornadaOS=(tab)=>{ if(!tab) return ""; if(/12x36/i.test(tab)) return "12 X 36";
  const m=tab.match(/(\d+)\s*h/i); if(m) return m[1]+"HS"; return (tab||"").toUpperCase(); };
// Cargo no padrão do modelo — distingue VIGIA de VIGILANTE (correção do vínculo de empresa)
function cargoOS(tab){
  const t=(tab||"").trim(); const base=t.split(" ")[0];
  const sdf=/\bSDF\b/i.test(t); const noturno=/(^|\s)N(\s|$)|noturno/i.test(t); // 12x36 N
  switch(base){
    case "ASG": return sdf?"AUX. DE SERVIÇOS GERAIS SDF":"AUX. DE SERVIÇOS GERAIS";
    case "Servente": return sdf?"SERVENTE SDF":"SERVENTE";
    case "Líder": return "LIDER DE GRUPO";
    case "Recepção": return "RECEPCIONISTA";
    case "Zelador": return "ZELADOR";
    case "Porteiro": return sdf?"PORTEIRO (A) SDF":(noturno?"PORTEIRO (A) NOTURNO":"PORTEIRO (A) DIURNO");
    case "Vigia": return sdf?"VIGIA SDF":(noturno?"VIGIA NOTURNO":"VIGIA DIURNO");
    case "Vigilante": return noturno?"VIGILANTE NOTURNO":"VIGILANTE DIURNO";
    default: return t.toUpperCase();
  }
}
const CHECKLIST_ITENS=[
  ["cadastroCliente","Cadastro do cliente"],["centroCusto","Centro de custo"],["planilha","Planilha"],
  ["contratoVigencia","Contrato (vigência)"],["quadroLotacao","Quadro de lotação"],["chefia","Chefia"],
  ["dataInicioOutras","Data início atividades outras empresas DP"],["abcd","A,B,C,D"],
  ["sistemaSupervisao","Sistema supervisão"],["visitas","Visitas"],["boleto","Boleto"],
  ["iss","ISS %"],["pipedrive","Pipedrive"],["comissao","Comissão"],
];
function novaOSdeProposta(prop, me){
  return {
    id:uid(), numero:"OS-"+new Date().getFullYear()+"-"+String(Math.floor(Math.random()*9000+1000)),
    criadoEm:today(), propostaId:prop.id, propostaNumero:prop.numero, status:"Rascunho",
    consultorNome:prop.consultorNome||me.nome, supervisor:"",
    razaoSocial:prop.razaoSocial||"", cnpj:prop.clienteCnpj||"", endereco:prop.endereco||"",
    numeroEnd:"", uf:"SC", cidade:"", bairro:"", cep:"",
    sindicoNome:prop.sindicoNome||"", sindicoCpf:prop.sindicoCpf||"", sindicoTel:prop.sindicoTel||"", sindicoEmail:"",
    administradora:"", admTel:"", admEmail:"", obs1:"",
    modalidade:"CONTRATO INDETERMINADO", inicio:"", termino:"", reaproveitamento:"Não", obs2:"",
    composicao:(prop.itens||[]).map(it=>{ const pp=(prop.prestadoras||[]).find(x=>x.id===it.empresaId); return {cargo:cargoOS(it.tab), jornada:jornadaOS(it.tab), qtd:it.qtd, empresa: pp? (pp.fantasia||pp.razaoSocial) : "", empresaId: it.empresaId||"", descricao:""}; }),
    prestadoras: prop.prestadoras||[],
    // Adicionais — preenchidos automaticamente pelo escopo: Insalubridade Grau Máximo e gratificações (Assiduidade / Vale Alimentação)
    adicionais:(prop.itens||[]).flatMap(it=>{ const benef=cargoOS(it.tab)+(it.qtd>1?` (${it.qtd} postos)`:""); const linhas=[];
      if(it.insMax) linhas.push({tipo:"INSALUBRIDADE GRAU MÁXIMO (40%)", valor:"40%", beneficiado:benef, _auto:true});
      if(it.gratOn && num(it.gratValor)>0) linhas.push({tipo: it.gratTipo==="va" ? "GRATIFICAÇÃO NO VALE ALIMENTAÇÃO" : "PRÊMIO ASSIDUIDADE", valor: BRL(num(it.gratValor)), beneficiado:benef, _auto:true});
      return linhas; }),
    // Materiais — vindos dos "Materiais específicos" da proposta (Descrição · Custo · Meses depreciação · Total)
    materiais:(prop.materiais||[]).map(m=>{ const total=num(m.total), meses=parseInt(m.meses)||0; return {desc:m.desc||"", custo: meses>0? Math.round(total/meses*100)/100 : total, meses, total, _auto:true}; }),
    insumos:[], documentacao:[{tipo:"Ordem de Serviço", confeccionado:"", dataImplantacao:today()}],
    checklist:Object.fromEntries(CHECKLIST_ITENS.map(([k])=>[k,false])),
    checklistVals:{centroCusto:"", contratoVigencia:"", issPct:""},
  };
}
function OrdensServico({me, isAdmin, props, oss, saveOss, users}){
  const [modo,setModo]=useState("lista"); // lista | nova | edit | view
  const [atual,setAtual]=useState(null);

  const minhas = oss.filter(o=> isAdmin || o.consultorNome===me.nome);

  const criar=(prop)=>{ setAtual(novaOSdeProposta(prop, me)); setModo("edit"); };
  const salvar=(os)=>{ const ex=oss.find(o=>o.id===os.id);
    saveOss(ex? oss.map(o=>o.id===os.id?os:o) : [os,...oss]); setAtual(os); setModo("view"); };
  const abrir=(os)=>{ setAtual(os); setModo("view"); };
  const editar=(os)=>{ setAtual(os); setModo("edit"); };
  const excluir=(os)=>{ setConfExc({ titulo:"Excluir ordem de serviço", msg:"Excluir esta ordem de serviço? Esta ação não pode ser desfeita.", acao:()=>saveOss(oss.filter(o=>o.id!==os.id)) }); };

  if(modo==="edit" && atual) return <OSEditor os={atual} onCancel={()=>setModo("lista")} onSalvar={salvar}/>;

            <Btn onClick={()=>criar(p)}><Plus size={16}/>Gerar OS</Btn>

  return (
    <div>
      <ConfirmDialog pend={confExc} onClose={()=>setConfExc(null)}/>
      <Header title="Ordens de Serviço" sub="Emissão a partir de orçamentos ganhos"
        right={<Btn onClick={()=>setModo("nova")}><Plus size={16}/>Nova OS</Btn>}/>

        <Card className="overflow-hidden">

              <th className="text-left px-4 py-2.5 font-medium">Proposta</th><th className="text-left px-4 py-2.5 font-medium">Início</th>

              <td className="px-4 py-2.5 text-center"><StatusPill st={o.status}/></td>
              <td className="px-4 py-2.5 text-right whitespace-nowrap">
                <button onClick={()=>abrir(o)} className="text-slate-400 hover:text-slate-700 p-1.5" title="Abrir"><Search size={16}/></button>
                <button onClick={()=>editar(o)} className="text-slate-400 hover:text-slate-700 p-1.5" title="Editar"><Pencil size={16}/></button>
                <button onClick={()=>excluir(o)} className="text-slate-400 hover:text-rose-500 p-1.5" title="Excluir"><Trash2 size={16}/></button>
              </td></tr>)}</tbody>

  );

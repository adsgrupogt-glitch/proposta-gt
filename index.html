/* ===================== CONTRATOS ===================== */
const EMP_VIG_ID = "emp02";
const segDe = (empresaId, cargo)=> (empresaId===EMP_VIG_ID || /vigilante|ronda|bodycam|vigia/i.test(cargo||"")) ? "vigilancia" : "asseio";
const SEG_LABEL = { asseio:"Asseio (RG Serviços)", vigilancia:"Vigilância (GT Vig)" };
const pad2 = (n)=> String(parseInt(n)||0).padStart(2,"0");

const _UNI=["zero","um","dois","três","quatro","cinco","seis","sete","oito","nove","dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"];
const _DEZ=["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"];
const _CEM=["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"];
function _ext999(n){ if(n===100) return "cem"; const s=[]; const c=Math.floor(n/100); n%=100; if(c) s.push(_CEM[c]);
  if(n<20){ if(n) s.push(_UNI[n]); } else { s.push(_DEZ[Math.floor(n/10)]); if(n%10) s.push(_UNI[n%10]); } return s.join(" e "); }
function numExtenso(n){ n=Math.floor(Math.abs(n)); if(n<20) return _UNI[n]; if(n<1000) return _ext999(n);
  const esc=[["",""],["mil","mil"],["milhão","milhões"],["bilhão","bilhões"]]; const grupos=[]; let num=n;
  while(num>0){ grupos.push(num%1000); num=Math.floor(num/1000); }
  const partes=[]; for(let g=grupos.length-1; g>=0; g--){ const v=grupos[g]; if(!v) continue;
    const txt=(g===1 && v===1)? "" : _ext999(v); const nome=g===0? "" : (v===1?esc[g][0]:esc[g][1]); partes.push((txt+" "+nome).trim()); }
  if(partes.length===1) return partes[0];
  return partes.slice(0,-1).join(", ")+" e "+partes[partes.length-1]; }
function extensoReais(v){ v=Math.round((Number(v)||0)*100)/100; const r=Math.floor(v); const c=Math.round((v-r)*100);
  let s = numExtenso(r)+" "+(r===1?"real":"reais"); if(c>0) s += " e "+numExtenso(c)+" "+(c===1?"centavo":"centavos"); return s; }

function enderecoCliente(os){
  const p=[]; if(os.endereco) p.push(os.endereco + (os.numeroEnd? ", nº "+os.numeroEnd : ""));
  if(os.bairro) p.push("Bairro "+os.bairro);
  if(os.cidade) p.push(os.cidade + (os.uf? "/"+os.uf : ""));
  if(os.cep) p.push("CEP "+os.cep);
  return p.length? p.join(", ") : "____";
}
function objetoDe(comp){ const u=[...new Set((comp||[]).map(c=>(c.cargo||"").trim()).filter(Boolean))]; return u.join(" E ") || "____"; }
function postosLinhas(comp){ const L="abcdefghijklmnopqrstuvwxyz"; return (comp||[]).map((c,i)=>{
  const q=parseInt(c.qtd)||0; const jor=(c.jornada||"").trim(); const det=(c.descricao||"").trim();
  const base = `${L[i]||"-"}) ${pad2(q)} (${numExtenso(q)}) ${c.cargo}`;
  return base + (det? `, ${det}` : (jor? `, jornada ${jor}` : "")) + ";"; }); }
function postosResumo(comp){ return (comp||[]).map(c=>{ const q=parseInt(c.qtd)||0;
  return `${pad2(q)} (${numExtenso(q)}) ${c.cargo}${c.jornada? " "+c.jornada : ""}`; }).join(" + ") + "."; }
function postosTabela(comp){ const rows=(comp||[]).map(c=>[`${c.cargo}${c.jornada? " "+c.jornada : ""}`.trim(), pad2(c.qtd)]);
  const total=(comp||[]).reduce((s,c)=>s+(parseInt(c.qtd)||0),0); return {rows, total}; }

function substTokens(t, tokens){ return (t||"").replace(/\{\{(\w+)\}\}/g, (m,k)=> (tokens[k]!=null? tokens[k] : m)); }
function ctxContrato(os, compSeg, valorSeg){
  const localData = "São José/SC, " + today().split("-").reverse().join("/");
  const valorTxt = BRL(valorSeg||0) + " (" + extensoReais(valorSeg||0) + ")";
  return {
    tokens:{
      OBJETO: objetoDe(compSeg),
      CLIENTE: (os.razaoSocial||"____").toUpperCase(),
      CLIENTE_CNPJ: os.cnpj? "CNPJ sob o nº "+os.cnpj : "CNPJ sob o nº ____",
      CLIENTE_ENDERECO: enderecoCliente(os),
      REPRESENTANTE: os.sindicoNome||"____",
      REPRESENTANTE_CPF: os.sindicoCpf? "CPF nº "+os.sindicoCpf : "CPF nº ____",
      INICIO: os.inicio? os.inicio.split("-").reverse().join("/") : "____",
      VALOR: valorTxt,
      LOCAL_DATA: localData,
      POSTOS_RESUMO: postosResumo(compSeg),
    },
    postosLista: postosLinhas(compSeg),
    postosTab: postosTabela(compSeg),
  };
}
function resolverModelo(modelo, ctx){
  const out=[];
  for(const b of (modelo.blocks||[])){
    if(b.dyn==="postos_lista"){ ctx.postosLista.forEach(l=> out.push({k:"p", t:l})); continue; }
    if(b.dyn==="postos_tabela"){ out.push({k:"tabela", rows:ctx.postosTab.rows.map(r=>[...r]), total:ctx.postosTab.total}); continue; }
    if(b.dyn==="sign"){ out.push({k:"sign", left:substTokens(b.left,ctx.tokens), leftSub:b.leftSub, right:b.right, rightSub:b.rightSub}); continue; }
    out.push({k:b.k, t:substTokens(b.t, ctx.tokens)});
  }
  return out;
}
function gerarContratosDaOS(os, prop, modelos){
  const comp = os.composicao||[];
  const segs = [...new Set(comp.map(c=> segDe(c.empresaId, c.cargo)))];
  const itens = prop? (prop.itens||[]) : [];
  const ano = new Date().getFullYear();
  return segs.map(seg=>{
    const compSeg = comp.filter(c=> segDe(c.empresaId,c.cargo)===seg);
    const valorSeg = itens.filter(it=> segDe(it.empresaId, cargoOS(it.tab))===seg).reduce((s,it)=>s+(Number(it.mensalLinha)||0),0);
    const ctx = ctxContrato(os, compSeg, valorSeg);
    const modelo = (modelos && modelos[seg]) || CONTRATO_MODELOS[seg];
    return { id:uid(), numero:"CT-"+ano+"-"+String(Math.floor(Math.random()*9000+1000)), criadoEm:today(),
      osId:os.id, osNumero:os.numero, propostaId:os.propostaId, propostaNumero:os.propostaNumero,
      segmento:seg, cliente:os.razaoSocial||"", valorMensal:valorSeg, status:"Rascunho",
      blocks: resolverModelo(modelo, ctx) };
  });
}

// destaque de tokens {{...}} em amarelo (usado na visualização do modelo)
function TokenHL({t}){
  const parts=String(t||"").split(/(\{\{\w+\}\})/g);
  return <>{parts.map((p,i)=> /^\{\{\w+\}\}$/.test(p)
    ? <span key={i} style={{backgroundColor:"#fff3a8", borderRadius:3, padding:"0 2px", fontWeight:600, color:"#7a5b00"}}>{p}</span>
    : <span key={i}>{p}</span>)}</>;
}

/* ----- bloco renderizado para impressão (PDF) ----- */
function BlocoPrint({b}){
  if(b.k==="title") return <div className="cbloco" style={{textAlign:"center",fontWeight:700,fontSize:"15px",margin:"0 0 14px",textTransform:"uppercase"}}>{b.t}</div>;
  if(b.k==="sub") return <div className="cbloco" style={{fontWeight:700,textAlign:"justify",margin:"0 0 12px",lineHeight:1.5}}>{b.t}</div>;
  if(b.k==="h") return <div className="cbloco" style={{fontWeight:700,margin:"14px 0 6px"}}>{b.t}</div>;
  if(b.k==="center") return <div className="cbloco" style={{textAlign:"center",fontWeight:700,margin:"14px 0"}}>{b.t}</div>;
  if(b.k==="tabela") return <table className="cbloco" style={{borderCollapse:"collapse",width:"70%",margin:"8px auto 12px"}}><tbody>
    <tr><th style={{border:"1px solid #333",padding:"4px 8px",background:"#eef2f5",textAlign:"left"}}>FUNÇÃO</th><th style={{border:"1px solid #333",padding:"4px 8px",background:"#eef2f5",width:120,textAlign:"center"}}>QUANTIDADE</th></tr>
    {(b.rows||[]).map((r,i)=><tr key={i}><td style={{border:"1px solid #333",padding:"4px 8px"}}>{r[0]}</td><td style={{border:"1px solid #333",padding:"4px 8px",textAlign:"center"}}>{r[1]}</td></tr>)}
    <tr><td style={{border:"1px solid #333",padding:"4px 8px",fontWeight:700}}>TOTAL</td><td style={{border:"1px solid #333",padding:"4px 8px",textAlign:"center",fontWeight:700}}>{pad2(b.total)} {b.total===1?"Vigilante":"Vigilantes"}</td></tr>
  </tbody></table>;
  if(b.k==="sign") return <div className="cbloco" style={{marginTop:38,display:"flex",gap:24,justifyContent:"space-between",textAlign:"center"}}>
    <div style={{flex:1}}><div style={{borderTop:"1px solid #333",margin:"0 8px 4px"}}/><div style={{fontWeight:700}}>{b.left}</div><div>{b.leftSub}</div></div>
    <div style={{flex:1}}><div style={{borderTop:"1px solid #333",margin:"0 8px 4px"}}/><div style={{fontWeight:700}}>{b.right}</div><div>{b.rightSub}</div></div>
  </div>;
  return <div className="cbloco" style={{textAlign:"justify",margin:"0 0 8px",lineHeight:1.5}}>{b.t}</div>;
}

/* ----- leitura e manutenção do contrato gerado ----- */
function ContratoView({contrato, onVoltar, onSalvar}){
  const [f,setF]=useState({...contrato, blocks:(contrato.blocks||[]).map(b=>({...b, rows:b.rows?b.rows.map(r=>[...r]):undefined}))});
  const [pdfMsg,setPdfMsg]=useState(""); const [dirty,setDirty]=useState(false);
  const printId = "contrato-print-"+contrato.id;
  const setBlk=(i,patch)=>{ setF(s=>({...s, blocks:s.blocks.map((b,x)=>x===i?{...b,...patch}:b)})); setDirty(true); };
  const setRow=(i,r,col,val)=>{ setF(s=>({...s, blocks:s.blocks.map((b,x)=>{ if(x!==i) return b; const rows=b.rows.map(rr=>[...rr]); rows[r][col]=val; return {...b,rows}; })})); setDirty(true); };
  const salvar=()=>{ onSalvar(f); setDirty(false); };

  const gerarPDF=async()=>{
    setPdfMsg("Gerando documento…");
    const el=document.getElementById(printId);
    const nome=`${f.numero} - ${f.cliente||"Contrato"}`.replace(/[\\/:*?"<>|]/g,"-");
    try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js");
      if(!window.html2pdf) throw new Error("html2pdf indisponível");
      const opt={ margin:[14,14,16,14], image:{type:"jpeg",quality:0.97},
        html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff"},
        jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}, pagebreak:{mode:["css","legacy"], avoid:".cbloco"} };
      const blob = await window.html2pdf().set(opt).from(el).outputPdf("blob");
      const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=nome+".pdf";
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),4000);
      setPdfMsg("PDF gerado — verifique os downloads."); setTimeout(()=>setPdfMsg(""),5000);
    }catch(err){ setPdfMsg("Não foi possível gerar pela biblioteca; abrindo a impressão do navegador (use “Salvar como PDF”)."); setTimeout(()=>window.print(),400); }
  };

  const Auto=({value,onChange,bold,center})=> <textarea value={value} onChange={e=>onChange(e.target.value)} rows={Math.max(1,Math.ceil((value||"").length/90))}
    className="w-full px-2 py-1.5 rounded border border-slate-200 text-[13px] leading-relaxed focus:outline-none focus:ring-1"
    style={{textAlign:center?"center":"justify", fontWeight:bold?700:400, resize:"vertical"}}/>;

  return <div>
    <div className="flex items-center justify-between mb-4 no-print gap-2 flex-wrap">
      <Btn variant="ghost" onClick={onVoltar}><ChevronRight size={16} className="rotate-180"/>Voltar</Btn>
      <div className="flex items-center gap-2">
        {pdfMsg && <span className="text-xs text-slate-500">{pdfMsg}</span>}
        <Btn variant="ghost" onClick={gerarPDF}><Download size={16}/>PDF</Btn>
        <Btn onClick={salvar}><Save size={16}/>Salvar alterações</Btn>
      </div>
    </div>

    <Card className="p-4 mb-4">
      <div className="flex items-center gap-2 flex-wrap text-sm">
        <Pill tone="navy">{f.numero}</Pill>
        <Pill tone={f.segmento==="vigilancia"?"teal":"slate"}>{SEG_LABEL[f.segmento]}</Pill>
        <span className="text-slate-500">Cliente: <b className="text-slate-700">{f.cliente||"—"}</b></span>
        <span className="text-slate-400">· OS {f.osNumero} · Mensal {BRL(f.valorMensal||0)}</span>
        {dirty && <span className="ml-auto text-xs text-amber-600">Alterações não salvas</span>}
      </div>
      <div className="text-[11px] text-slate-400 mt-2">Edite o texto livremente (ajustes solicitados pelo jurídico do cliente). As alterações ficam salvas no rascunho do contrato e refletem no PDF.</div>
    </Card>

    {/* Editor por blocos */}
    <Card className="p-5 space-y-2">
      {f.blocks.map((b,i)=>{
        if(b.k==="tabela") return <div key={i} className="rounded-lg border border-slate-200 p-3">
          <div className="text-xs font-semibold text-slate-500 mb-2">Tabela de postos</div>
          <table className="w-full text-sm"><thead><tr className="text-xs text-slate-500"><th className="text-left py-1">Função</th><th className="text-center py-1 w-28">Quantidade</th></tr></thead>
          <tbody>{b.rows.map((r,ri)=><tr key={ri}>
            <td className="py-1 pr-2"><input className={inputCls} value={r[0]} onChange={e=>setRow(i,ri,0,e.target.value)}/></td>
            <td className="py-1"><input className={inputCls+" text-center"} value={r[1]} onChange={e=>setRow(i,ri,1,e.target.value)}/></td></tr>)}</tbody></table>
          <div className="text-[11px] text-slate-400 mt-1">Total: {pad2(b.total)} {b.total===1?"Vigilante":"Vigilantes"}</div>
        </div>;
        if(b.k==="sign") return <div key={i} className="rounded-lg border border-slate-200 p-3 grid grid-cols-2 gap-3">
          <div><div className="text-xs font-semibold text-slate-500 mb-1">Assinatura — esquerda</div>
            <input className={inputCls} value={b.left} onChange={e=>setBlk(i,{left:e.target.value})}/>
            <input className={inputCls+" mt-1 text-xs"} value={b.leftSub} onChange={e=>setBlk(i,{leftSub:e.target.value})}/></div>
          <div><div className="text-xs font-semibold text-slate-500 mb-1">Assinatura — direita</div>
            <input className={inputCls} value={b.right} onChange={e=>setBlk(i,{right:e.target.value})}/>
            <input className={inputCls+" mt-1 text-xs"} value={b.rightSub} onChange={e=>setBlk(i,{rightSub:e.target.value})}/></div>
        </div>;
        const bold = b.k==="title"||b.k==="sub"||b.k==="h"||b.k==="center";
        const center = b.k==="title"||b.k==="center";
        return <Auto key={i} value={b.t} bold={bold} center={center} onChange={(v)=>setBlk(i,{t:v})}/>;
      })}
    </Card>

    {/* Área de impressão (PDF) — oculta na tela */}
    <div style={{position:"absolute", left:-99999, top:0, width:760}}>
      <div id={printId} style={{background:"#fff", padding:24, fontFamily:"Arial, sans-serif", fontSize:"12.5px", color:"#1f2937"}}>
        <div className="cbloco" style={{display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid #2F6690",paddingBottom:10,marginBottom:16}}>
          <Logo size={34}/>
          <div style={{marginLeft:"auto",textAlign:"right",color:"#64748b",fontSize:"11px"}}>{f.numero} · {SEG_LABEL[f.segmento]}</div>
        </div>
        {f.blocks.map((b,i)=><BlocoPrint key={i} b={b}/>)}
      </div>
    </div>
  </div>;
}

/* ----- editor do modelo (substituível) ----- */
function ModeloEditor({seg, modelo, onVoltar, onSalvar, onReset}){
  const [blocks,setBlocks]=useState((modelo.blocks||[]).map(b=>({...b})));
  const setT=(i,t)=> setBlocks(blocks.map((b,x)=>x===i?{...b,t}:b));
  return <div>
    <div className="flex items-center justify-between mb-4 gap-2 flex-wrap">
      <Btn variant="ghost" onClick={onVoltar}><ChevronRight size={16} className="rotate-180"/>Voltar</Btn>
      <div className="flex gap-2">
        <Btn variant="ghost" onClick={onReset}>Restaurar padrão</Btn>
        <Btn onClick={()=>onSalvar({blocks})}><Save size={16}/>Salvar modelo</Btn>
      </div>
    </div>
    <Card className="p-4 mb-4">
      <div className="font-semibold text-slate-800 mb-1">Modelo de contrato · {SEG_LABEL[seg]}</div>
      <div className="text-[12px] text-slate-500">Os campos em <span style={{backgroundColor:"#fff3a8",padding:"0 3px",borderRadius:3,fontWeight:600,color:"#7a5b00"}}>{"{{amarelo}}"}</span> são preenchidos automaticamente pelos dados da proposta/OS ao gerar o contrato (cliente, CNPJ, endereço, representante, postos, valor e datas). Edite o texto fixo abaixo para alterar o modelo padrão.</div>
    </Card>
    <Card className="p-5 space-y-2">
      {blocks.map((b,i)=>{
        if(b.dyn) return <div key={i} className="rounded-lg border border-dashed border-slate-300 bg-slate-50 px-3 py-2 text-xs text-slate-500">
          {b.dyn==="postos_lista" && "• Lista de postos (a, b, c…) — gerada automaticamente da composição da OS."}
          {b.dyn==="postos_tabela" && "• Tabela de postos (Função / Quantidade) — gerada automaticamente da composição da OS."}
          {b.dyn==="sign" && "• Bloco de assinaturas (CONTRATANTE / CONTRATADA) — preenchido automaticamente."}
        </div>;
        const bold=b.k==="title"||b.k==="sub"||b.k==="h"||b.k==="center";
        return <div key={i}>
          <textarea value={b.t} onChange={e=>setT(i,e.target.value)} rows={Math.max(1,Math.ceil((b.t||"").length/90))}
            className="w-full px-2 py-1.5 rounded border border-slate-200 text-[13px] leading-relaxed focus:outline-none focus:ring-1"
            style={{fontWeight:bold?700:400, resize:"vertical"}}/>
          {/\{\{\w+\}\}/.test(b.t) && <div className="text-[11px] text-slate-500 px-1 mt-0.5">Pré-visualização: <TokenHL t={b.t}/></div>}
        </div>;
      })}
    </Card>
  </div>;
}

function Contratos({me, isAdmin, props, oss, contratos, saveContratos, modelos, saveModelos}){
  const [modo,setModo]=useState("lista");      // lista | view | modelo
  const [atual,setAtual]=useState(null);
  const [segMod,setSegMod]=useState(null);
  const [confExc,setConfExc]=useState(null);

  const osEnviadas = (oss||[]).filter(o=> o.status==="Enviada" && (isAdmin || o.consultorNome===me.nome));
  const contratosDaOS=(osId)=> (contratos||[]).filter(c=>c.osId===osId);
  const meusContratos = (contratos||[]).filter(c=>{ const o=(oss||[]).find(x=>x.id===c.osId); return isAdmin || (o&&o.consultorNome===me.nome); });

  const gerar=(os)=>{ const prop=(props||[]).find(p=>p.id===os.propostaId);
    const novos=gerarContratosDaOS(os, prop, modelos);
    saveContratos([...novos, ...contratos]); };
  const abrir=(c)=>{ setAtual(c); setModo("view"); };
  const salvarContrato=(c)=>{ saveContratos(contratos.map(x=>x.id===c.id?c:x)); setAtual(c); };
  const excluir=(c)=> setConfExc({ titulo:"Excluir contrato", msg:`Excluir o contrato ${c.numero}? Esta ação não pode ser desfeita.`, acao:()=>saveContratos(contratos.filter(x=>x.id!==c.id)) });
  const abrirModelo=(seg)=>{ setSegMod(seg); setModo("modelo"); };
  const salvarModelo=(m)=>{ saveModelos({...modelos, [segMod]:m}); setModo("lista"); };
  const resetModelo=()=>{ saveModelos({...modelos, [segMod]:JSON.parse(JSON.stringify(CONTRATO_MODELOS[segMod]))}); setSegMod(s=>s); setModo("lista"); };

  if(modo==="view" && atual){ const c=(contratos||[]).find(x=>x.id===atual.id)||atual;
    return <ContratoView contrato={c} onVoltar={()=>setModo("lista")} onSalvar={salvarContrato}/>; }
  if(modo==="modelo" && segMod){ const m=(modelos&&modelos[segMod])||CONTRATO_MODELOS[segMod];
    return <ModeloEditor seg={segMod} modelo={m} onVoltar={()=>setModo("lista")} onSalvar={salvarModelo} onReset={resetModelo}/>; }

  return <div>
    <ConfirmDialog pend={confExc} onClose={()=>setConfExc(null)}/>
    <Header title="Contratos" sub="Modelos, geração a partir da OS e edição do texto"/>

    {/* Modelos de contrato (topo) */}
    <Card className="p-5 mb-5">
      <div className="font-semibold text-slate-800 mb-1">Modelos de contrato</div>
      <div className="text-[12px] text-slate-500 mb-3">Dois modelos: <b>Asseio</b> (cargos da RG Serviços) e <b>Vigilância</b> (cargos da GT Vig). Os trechos em amarelo são substituídos pelos dados da proposta/OS. Edite aqui para alterar o modelo padrão.</div>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {["asseio","vigilancia"].map(seg=>{ const m=(modelos&&modelos[seg])||CONTRATO_MODELOS[seg];
          return <div key={seg} className="rounded-lg border border-slate-200 p-3 flex items-center justify-between">
            <div><div className="font-medium text-slate-700">{SEG_LABEL[seg]}</div>
              <div className="text-[11px] text-slate-400">{(m.blocks||[]).length} blocos · modelo {seg==="asseio"?"Asseio":"Vigilância"}</div></div>
            <Btn variant="ghost" onClick={()=>abrirModelo(seg)}><Pencil size={15}/>Ver/editar</Btn>
          </div>; })}
      </div>
    </Card>

    {/* Gerar contratos a partir de OS Enviada */}
    <Card className="p-5 mb-5">
      <div className="font-semibold text-slate-800 mb-1">Gerar contratos</div>
      <div className="text-[12px] text-slate-500 mb-3">Disponível para Ordens de Serviço com status <b>Enviada</b>. Se a OS usar cargos de Asseio e Vigilância, são gerados dois contratos (um por segmento).</div>
      {osEnviadas.length===0 ? <Empty texto="Nenhuma OS com status “Enviada”. Marque uma OS como Enviada e salve para liberar a geração."/> :
        <div className="space-y-2">{osEnviadas.map(os=>{ const segs=[...new Set((os.composicao||[]).map(c=>segDe(c.empresaId,c.cargo)))]; const jaGerados=contratosDaOS(os.id);
          return <div key={os.id} className="rounded-lg border border-slate-200 p-3 flex items-center justify-between gap-3 flex-wrap">
            <div><div className="font-medium text-slate-800">{os.razaoSocial||"—"}</div>
              <div className="text-[11px] text-slate-500">{os.numero} · {segs.map(s=>SEG_LABEL[s]).join(" + ")} · {segs.length} contrato(s)</div></div>
            {jaGerados.length>0
              ? <span className="text-xs text-teal-700 bg-teal-50 px-2.5 py-1 rounded-full">{jaGerados.length} contrato(s) gerado(s)</span>
              : <Btn onClick={()=>gerar(os)}><FilePlus2 size={16}/>Gerar contrato(s)</Btn>}
          </div>; })}
        </div>}
    </Card>

    {/* Contratos gerados */}
    <Card className="overflow-hidden">
      <div className="px-4 pt-4 pb-2 font-semibold text-slate-800">Contratos gerados</div>
      {meusContratos.length===0 ? <Empty texto="Nenhum contrato gerado ainda."/> :
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-xs text-slate-500"><tr>
            <th className="text-left px-4 py-2.5 font-medium">Nº</th><th className="text-left px-4 py-2.5 font-medium">Cliente</th>
            <th className="text-left px-4 py-2.5 font-medium">Segmento</th><th className="text-left px-4 py-2.5 font-medium">OS</th>
            <th className="text-right px-4 py-2.5 font-medium">Mensal</th><th className="text-left px-4 py-2.5 font-medium">Criado</th><th></th></tr></thead>
          <tbody>{meusContratos.map(c=><tr key={c.id} className="border-t border-slate-50">
            <td className="px-4 py-2.5 text-slate-500">{c.numero}</td>
            <td className="px-4 py-2.5 text-slate-800 font-medium">{c.cliente||"—"}</td>
            <td className="px-4 py-2.5"><Pill tone={c.segmento==="vigilancia"?"teal":"slate"}>{c.segmento==="vigilancia"?"Vigilância":"Asseio"}</Pill></td>
            <td className="px-4 py-2.5 text-slate-500">{c.osNumero}</td>
            <td className="px-4 py-2.5 text-right text-slate-600">{BRL(c.valorMensal||0)}</td>
            <td className="px-4 py-2.5 text-slate-500">{(c.criadoEm||"").split("-").reverse().join("/")}</td>
            <td className="px-4 py-2.5 text-right whitespace-nowrap">
              <button onClick={()=>abrir(c)} className="text-slate-400 hover:text-slate-700 p-1.5" title="Abrir/editar"><Pencil size={16}/></button>
              <button onClick={()=>excluir(c)} className="text-slate-400 hover:text-rose-500 p-1.5" title="Excluir"><Trash2 size={16}/></button>
            </td></tr>)}</tbody>
        </table>}
    </Card>
  </div>;
}

function Usuarios({users, saveUsers, me, isAdmin}){
  const [edit,setEdit]=useState(null);
  const [confExc,setConfExc]=useState(null);
  const [errEdit,setErrEdit]=useState("");
  const novo=()=> { setErrEdit(""); setEdit({id:uid(), nome:"", email:"", login:"", senha:SENHA_INICIAL, precisaSenha:true, papel:"usuario", apresentacao:null, menus:menusAll(), _novo:true}); };
  const salvar=()=>{ if(!edit.nome.trim()||!edit.login.trim()){return;}
    const e={...edit}; delete e._novo;
    if(e.precisaSenha){ e.senha=SENHA_INICIAL; }   // 1º acesso: entra com 123456 e cria a própria senha
    else {
      if(!senhaValida(e.senha)){ setErrEdit("A senha deve ter exatamente 6 dígitos numéricos."); return; }
      if(e.senha===SENHA_INICIAL){ setErrEdit("123456 é a senha inicial; defina outra ou marque “primeiro acesso”."); return; }
      if(senhaDuplicada(users, e.senha, e.id)){ setErrEdit("Esta senha já está em uso por outro usuário."); return; }
    }
    const lista = edit._novo? [...users, e] : users.map(u=>u.id===e.id?e:u);
    saveUsers(lista); setErrEdit(""); setEdit(null); };
  const remover=(u)=>{ if(u.id===me.id) return;
    setConfExc({ titulo:"Excluir usuário", msg:`Excluir o usuário ${u.nome}? Esta ação não pode ser desfeita.`, acao:()=>saveUsers(users.filter(x=>x.id!==u.id)) }); };
  const up=(patch)=>setEdit({...edit,...patch});
  const toggleMenu=(k)=> up({menus:{...(edit.menus||menusAll()), [k]:!((edit.menus||menusAll())[k])}});
  const setTodos=(val)=> up({menus:Object.fromEntries(MENU_KEYS.map(k=>[k,val]))});
  const papelNome=(p)=> p==="admin"?"Administrador":(p==="financeiro"?"Financeiro":"Consultor");

  return <div>
    <ConfirmDialog pend={confExc} onClose={()=>setConfExc(null)}/>
    <Header title="Usuários" sub="Acesso ao sistema · perfis Administrador, Consultor e Financeiro"
      right={isAdmin && <Btn onClick={novo}><Plus size={16}/>Novo usuário</Btn>}/>
    {!isAdmin && <div className="mb-3 text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">Somente administradores podem incluir, editar ou excluir usuários e definir acessos de menu.</div>}
    <Card className="overflow-hidden">
      <table className="w-full text-sm">
        <thead className="bg-slate-50 text-xs text-slate-500"><tr>
          <th className="text-left px-4 py-2.5 font-medium">Nome</th><th className="text-left px-4 py-2.5 font-medium">Login</th>
          <th className="text-left px-4 py-2.5 font-medium">E-mail</th><th className="text-center px-4 py-2.5 font-medium">Perfil</th>
          <th className="text-center px-4 py-2.5 font-medium">Senha</th><th className="text-center px-4 py-2.5 font-medium">Menus</th><th></th></tr></thead>
        <tbody>{users.map(u=>{ const qMenus=MENU_KEYS.filter(k=>(u.menus||menusPorPapel(u.papel))[k]).length; return <tr key={u.id} className="border-t border-slate-50">
          <td className="px-4 py-3 font-medium text-slate-700">{u.nome}</td>
          <td className="px-4 py-3 text-slate-500">{u.login}</td><td className="px-4 py-3 text-slate-500">{u.email}</td>
          <td className="px-4 py-3 text-center">{u.papel==="admin"?<Pill tone="navy">Administrador</Pill>:(u.papel==="financeiro"?<Pill tone="teal">Financeiro</Pill>:<Pill>Consultor</Pill>)}</td>
          <td className="px-4 py-3 text-center">{(u.precisaSenha||!u.senha)?<Pill tone="teal">1º acesso pendente</Pill>:<span className="text-slate-400 text-xs">definida</span>}</td>
          <td className="px-4 py-3 text-center text-slate-500">{qMenus}/{MENU_KEYS.length}</td>
          <td className="px-4 py-3 text-right whitespace-nowrap">
            {isAdmin ? <>
              <button onClick={()=>{setErrEdit("");setEdit({...u, menus:{...(u.menus||menusPorPapel(u.papel))}});}} className="text-slate-400 hover:text-slate-700 px-2"><Pencil size={16}/></button>
              <button onClick={()=>remover(u)} disabled={u.id===me.id} className="text-rose-300 hover:text-rose-500 px-2 disabled:opacity-30"><Trash2 size={16}/></button>
            </> : <span className="text-slate-300 text-xs">—</span>}
          </td></tr>;})}</tbody>
      </table>
    </Card>

    {edit && isAdmin && <div className="fixed inset-0 bg-black/30 grid place-items-center p-4 z-50 overflow-auto" onClick={()=>setEdit(null)}>
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm w-full max-w-lg p-5 my-8" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4"><div className="font-semibold text-slate-800">{edit._novo?"Novo usuário":"Editar usuário"}</div>
          <button onClick={()=>setEdit(null)} className="text-slate-400"><X size={18}/></button></div>
        <div className="space-y-3">
          <Field label="Nome completo"><input className={inputCls} value={edit.nome} onChange={e=>up({nome:e.target.value})}/></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Login"><input className={inputCls} value={edit.login} onChange={e=>up({login:e.target.value})}/></Field>
            <Field label="E-mail"><input className={inputCls} value={edit.email} onChange={e=>up({email:e.target.value})}/></Field>
          </div>
          <Field label="Perfil"><select className={inputCls} value={edit.papel} onChange={e=>up({papel:e.target.value})}>
            <option value="usuario">Consultor</option><option value="admin">Administrador</option><option value="financeiro">Financeiro</option></select></Field>

          <div className="rounded-lg border border-slate-200 p-3">
            <label className="flex items-center gap-2 text-sm text-slate-700">
              <input type="checkbox" checked={!!edit.precisaSenha} onChange={e=>up({precisaSenha:e.target.checked, senha:e.target.checked?SENHA_INICIAL:""})} className="rounded"/>
              Exigir senha no primeiro acesso (senha inicial 123456)
            </label>
            {!edit.precisaSenha && <div className="mt-2"><Field label="Senha (6 dígitos numéricos)"><input inputMode="numeric" maxLength={6} className={inputCls} value={edit.senha||""} onChange={e=>up({senha:e.target.value.replace(/\D/g,"").slice(0,6)})} placeholder="ex.: 482190"/></Field></div>}
          </div>

          {/* Flags de acesso aos menus */}
          <div className="rounded-lg border border-slate-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide">Acesso aos menus</div>
              <div className="flex gap-2 text-[11px]">
                <button onClick={()=>setTodos(true)} className="text-slate-500 hover:text-slate-800">Marcar todos</button>
                <span className="text-slate-300">·</span>
                <button onClick={()=>setTodos(false)} className="text-slate-500 hover:text-slate-800">Limpar</button>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-x-4 gap-y-1.5">
              {MENU_DEFS.map(([k,label])=><label key={k} className="flex items-center gap-2 text-sm text-slate-600">
                <input type="checkbox" checked={!!(edit.menus||menusAll())[k]} onChange={()=>toggleMenu(k)} className="rounded"/>{label}</label>)}
            </div>
          </div>
        </div>
        {errEdit && <div className="text-sm text-rose-600 mt-3">{errEdit}</div>}
        <div className="flex justify-end gap-2 mt-5"><Btn variant="ghost" onClick={()=>{setErrEdit("");setEdit(null);}}>Cancelar</Btn><Btn onClick={salvar} disabled={!edit.nome.trim()||!edit.login.trim()}><Check size={16}/>Salvar</Btn></div>
      </div>
    </div>}
  </div>;
}


createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>

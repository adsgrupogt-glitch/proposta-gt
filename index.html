    <div className="space-y-4">
      {/* 1. DADOS DO CONTRATO */}
      <Card className="p-4">
        <div className="text-sm font-semibold text-slate-700 mb-3">1. Dados do contrato</div>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <Field label="Consultor(a)"><input className={inputCls} value={f.consultorNome} onChange={e=>set({consultorNome:e.target.value})}/></Field>
          <Field label="Supervisor"><input className={inputCls} value={f.supervisor} onChange={e=>set({supervisor:e.target.value})}/></Field>
          <Field label="Razão social"><input className={inputCls} value={f.razaoSocial} onChange={e=>set({razaoSocial:e.target.value})}/></Field>
          <Field label="CNPJ"><input className={inputCls} value={f.cnpj} onChange={e=>set({cnpj:e.target.value})}/></Field>
          <Field label="Endereço"><input className={inputCls} value={f.endereco} onChange={e=>set({endereco:e.target.value})}/></Field>
          <Field label="Número"><input className={inputCls} value={f.numeroEnd} onChange={e=>set({numeroEnd:e.target.value})}/></Field>
          <Field label="Bairro"><input className={inputCls} value={f.bairro} onChange={e=>set({bairro:e.target.value})}/></Field>
          <Field label="Cidade"><input className={inputCls} value={f.cidade} onChange={e=>set({cidade:e.target.value})}/></Field>
          <Field label="UF"><input className={inputCls} value={f.uf} onChange={e=>set({uf:e.target.value})}/></Field>
          <Field label="CEP"><input className={inputCls} value={f.cep} onChange={e=>set({cep:e.target.value})}/></Field>
          <Field label="Síndico(a)"><input className={inputCls} value={f.sindicoNome} onChange={e=>set({sindicoNome:e.target.value})}/></Field>
          <Field label="CPF"><input className={inputCls} value={f.sindicoCpf} onChange={e=>set({sindicoCpf:e.target.value})}/></Field>
          <Field label="Telefone (síndico)"><input className={inputCls} value={f.sindicoTel} onChange={e=>set({sindicoTel:e.target.value})}/></Field>
          <Field label="E-mail (síndico)"><input className={inputCls} value={f.sindicoEmail} onChange={e=>set({sindicoEmail:e.target.value})}/></Field>
          <div></div>
          <Field label="Administradora"><input className={inputCls} value={f.administradora} onChange={e=>set({administradora:e.target.value})}/></Field>
          <Field label="Telefone (adm.)"><input className={inputCls} value={f.admTel} onChange={e=>set({admTel:e.target.value})}/></Field>
          <Field label="E-mail (adm.)"><input className={inputCls} value={f.admEmail} onChange={e=>set({admEmail:e.target.value})}/></Field>
        </div>
        <Field label="Observações" className="mt-3"><textarea className={inputCls} rows={2} value={f.obs1} onChange={e=>set({obs1:e.target.value})}/></Field>
      </Card>

      {/* 2. DADOS DO CONTRATO */}
      <Card className="p-4">
        <div className="text-sm font-semibold text-slate-700 mb-3">2. Dados do contrato</div>
        <div className="grid grid-cols-1 sm:grid-cols-4 gap-3">
          <div className="sm:col-span-2"><Field label="Modalidade do contrato">
            <select className={inputCls} value={f.modalidade} onChange={e=>set({modalidade:e.target.value})}>
              <Opts list={OS_MODALIDADES} cur={f.modalidade}/></select></Field></div>
          <Field label="Início"><input type="date" className={inputCls} value={f.inicio} onChange={e=>set({inicio:e.target.value})}/></Field>
          <Field label="Término"><input type="date" className={inputCls} value={f.termino} onChange={e=>set({termino:e.target.value})}/></Field>
          <div className="sm:col-span-2"><Field label="Reaproveitamento de pessoal">
            <select className={inputCls} value={f.reaproveitamento} onChange={e=>set({reaproveitamento:e.target.value})}>
              <option>Não</option><option>Sim</option></select></Field></div>
        </div>
        <Field label="Observações" className="mt-3"><textarea className={inputCls} rows={2} value={f.obs2} onChange={e=>set({obs2:e.target.value})}/></Field>
      </Card>

      {/* 3. COMPOSIÇÃO DO CONTRATO */}
      <Card className="p-4">
        <div className="flex items-center justify-between mb-3">
          <div className="text-sm font-semibold text-slate-700">3. Composição do contrato</div>
          <Btn variant="soft" onClick={()=>addArr("composicao",{cargo:OS_CARGOS[0],jornada:OS_JORNADAS[0],qtd:1,empresa:"",descricao:""})}><Plus size={15}/>Linha</Btn>
        </div>
        <div className="grid grid-cols-12 gap-2 text-[11px] font-medium text-slate-400 px-1 mb-1">
          <div className="col-span-3">Cargo</div><div className="col-span-3">Empresa</div><div className="col-span-2">Jornada</div><div className="col-span-1 text-center">Qtd</div><div className="col-span-3">Descrição da jornada</div>
        </div>
        <div className="space-y-2">
          {f.composicao.map((c,i)=><div key={i} className="grid grid-cols-12 gap-2 items-center">
            <select className={inputCls+" col-span-3"} value={c.cargo} onChange={e=>setArr("composicao",i,{cargo:e.target.value})}><Opts list={OS_CARGOS} cur={c.cargo}/></select>
            <input className={inputCls+" col-span-3"} placeholder="Empresa" value={c.empresa} onChange={e=>setArr("composicao",i,{empresa:e.target.value})}/>
            <select className={inputCls+" col-span-2"} value={c.jornada} onChange={e=>setArr("composicao",i,{jornada:e.target.value})}><Opts list={OS_JORNADAS} cur={c.jornada}/></select>
            <input type="number" min="1" className={inputCls+" col-span-1"} value={c.qtd} onChange={e=>setArr("composicao",i,{qtd:e.target.value})}/>
            <input className={inputCls+" col-span-2"} placeholder="ex.: seg-sex 8h-17h" value={c.descricao} onChange={e=>setArr("composicao",i,{descricao:e.target.value})}/>
            <button onClick={()=>rmArr("composicao",i)} className="col-span-1 text-rose-400 hover:text-rose-600 grid place-items-center"><Trash2 size={16}/></button>
          </div>)}
        </div>
        <div className="text-[11px] text-slate-400 mt-2">A empresa é preenchida automaticamente pelo vínculo do cargo na proposta; pode ser ajustada manualmente se necessário.</div>
      </Card>

      {/* 4. ADICIONAIS */}
      <Card className="p-4">
        <div className="flex items-center justify-between mb-3">
          <div className="text-sm font-semibold text-slate-700">4. Adicionais do contrato (funcionários)</div>
          <Btn variant="soft" onClick={()=>addArr("adicionais",{tipo:OS_ADICIONAIS[0],valor:"",beneficiado:""})}><Plus size={15}/>Linha</Btn>
        </div>
        <div className="text-[11px] text-slate-400 mb-2">As gratificações marcadas no escopo da proposta (Assiduidade / Vale Alimentação) já vêm preenchidas. Você pode editar ou adicionar linhas.</div>
        {f.adicionais.length===0 && <div className="text-xs text-slate-400">Nenhum adicional.</div>}
        <div className="space-y-2">
          {f.adicionais.map((a,i)=><div key={i} className="grid grid-cols-12 gap-2 items-center">
            <select className={inputCls+" col-span-4"} value={a.tipo} onChange={e=>setArr("adicionais",i,{tipo:e.target.value})}><Opts list={OS_ADICIONAIS} cur={a.tipo}/></select>
            <input className={inputCls+" col-span-3"} placeholder="Valor" value={a.valor} onChange={e=>setArr("adicionais",i,{valor:e.target.value})}/>
            <input className={inputCls+" col-span-4"} placeholder="Qual beneficiado" value={a.beneficiado} onChange={e=>setArr("adicionais",i,{beneficiado:e.target.value})}/>
            <button onClick={()=>rmArr("adicionais",i)} className="col-span-1 text-rose-400 hover:text-rose-600 grid place-items-center"><Trash2 size={16}/></button>
          </div>)}
        </div>
      </Card>

      {/* 5. INSUMOS */}
      <Card className="p-4">
        <div className="text-sm font-semibold text-slate-700 mb-3">5. Insumos para o contrato</div>

        <div className="flex items-center justify-between mb-2">
          <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide">Materiais específicos</div>
          <Btn variant="soft" onClick={()=>addArr("materiais",{desc:"",custo:"",meses:"",total:"",_auto:false})}><Plus size={15}/>Material</Btn>
        </div>
        <div className="text-[11px] text-slate-400 mb-2">Vêm automáticos dos “Materiais específicos” da proposta. Você pode editar ou adicionar linhas.</div>
        <div className="grid grid-cols-12 gap-2 text-[11px] font-medium text-slate-400 px-1 mb-1">
          <div className="col-span-5">Descrição</div><div className="col-span-2 text-right">Custo</div><div className="col-span-2 text-center">Meses deprec.</div><div className="col-span-2 text-right">Total</div>
        </div>
        {(f.materiais||[]).length===0 && <div className="text-xs text-slate-400 mb-2">Nenhum material.</div>}
        <div className="space-y-2 mb-4">
          {(f.materiais||[]).map((mt,i)=><div key={i} className="grid grid-cols-12 gap-2 items-center">
            <input className={inputCls+" col-span-5"} placeholder="Descrição (ex.: Celular do contrato)" value={mt.desc} onChange={e=>setArr("materiais",i,{desc:e.target.value})}/>
            <input className={inputCls+" col-span-2 text-right"} placeholder="0,00" value={mt.custo} onChange={e=>setArr("materiais",i,{custo:e.target.value})}/>
            <input type="number" min="0" className={inputCls+" col-span-2"} placeholder="meses" value={mt.meses} onChange={e=>setArr("materiais",i,{meses:e.target.value})}/>
            <input className={inputCls+" col-span-2 text-right"} placeholder="0,00" value={mt.total} onChange={e=>setArr("materiais",i,{total:e.target.value})}/>
            <button onClick={()=>rmArr("materiais",i)} className="col-span-1 text-rose-400 hover:text-rose-600 grid place-items-center"><Trash2 size={16}/></button>
          </div>)}
        </div>

        <div className="flex items-center justify-between mb-2 border-t border-slate-100 pt-3">
          <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide">Outros insumos</div>
          <Btn variant="soft" onClick={()=>addArr("insumos",{insumo:OS_INSUMOS[0],classificacao:OS_CLASSIF[0],detalhes:""})}><Plus size={15}/>Insumo</Btn>
        </div>
        {f.insumos.length===0 && <div className="text-xs text-slate-400">Nenhum insumo complementar.</div>}
        <div className="space-y-2">
          {f.insumos.map((s,i)=><div key={i} className="grid grid-cols-12 gap-2 items-center">
            <select className={inputCls+" col-span-3"} value={s.insumo} onChange={e=>setArr("insumos",i,{insumo:e.target.value})}><Opts list={OS_INSUMOS} cur={s.insumo}/></select>
            <select className={inputCls+" col-span-3"} value={s.classificacao} onChange={e=>setArr("insumos",i,{classificacao:e.target.value})}><Opts list={OS_CLASSIF} cur={s.classificacao}/></select>
            <input className={inputCls+" col-span-5"} placeholder="Detalhes sobre o insumo" value={s.detalhes} onChange={e=>setArr("insumos",i,{detalhes:e.target.value})}/>
            <button onClick={()=>rmArr("insumos",i)} className="col-span-1 text-rose-400 hover:text-rose-600 grid place-items-center"><Trash2 size={16}/></button>
          </div>)}
        </div>
      </Card>

      {/* 6. DOCUMENTAÇÃO + CHECKLIST */}
      <Card className="p-4">
        <div className="flex items-center justify-between mb-3">
          <div className="text-sm font-semibold text-slate-700">6. Documentação</div>
          <Btn variant="soft" onClick={()=>addArr("documentacao",{tipo:OS_DOCS[0],confeccionado:"",dataImplantacao:today()})}><Plus size={15}/>Linha</Btn>
        </div>
        <div className="space-y-2 mb-4">
          {f.documentacao.map((d,i)=><div key={i} className="grid grid-cols-12 gap-2 items-center">
            <select className={inputCls+" col-span-4"} value={d.tipo} onChange={e=>setArr("documentacao",i,{tipo:e.target.value})}><Opts list={OS_DOCS} cur={d.tipo}/></select>
            <select className={inputCls+" col-span-3"} value={d.confeccionado} onChange={e=>setArr("documentacao",i,{confeccionado:e.target.value})}><option value="">Confeccionado?</option><option>Sim</option><option>Não</option></select>
            <input type="date" className={inputCls+" col-span-4"} value={d.dataImplantacao} onChange={e=>setArr("documentacao",i,{dataImplantacao:e.target.value})}/>
            <button onClick={()=>rmArr("documentacao",i)} className="col-span-1 text-rose-400 hover:text-rose-600 grid place-items-center"><Trash2 size={16}/></button>
          </div>)}
        </div>
        <div className="text-sm font-semibold text-slate-700 mb-2">Check-list cadastral</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-1.5">
          {CHECKLIST_ITENS.map(([k,lab])=><label key={k} className="flex items-center gap-2 text-sm text-slate-600">
            <input type="checkbox" checked={!!f.checklist[k]} onChange={e=>setChk(k,e.target.checked)} className="rounded"/>{lab}</label>)}
        </div>
      </Card>
    </div>
  </div>;
}

function OSView({os, onVoltar, onEditar}){
  const [pdfMsg,setPdfMsg]=useState("");
  const [pdfBusy,setPdfBusy]=useState(false);
  const gerarPDF=async()=>{
    setPdfBusy(true); setPdfMsg("Gerando documento…");
    const el=document.getElementById("os-print-area");
    const nome=`${os.numero} - ${os.razaoSocial||"OS"}`.replace(/[\\/:*?"<>|]/g,"-");
    try{
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js");
      if(!window.html2pdf) throw new Error("html2pdf indisponível");
      const opt={ margin:[8,8,10,8], image:{type:"jpeg",quality:0.97},
        html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff"},
        jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}, pagebreak:{mode:["css","legacy"], avoid:".quadro"} };
      // gera como Blob e baixa por link (download confiável dentro do sandbox)
      const blob = await window.html2pdf().set(opt).from(el).outputPdf("blob");
      const url = URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=url; a.download=nome+".pdf"; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),4000);
      setPdfMsg("PDF gerado — verifique os downloads."); setTimeout(()=>setPdfMsg(""),5000);
    }catch(err){
      setPdfMsg("Não foi possível gerar o PDF pela biblioteca; abrindo a janela de impressão do navegador (use “Salvar como PDF”).");
      setTimeout(()=>{ window.print(); },400);
    }
    setPdfBusy(false);
  };
  const Cell=({children,cls=""})=> <td className={"border border-slate-300 px-2 py-1 align-top "+cls}>{children}</td>;
  const Lab=({children})=> <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wide">{children}</span>;
  const prest = os.prestadoras||[];

  return <div>
    <div className="flex items-center justify-between mb-4 no-print gap-2 flex-wrap">
      <Btn variant="ghost" onClick={onVoltar}><ChevronRight size={16} className="rotate-180"/>Voltar</Btn>
      <div className="flex items-center gap-2 flex-wrap">
        <Btn variant="ghost" onClick={onEditar}><Pencil size={16}/>Editar</Btn>
        <Btn onClick={gerarPDF} disabled={pdfBusy}><FileText size={16}/>{pdfBusy?"Gerando…":"PDF (Imprimir OS)"}</Btn>
      </div>
    </div>
    {pdfMsg && <div className="no-print mb-3 text-xs text-slate-600 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">{pdfMsg}</div>}

    <div id="os-print-area" className="bg-white rounded-xl border border-slate-200 print-area p-6 text-[11px]">
      <div className="flex items-center gap-3 mb-4 pb-3 border-b-2" style={{borderColor:C.navy}}>
        <Logo size={34}/>
        <div className="ml-auto text-right"><div className="text-xl font-bold text-slate-800">Ordem de Serviço</div>
          <div className="text-slate-400">{os.numero} · emitida em {os.criadoEm.split("-").reverse().join("/")}</div></div>
      </div>

      {/* Empresa(s) prestadora(s) — antes do quadro 1 */}
      <div className="quadro mb-3">
        <div className="font-bold text-white px-2 py-1 mb-1" style={{backgroundColor:C.navy}}>EMPRESA(S) PRESTADORA(S)</div>
        <table className="w-full border-collapse">
          <tbody>{prest.length? prest.map((p,i)=><tr key={i}><Cell><div className="font-semibold text-slate-700">{p.razaoSocial}</div><div className="text-slate-500">CNPJ {p.cnpj}{p.regime?` · ${p.regime}`:""}</div></Cell></tr>) : <tr><Cell cls="text-slate-400 text-center">—</Cell></tr>}</tbody>
        </table>
      </div>

      {/* 1 */}
      <div className="quadro mb-3">
        <div className="font-bold text-white px-2 py-1 mb-1" style={{backgroundColor:C.navy}}>1. DADOS DO CONTRATO</div>
        <table className="w-full border-collapse">
          <tbody>
            <tr><Cell><Lab>Razão Social</Lab><div>{os.razaoSocial}</div></Cell><Cell><Lab>Consultor(a)</Lab><div>{os.consultorNome}</div></Cell><Cell><Lab>Supervisor</Lab><div>{os.supervisor||"—"}</div></Cell></tr>
            <tr><Cell><Lab>CNPJ</Lab><div>{os.cnpj||"—"}</div></Cell><Cell colSpan={2}><Lab>Endereço</Lab><div>{os.endereco||"—"} {os.numeroEnd&&("nº "+os.numeroEnd)}</div></Cell></tr>
            <tr><Cell><Lab>Bairro</Lab><div>{os.bairro||"—"}</div></Cell><Cell><Lab>Cidade</Lab><div>{os.cidade||"—"}</div></Cell><Cell><Lab>UF / CEP</Lab><div>{os.uf} {os.cep&&("· "+os.cep)}</div></Cell></tr>
            <tr><Cell><Lab>Síndico(a)</Lab><div>{os.sindicoNome||"—"}</div></Cell><Cell><Lab>CPF</Lab><div>{os.sindicoCpf||"—"}</div></Cell><Cell><Lab>Telefone</Lab><div>{os.sindicoTel||"—"}</div></Cell></tr>
            <tr><Cell><Lab>E-mail (síndico)</Lab><div>{os.sindicoEmail||"—"}</div></Cell><Cell><Lab>Administradora</Lab><div>{os.administradora||"—"}</div></Cell><Cell><Lab>Tel / E-mail (adm.)</Lab><div>{[os.admTel,os.admEmail].filter(Boolean).join(" · ")||"—"}</div></Cell></tr>
            {os.obs1 && <tr><Cell colSpan={3}><Lab>Observações</Lab><div>{os.obs1}</div></Cell></tr>}
          </tbody>
        </table>
      </div>

      {/* 2 */}
      <div className="quadro mb-3">
        <div className="font-bold text-white px-2 py-1 mb-1" style={{backgroundColor:C.navy}}>2. DADOS DO CONTRATO</div>
        <table className="w-full border-collapse">
          <tbody>
            <tr><Cell><Lab>Modalidade</Lab><div>{os.modalidade}</div></Cell><Cell><Lab>Início</Lab><div>{os.inicio? os.inicio.split("-").reverse().join("/"):"—"}</div></Cell><Cell><Lab>Término</Lab><div>{os.termino? os.termino.split("-").reverse().join("/"):"—"}</div></Cell></tr>
            <tr><Cell><Lab>Reaproveitamento de pessoal</Lab><div>{os.reaproveitamento}</div></Cell><Cell colSpan={2}><Lab>Observações</Lab><div>{os.obs2||"—"}</div></Cell></tr>
          </tbody>
        </table>
      </div>

      {/* 3 */}
      <div className="quadro mb-3">
        <div className="font-bold text-white px-2 py-1 mb-1" style={{backgroundColor:C.navy}}>3. COMPOSIÇÃO DO CONTRATO</div>
        <table className="w-full border-collapse">
          <thead><tr className="text-[10px] text-slate-500"><th className="border border-slate-300 px-2 py-1 text-left">Cargo</th><th className="border border-slate-300 px-2 py-1 text-left">Empresa</th><th className="border border-slate-300 px-2 py-1 text-left w-20">Jornada</th><th className="border border-slate-300 px-2 py-1 w-12">Qtd</th><th className="border border-slate-300 px-2 py-1 text-left">Descrição da jornada</th></tr></thead>
          <tbody>{os.composicao.map((c,i)=><tr key={i}><Cell>{c.cargo}</Cell><Cell>{c.empresa||"—"}</Cell><Cell>{c.jornada}</Cell><Cell cls="text-center">{c.qtd}</Cell><Cell>{c.descricao||"—"}</Cell></tr>)}</tbody>
        </table>
      </div>

      {/* 4 */}
      <div className="quadro mb-3">
        <div className="font-bold text-white px-2 py-1 mb-1" style={{backgroundColor:C.navy}}>4. ADICIONAIS DO CONTRATO (FUNCIONÁRIOS)</div>
        <table className="w-full border-collapse">
          <thead><tr className="text-[10px] text-slate-500"><th className="border border-slate-300 px-2 py-1 text-left">Tipo de adicional</th><th className="border border-slate-300 px-2 py-1 text-left w-28">Valor</th><th className="border border-slate-300 px-2 py-1 text-left">Qual beneficiado</th></tr></thead>
          <tbody>{os.adicionais.length? os.adicionais.map((a,i)=><tr key={i}><Cell>{a.tipo}</Cell><Cell>{a.valor}</Cell><Cell>{a.beneficiado}</Cell></tr>) : <tr><Cell colSpan={3} cls="text-slate-400 text-center">—</Cell></tr>}</tbody>
        </table>
      </div>

      {/* 5 */}
      <div className="quadro mb-3">
        <div className="font-bold text-white px-2 py-1 mb-1" style={{backgroundColor:C.navy}}>5. INSUMOS PARA O CONTRATO</div>
        {(os.materiais&&os.materiais.length>0) && <>
          <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wide mt-1 mb-1">Materiais específicos</div>
          <table className="w-full border-collapse mb-2">
            <thead><tr className="text-[10px] text-slate-500"><th className="border border-slate-300 px-2 py-1 text-left">Descrição</th><th className="border border-slate-300 px-2 py-1 text-right w-28">Custo</th><th className="border border-slate-300 px-2 py-1 text-center w-28">Meses deprec.</th><th className="border border-slate-300 px-2 py-1 text-right w-28">Total</th></tr></thead>
            <tbody>{os.materiais.map((mt,i)=><tr key={i}><Cell>{mt.desc||"—"}</Cell><Cell cls="text-right">{BRL(num(mt.custo))}</Cell><Cell cls="text-center">{mt.meses||"—"}</Cell><Cell cls="text-right">{BRL(num(mt.total))}</Cell></tr>)}</tbody>
          </table>
        </>}
        <table className="w-full border-collapse">
          <thead><tr className="text-[10px] text-slate-500"><th className="border border-slate-300 px-2 py-1 text-left">Insumo</th><th className="border border-slate-300 px-2 py-1 text-left w-32">Classificação</th><th className="border border-slate-300 px-2 py-1 text-left">Detalhes</th></tr></thead>
          <tbody>{os.insumos.length? os.insumos.map((s,i)=><tr key={i}><Cell>{s.insumo}</Cell><Cell>{s.classificacao}</Cell><Cell>{s.detalhes}</Cell></tr>) : <tr><Cell colSpan={3} cls="text-slate-400 text-center">—</Cell></tr>}</tbody>
        </table>
      </div>

      {/* 6 */}
      <div className="quadro mb-3">
        <div className="font-bold text-white px-2 py-1 mb-1" style={{backgroundColor:C.navy}}>6. DOCUMENTAÇÃO</div>
        <table className="w-full border-collapse">
          <thead><tr className="text-[10px] text-slate-500"><th className="border border-slate-300 px-2 py-1 text-left">Tipo do documento</th><th className="border border-slate-300 px-2 py-1 w-28">Confeccionado?</th><th className="border border-slate-300 px-2 py-1 text-left w-40">Data da implantação</th></tr></thead>
          <tbody>{os.documentacao.map((d,i)=><tr key={i}><Cell>{d.tipo}</Cell><Cell cls="text-center">{d.confeccionado||"—"}</Cell><Cell>{d.dataImplantacao? d.dataImplantacao.split("-").reverse().join("/"):"—"}</Cell></tr>)}</tbody>
        </table>
      </div>

      {/* checklist */}
      <div className="quadro">
        <div className="font-semibold text-slate-600 bg-slate-100 px-2 py-1 mb-1 border border-slate-200">CHECK-LIST CADASTRAL</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-1 px-1">
          {CHECKLIST_ITENS.map(([k,lab])=><div key={k} className="flex items-center gap-2">
            <span className={"w-3.5 h-3.5 grid place-items-center border rounded-sm "+(os.checklist[k]?"text-white":"text-transparent")} style={os.checklist[k]?{backgroundColor:C.teal,borderColor:C.teal}:{borderColor:"#cbd5e1"}}><Check size={11}/></span>
            <span className="text-slate-600">{lab}</span></div>)}
        </div>
      </div>

      <div className="mt-6 text-[10px] text-slate-400 text-center border-t border-slate-100 pt-2">Grupo GT · Ordem de Serviço Comercial · {os.numero}</div>
    </div>
  </div>;
}


/* ===================== RELATÓRIOS ===================== */
function exportCsvFile(name, head, rows){
  const csv=[head,...rows].map(r=>r.map(x=>`"${(x==null?"":x).toString().replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove();
}
function SortableTable({cols, rows, sortInit, empty}){
  const [s,setS]=useState(sortInit||{k:cols[0].key, dir:"asc"});
  const cmp=cols.find(c=>c.key===s.k)||cols[0];
  const val=(row)=> cmp.sortVal? cmp.sortVal(row) : row[cmp.key];
  const sorted=[...rows].sort((a,b)=>{ let va=val(a),vb=val(b);
    if(typeof va==="string") va=va.toLowerCase(); if(typeof vb==="string") vb=vb.toLowerCase();
    if(va<vb) return s.dir==="asc"?-1:1; if(va>vb) return s.dir==="asc"?1:-1; return 0; });
  const toggle=(k,defDir)=> setS(p=> p.k===k? {k,dir:p.dir==="asc"?"desc":"asc"} : {k,dir:defDir||"asc"});
  if(!rows.length) return <Empty texto={empty||"Sem dados para os filtros selecionados."}/>;
  return <div className="overflow-x-auto"><table className="w-full text-sm">
    <thead className="bg-slate-50 text-xs text-slate-500"><tr>{cols.map(c=>
      <th key={c.key} onClick={()=>c.sort!==false&&toggle(c.key,c.defDir)} className={`px-3 py-2.5 font-medium whitespace-nowrap ${c.align==="right"?"text-right":c.align==="center"?"text-center":"text-left"} ${c.sort!==false?"cursor-pointer select-none hover:text-slate-700":""}`}>
        {c.label}{s.k===c.key?(s.dir==="asc"?" ▲":" ▼"):""}</th>)}</tr></thead>
    <tbody>{sorted.map((row,i)=><tr key={row.id||i} className="border-t border-slate-50">{cols.map(c=>
      <td key={c.key} className={`px-3 py-2.5 ${c.align==="right"?"text-right":c.align==="center"?"text-center":""} ${c.cls||"text-slate-600"}`}>{c.fmt?c.fmt(row):row[c.key]}</td>)}</tr>)}</tbody>
  </table></div>;
}

function Relatorios({me, isAdmin, props, oss=[], contratos=[], users}){
  const [aba,setAba]=useState("propostas");
  const [scope,setScope]=useState(isAdmin?"all":"me");
  const [periodo,setPeriodo]=useState("tudo");
  const [status,setStatus]=useState("todos");
  const [seg,setSeg]=useState("todos");
  const [reg,setReg]=useState("todos");
  const [cons,setCons]=useState("todos");
  const [tipo,setTipo]=useState("todas");   // todas | normais | extras
  const [busca,setBusca]=useState("");
  const anoAtual=new Date().getFullYear();

  const inPeriodo=(d)=>{ if(periodo==="tudo") return true; if(periodo==="ano") return String(d||"").slice(0,4)===String(anoAtual);
    const lim=new Date(); lim.setMonth(lim.getMonth()-11); lim.setDate(1); return new Date(String(d||"1970-01-01").slice(0,10)+"T00:00:00")>=lim; };
  const propById=useMemo(()=>{ const m={}; props.forEach(p=>m[p.id]=p); return m; },[props]);
  const segDaOS=(o)=>{ const segs=[...new Set((o.composicao||[]).map(c=>segDe(c.empresaId,c.cargo)))]; return segs.length>1?"misto":(segs[0]||"asseio"); };
  const consultores=useMemo(()=>[...new Map(props.map(p=>[p.consultorId,p.consultorNome])).entries()].map(([id,nome])=>({id,nome})),[props]);
  const tipoOk=(p)=> tipo==="todas"? true : tipo==="extras"? !!(p&&p.extra) : !(p&&p.extra);

  // base de propostas filtrada
  const fProp = useMemo(()=> props.filter(p=>
    (scope==="me"? p.consultorId===me.id : true) && inPeriodo(p.criadoEm) && tipoOk(p)
    && (status==="todos"||p.status===status) && (seg==="todos"||(p.segmento||"")===seg)
    && (reg==="todos"||p.regiao===reg) && (cons==="todos"||p.consultorId===cons)
    && (!busca || (p.razaoSocial||"").toLowerCase().includes(busca.toLowerCase()) || (p.numero||"").toLowerCase().includes(busca.toLowerCase()))
  ),[props,scope,periodo,tipo,status,seg,reg,cons,busca,me.id]);

  const matchScopeOS=(o)=>{ const p=propById[o.propostaId]; return scope==="me"? (p? p.consultorId===me.id : o.consultorNome===me.nome) : true; };
  const fOS = useMemo(()=> oss.filter(o=> matchScopeOS(o) && inPeriodo(o.criadoEm) && tipoOk(propById[o.propostaId])
    && (seg==="todos"||segDaOS(o)===seg) && (reg==="todos"|| (propById[o.propostaId]?.regiao===reg))
    && (cons==="todos"|| (propById[o.propostaId]?.consultorId===cons))
    && (!busca || (o.razaoSocial||"").toLowerCase().includes(busca.toLowerCase()) || (o.numero||"").toLowerCase().includes(busca.toLowerCase()))
  ),[oss,scope,periodo,tipo,seg,reg,cons,busca,propById,me.id,me.nome]);

  const fCT = useMemo(()=> contratos.filter(c=>{ const o=oss.find(x=>x.id===c.osId); const p=propById[c.propostaId];
    return (scope==="me"? (p? p.consultorId===me.id : (o&&o.consultorNome===me.nome)) : true) && inPeriodo(c.criadoEm) && tipoOk(p)
      && (seg==="todos"||c.segmento===seg) && (reg==="todos"|| (p?.regiao===reg)) && (cons==="todos"|| (p?.consultorId===cons))
      && (!busca || (c.cliente||"").toLowerCase().includes(busca.toLowerCase()) || (c.numero||"").toLowerCase().includes(busca.toLowerCase()));
  }),[contratos,oss,scope,periodo,tipo,seg,reg,cons,busca,propById,me.id,me.nome]);

  const segNome=(s)=> s==="vigilancia"?"Vigilância":s==="misto"?"Misto":"Asseio";
  const regNome=(r)=> r==="BC"?"Litoral Norte":r==="FPOLIS"?"Florianópolis":r||"—";

  const fechadas=fProp.filter(p=>p.status==="Fechada");
  const ABAS=[["propostas","Propostas"],["os","Ordens de Serviço"],["contratos","Contratos"],["consultores","Consultores"],["carteira","Carteira por cliente"]];

  // exportações
  const expProp=()=> exportCsvFile("propostas.csv",
    ["Numero","Data","Cliente","CNPJ","Consultor","Regiao","Segmento","Meses","Mensal","Global","Status"],
    fProp.map(p=>[p.numero,ptData(p.criadoEm),p.razaoSocial,p.clienteCnpj,p.consultorNome,regNome(p.regiao),segNome(p.segmento),p.meses,p.valorMensalTotal.toFixed(2),p.valorGlobal.toFixed(2),p.status]));
  const expOS=()=> exportCsvFile("ordens_servico.csv",
    ["Numero","Data","Cliente","Proposta","Consultor","Segmento","Inicio","Status"],
    fOS.map(o=>[o.numero,ptData(o.criadoEm),o.razaoSocial,o.propostaNumero,o.consultorNome,segNome(segDaOS(o)),ptData(o.inicio),o.status]));
  const expCT=()=> exportCsvFile("contratos.csv",
    ["Numero","Data","Cliente","Segmento","OS","Proposta","MensalContrato","Status"],
    fCT.map(c=>[c.numero,ptData(c.criadoEm),c.cliente,segNome(c.segmento),c.osNumero,c.propostaNumero,(c.valorMensal||0).toFixed(2),c.status]));

  // consultores agregado
  const aggCons = useMemo(()=>{ const m={};
    fProp.forEach(p=>{ const k=p.consultorNome||"—"; (m[k]=m[k]||{nome:k,total:0,fechadas:0,perdidas:0,enviadas:0,global:0,mrr:0});
      const o=m[k]; o.total++; if(p.status==="Fechada"){o.fechadas++;o.global+=p.valorGlobal;o.mrr+=p.valorMensalTotal;}
      if(p.status==="Perdida")o.perdidas++; if(p.status==="Enviada")o.enviadas++; });
    return Object.values(m).map(o=>({...o, conv:(o.fechadas+o.perdidas)?o.fechadas/(o.fechadas+o.perdidas)*100:0}));
  },[fProp]);
  const expCons=()=> exportCsvFile("consultores.csv",
    ["Consultor","Propostas","Enviadas","Fechadas","Perdidas","Conversao","MRR","Global"],
    aggCons.map(r=>[r.nome,r.total,r.enviadas,r.fechadas,r.perdidas,r.conv.toFixed(1)+"%",r.mrr.toFixed(2),r.global.toFixed(2)]));

  // carteira por cliente (fechadas)
  const aggCli = useMemo(()=>{ const m={};
    fechadas.forEach(p=>{ const k=p.razaoSocial||"—"; (m[k]=m[k]||{cliente:k,cnpj:p.clienteCnpj,propostas:0,mrr:0,global:0,regiao:p.regiao,segmento:p.segmento});
      const o=m[k]; o.propostas++; o.mrr+=p.valorMensalTotal; o.global+=p.valorGlobal; });
    return Object.values(m).sort((a,b)=>b.mrr-a.mrr);
  },[fechadas]);
  const expCli=()=> exportCsvFile("carteira_clientes.csv",
    ["Cliente","CNPJ","Regiao","Segmento","Propostas","MRR","Global"],
    aggCli.map(r=>[r.cliente,r.cnpj,regNome(r.regiao),segNome(r.segmento),r.propostas,r.mrr.toFixed(2),r.global.toFixed(2)]));

  const exportar=()=>({propostas:expProp, os:expOS, contratos:expCT, consultores:expCons, carteira:expCli}[aba]());

  // KPIs por aba
  const kpis=()=>{
    if(aba==="propostas"){ const mrr=fechadas.reduce((s,p)=>s+p.valorMensalTotal,0), g=fechadas.reduce((s,p)=>s+p.valorGlobal,0);
      const dec=fechadas.length+fProp.filter(p=>p.status==="Perdida").length;
      return [["Propostas",fProp.length],["MRR fechado",BRL(mrr)],["Global fechado",BRL(g)],["Conversão",(dec?fechadas.length/dec*100:0).toFixed(0)+"%"]]; }
    if(aba==="os"){ const env=fOS.filter(o=>o.status==="Enviada").length;
      return [["Ordens de serviço",fOS.length],["Enviadas",env],["Rascunho",fOS.length-env],["% enviadas",(fOS.length?env/fOS.length*100:0).toFixed(0)+"%"]]; }
    if(aba==="contratos"){ const mensal=fCT.reduce((s,c)=>s+(c.valorMensal||0),0);
      return [["Contratos",fCT.length],["Mensal contratado",BRL(mensal)],["Asseio",fCT.filter(c=>c.segmento==="asseio").length],["Vigilância",fCT.filter(c=>c.segmento==="vigilancia").length]]; }
    if(aba==="consultores"){ const g=aggCons.reduce((s,r)=>s+r.global,0), mrr=aggCons.reduce((s,r)=>s+r.mrr,0);
      return [["Consultores",aggCons.length],["MRR fechado",BRL(mrr)],["Global fechado",BRL(g)],["Propostas",aggCons.reduce((s,r)=>s+r.total,0)]]; }
    const mrr=aggCli.reduce((s,r)=>s+r.mrr,0);
    return [["Clientes ativos",aggCli.length],["MRR total",BRL(mrr)],["Ticket médio mensal",BRL(aggCli.length?mrr/aggCli.length:0)],["Global",BRL(aggCli.reduce((s,r)=>s+r.global,0))]];
  };
  const kpiIcons=[FileText,BarChart3,Wallet,ShieldCheck];

  return <div>
    <Header title="Relatórios" sub="Filtre, ordene, analise e exporte"
      right={<Btn variant="soft" onClick={exportar}><Download size={16}/>Exportar CSV</Btn>}/>

    {/* Abas */}
    <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1 mb-4 overflow-x-auto">
      {ABAS.map(([k,l])=><button key={k} onClick={()=>setAba(k)} className={`px-3.5 py-1.5 rounded-md text-sm font-medium whitespace-nowrap ${aba===k?"text-white":"text-slate-600"}`} style={aba===k?{backgroundColor:C.navy}:{}}>{l}</button>)}
    </div>

    {/* Filtros */}
    <div className="flex flex-wrap items-center gap-2 mb-4">
      {isAdmin && <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">
        {[["all","Setor"],["me","Eu"]].map(([k,l])=><button key={k} onClick={()=>setScope(k)} className={`px-3 py-1.5 rounded-md text-sm font-medium ${scope===k?"text-white":"text-slate-600"}`} style={scope===k?{backgroundColor:C.navy}:{}}>{l}</button>)}</div>}
      <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">
        {[["todas","Todas"],["normais","Normais"],["extras","Extras"]].map(([k,l])=><button key={k} onClick={()=>setTipo(k)} className={`px-3 py-1.5 rounded-md text-sm font-medium ${tipo===k?"text-white":"text-slate-600"}`} style={tipo===k?{backgroundColor:C.navy}:{}}>{l}</button>)}
      </div>
      <select value={periodo} onChange={e=>setPeriodo(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white">
        <option value="tudo">Período: tudo</option><option value="ano">{anoAtual}</option><option value="12m">Últimos 12 meses</option></select>
      {aba==="propostas" && <select value={status} onChange={e=>setStatus(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white">
        {["todos","Rascunho","Enviada","Fechada","Perdida"].map(s=><option key={s} value={s}>{s==="todos"?"Todos os status":s}</option>)}</select>}
      <select value={seg} onChange={e=>setSeg(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white">
        <option value="todos">Todos os segmentos</option><option value="asseio">Asseio</option><option value="vigilancia">Vigilância</option><option value="misto">Misto</option></select>
      <select value={reg} onChange={e=>setReg(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white">
        <option value="todos">Todas as regiões</option><option value="FPOLIS">Florianópolis</option><option value="BC">Litoral Norte</option></select>
      {isAdmin && <select value={cons} onChange={e=>setCons(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white">
        <option value="todos">Todos os consultores</option>{consultores.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</select>}
      <div className="relative"><Search size={15} className="absolute left-2.5 top-2.5 text-slate-400"/>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar cliente ou nº" className="pl-8 pr-3 py-2 rounded-lg border border-slate-300 text-sm bg-white w-52"/></div>
    </div>

    {/* KPIs */}
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
      {kpis().map(([l,v],i)=><Kpi key={i} label={l} value={v} icon={kpiIcons[i]} tone={i%2?C.mint:"#E7F0F5"}/>)}
    </div>

    {/* Tabela por aba */}
    <Card className="overflow-hidden">
      {aba==="propostas" && <SortableTable rows={fProp} sortInit={{k:"criadoEm",dir:"desc"}} cols={[
        {key:"numero",label:"Nº"}, {key:"criadoEm",label:"Data",defDir:"desc",fmt:p=>ptData(p.criadoEm)},
        {key:"razaoSocial",label:"Cliente",cls:"text-slate-800 font-medium"},
        {key:"consultorNome",label:"Consultor",fmt:p=>p.consultorNome?.split(" ")[0]},
        {key:"regiao",label:"Região",fmt:p=>regNome(p.regiao)},
        {key:"segmento",label:"Segmento",fmt:p=>segNome(p.segmento)},
        {key:"valorMensalTotal",label:"Mensal",align:"right",defDir:"desc",fmt:p=>BRL(p.valorMensalTotal)},
        {key:"valorGlobal",label:"Global",align:"right",defDir:"desc",cls:"text-slate-800 font-medium",fmt:p=>BRL(p.valorGlobal)},
        {key:"status",label:"Status",align:"center",fmt:p=><StatusPill st={p.status}/>},
      ]}/>}

      {aba==="os" && <SortableTable rows={fOS} sortInit={{k:"criadoEm",dir:"desc"}} cols={[
        {key:"numero",label:"Nº OS"}, {key:"criadoEm",label:"Data",defDir:"desc",fmt:o=>ptData(o.criadoEm)},
        {key:"razaoSocial",label:"Cliente",cls:"text-slate-800 font-medium"},
        {key:"propostaNumero",label:"Proposta"},
        {key:"consultorNome",label:"Consultor",fmt:o=>o.consultorNome?.split(" ")[0]},
        {key:"seg",label:"Segmento",sortVal:o=>segDaOS(o),fmt:o=>segNome(segDaOS(o))},
        {key:"inicio",label:"Início",fmt:o=>ptData(o.inicio)},
        {key:"status",label:"Status",align:"center",fmt:o=><StatusPill st={o.status}/>},
      ]}/>}

      {aba==="contratos" && <SortableTable rows={fCT} sortInit={{k:"criadoEm",dir:"desc"}} cols={[
        {key:"numero",label:"Nº"}, {key:"criadoEm",label:"Data",defDir:"desc",fmt:c=>ptData(c.criadoEm)},
        {key:"cliente",label:"Cliente",cls:"text-slate-800 font-medium"},
        {key:"segmento",label:"Segmento",fmt:c=><Pill tone={c.segmento==="vigilancia"?"teal":"slate"}>{segNome(c.segmento)}</Pill>},
        {key:"osNumero",label:"OS"}, {key:"propostaNumero",label:"Proposta"},
        {key:"valorMensal",label:"Mensal",align:"right",defDir:"desc",cls:"text-slate-800 font-medium",fmt:c=>BRL(c.valorMensal||0)},
        {key:"status",label:"Status",align:"center",fmt:c=><StatusPill st={c.status}/>},
      ]}/>}

      {aba==="consultores" && <SortableTable rows={aggCons} sortInit={{k:"global",dir:"desc"}} empty="Sem propostas para os filtros." cols={[
        {key:"nome",label:"Consultor",cls:"text-slate-800 font-medium"},
        {key:"total",label:"Propostas",align:"center",defDir:"desc"},
        {key:"enviadas",label:"Enviadas",align:"center",defDir:"desc"},
        {key:"fechadas",label:"Fechadas",align:"center",defDir:"desc"},
        {key:"perdidas",label:"Perdidas",align:"center",defDir:"desc"},
        {key:"conv",label:"Conversão",align:"center",defDir:"desc",fmt:r=><span className="font-semibold" style={{color:r.conv>=50?C.navy:C.gray}}>{r.conv.toFixed(0)}%</span>},
        {key:"mrr",label:"MRR",align:"right",defDir:"desc",fmt:r=>BRL(r.mrr)},
        {key:"global",label:"Global",align:"right",defDir:"desc",cls:"text-slate-800 font-medium",fmt:r=>BRL(r.global)},
      ]}/>}

      {aba==="carteira" && <SortableTable rows={aggCli} sortInit={{k:"mrr",dir:"desc"}} empty="Nenhum cliente com proposta fechada nos filtros." cols={[
        {key:"cliente",label:"Cliente",cls:"text-slate-800 font-medium"},
        {key:"regiao",label:"Região",fmt:r=>regNome(r.regiao)},
        {key:"segmento",label:"Segmento",fmt:r=>segNome(r.segmento)},
        {key:"propostas",label:"Contratações",align:"center",defDir:"desc"},
        {key:"mrr",label:"MRR",align:"right",defDir:"desc",cls:"text-slate-800 font-medium",fmt:r=>BRL(r.mrr)},
        {key:"global",label:"Global",align:"right",defDir:"desc",fmt:r=>BRL(r.global)},
      ]}/>}
    </Card>
    <div className="text-[11px] text-slate-400 mt-2">A exportação CSV respeita os filtros aplicados e abre no Excel já com acentuação correta.</div>
  </div>;
}

/* ===== MODELOS DE CONTRATO (gerado) ===== */
const CONTRATO_MODELOS = {"asseio": {"blocks": [{"k": "title", "t": "CONTRATO DE PRESTAÇÃO DE SERVIÇOS"}, {"k": "sub", "t": "TERMO DE CONTRATO DE PRESTAÇÃO DE SERVIÇOS PARA FORNECIMENTO DE MÃO-DE-OBRA DE {{OBJETO}} QUE ENTRE SI CELEBRAM {{CLIENTE}} E A EMPRESA RG SERVIÇOS ESPECIALIZADOS EIRELI"}, {"k": "p", "t": "A RG SERVIÇOS ESPECIALIZADOS EIRELI, situada na Rua Domingos Pedro Hermes, n° 1109, Bairro Jardim Cidade de Florianópolis, SC, inscrita no CNPJ sob o nº 14.337.450/0001-89, representada neste ato pelo seu Diretor Administrativo Financeiro, GABRIEL NORBERTO FONTANELLA REDANTE, de ora em diante denominada CONTRATADA e o {{CLIENTE}}, inscrito no {{CLIENTE_CNPJ}}, estabelecido na {{CLIENTE_ENDERECO}}, doravante denominado CONTRATANTE, representado neste ato pelo Sr. {{REPRESENTANTE}}, portador do {{REPRESENTANTE_CPF}}, firmam o presente Termo de Contrato de PRESTAÇÃO DE {{OBJETO}}, nos termos da proposta apresentada e sob as seguintes cláusulas e condições:"}, {"k": "h", "t": "1 - CLÁUSULA PRIMEIRA – DO OBJETO"}, {"k": "p", "t": "1.1 – É objeto do presente Contrato a ser executado pela Contratada, os serviços de:"}, {"dyn": "postos_lista"}, {"k": "p", "t": "nas dependências do {{CLIENTE}}, inscrito no {{CLIENTE_CNPJ}}, estabelecido na {{CLIENTE_ENDERECO}}, em conformidade com a proposta apresentada que são partes integrantes deste termo, independente de transcrição, para todos os fins e efeitos."}, {"k": "h", "t": "2 - CLÁUSULA SEGUNDA – DA VIGÊNCIA"}, {"k": "p", "t": "2.1 – O prazo de vigência do presente contrato é por prazo indeterminado, iniciando em {{INICIO}}, podendo, no entanto, ser rescindido a qualquer momento, imotivadamente por qualquer das partes, mediante aviso prévio, por escrito, com antecedência mínima de 30 (trinta) dias, sem qualquer ônus para ambas as partes."}, {"k": "h", "t": "3 - CLÁUSULA TERCEIRA – DAS OBRIGAÇÕES DA CONTRATANTE"}, {"k": "p", "t": "3.1 – A CONTRATANTE obriga-se a proporcionar todas as facilidades para que a CONTRATADA possa desempenhar seus serviços dentro das normas deste Contrato;"}, {"k": "p", "t": "3.1.1 – Exercer a fiscalização do Contrato e dos serviços através de seu representante legal, que registrará todas as ocorrências e as deficiências verificadas, encaminhando-as à CONTRATADA, objetivando à imediata correção das irregularidades apontadas;"}, {"k": "p", "t": "3.1.2 – Dispor de instalações, vestiários e local apropriado para a empresa sediar suas atividades e pessoal;"}, {"k": "p", "t": "3.1.3 – Proceder aos pagamentos devidos à CONTRATADA, não permitindo que a mão-de-obra execute tarefas em desacordo com as pré-estabelecidas no Contrato."}, {"k": "h", "t": "4 - CLÁUSULA QUARTA – DAS OBRIGAÇÕES DA CONTRATADA"}, {"k": "p", "t": "4.1 – Zelar pelas dependências da CONTRATANTE, através de empregado profissionalmente capacitado e qualificado. Bem como, outras atividades, próprias às funções, mediante acordo entre as partes segundo as necessidades do condomínio, no decorrer do contrato."}, {"k": "p", "t": "4.1.2 – Assumir inteira responsabilidade pela execução dos serviços contratados e efetuá-los de acordo com as especificações constantes na proposta e/ou instruções deste Contrato;"}, {"k": "p", "t": "4.1.3 – Arcar com todos os ônus/encargos/contribuições/impostos necessários à completa realização dos serviços contratados, bem como responder todas as obrigações judiciais e extrajudiciais relativas aos serviços prestados, especialmente as verbas de caráter trabalhista, previdenciário e tributário, porém não restritos a estes."}, {"k": "p", "t": "4.1.4 – Não serão, sob hipótese alguma, pagas horas extraordinárias eventualmente laboradas pelos empregados da CONTRATADA para a execução das atividades normais contratadas;"}, {"k": "p", "t": "4.1.5 – Fornecer e utilizar, sob sua inteira e exclusiva responsabilidade, toda a competente e indispensável mão-de-obra habilitada adequadamente selecionada e necessária, atendendo-se sempre e regularmente todas as exigências legais pertinentes, como ônus trabalhistas, encargos sociais, contribuições, tributos, indenizações e seguro contra acidentes;"}, {"k": "p", "t": "4.1.6 – Fornecer vale alimentação e transporte aos empregados, de acordo com a devida legislação ou nos termos do respectivo Acordo, Dissídio ou Convenção Coletiva de Trabalho vigente;"}, {"k": "p", "t": "4.1.7 – A CONTRATADA se compromete a fornecer mensalmente, até o dia 15 de cada mês, relativo à competência anterior, os seguintes documentos: Relação de Empregados; Analítico da Guia de Recolhimento do FGTS; Analítico da Guia da Previdência Social; Comprovante de declaração das contribuições à Previdência Social e outras entidades; Recibo de salário dos funcionários devidamente assinado e comprovante de depósito; Guia do FGTS paga; Guia do INSS paga."}, {"k": "p", "t": "4.1.8 – Orientar os seus empregados quanto às necessidades de acatar as orientações da CONTRATANTE, inclusive quanto ao cumprimento das normas internas de segurança e medicina do trabalho, além de outras de âmbito Federal, Estadual e Municipal. A CONTRATADA é responsável pela verificação e/ou constatação de existência de insalubridade e periculosidade junto ao local em que os serviços serão prestados, nos termos da legislação vigente."}, {"k": "p", "t": "4.1.9 – Providenciar a substituição, sempre que exigido pela CONTRATANTE e independentemente de qualquer justificativa, de qualquer empregado cuja atuação, permanência ou comportamento sejam considerados prejudiciais, inconvenientes ou insatisfatórios à disciplina ou ao interesse da CONTRATANTE, no prazo de dez dias, exceto em casos de atitudes gravíssimas."}, {"k": "p", "t": "4.1.10 – Manter seu pessoal uniformizado, identificando-os através de crachás com fotografia recente, provendo-os dos necessários EPIs. A CONTRATADA se compromete a entregar à CONTRATANTE uma fotocópia do Recibo de entrega de EPIs aos funcionários que executarão as tarefas no local;"}, {"k": "p", "t": "4.1.11 – No caso de falta de empregado, providenciar a substituição no máximo em 02 (duas) horas a contar do início do turno;"}, {"k": "p", "t": "4.1.12 – As partes e/ou seus empregados e prepostos se comprometem a manter no mais absoluto sigilo e confidencialidade todas as informações processadas sob a execução do presente instrumento, sendo que a CONTRATADA assume, desde já, a obrigação de não divulgar, dar conhecimento ou de qualquer forma facilitar o acesso a estranhos ou terceiros de qualquer informação privilegiada/sigilosa da CONTRATANTE."}, {"k": "p", "t": "4.1.13 – A CONTRATADA se compromete a fornecer, no prazo de 10 (dez) dias a contar da assinatura deste instrumento, e anualmente na hipótese de renovação de contrato: a) PCMSO; b) PPRA; c) Exame periódico dos funcionários; d) Recibo de férias dos funcionários."}, {"k": "p", "t": "4.1.14 – Executar os serviços objeto deste Contrato garantindo que não haja interrupções e/ou paralisações em caso de faltas, folgas e férias de seus empregados."}, {"k": "p", "t": "4.1.15 – Correrão por conta e responsabilidade exclusiva da CONTRATADA todas as obrigações trabalhistas, previdenciárias, acidentais e fiscais decorrentes da relação empregatícia entre a CONTRATADA e seus prepostos ou colaboradores designados para a execução dos serviços, desde que não tenham sido ocasionadas por culpa da CONTRATANTE."}, {"k": "p", "t": "4.1.16 – Orientar seus funcionários a não circularem pelo local fora do horário de trabalho e a não utilizarem áreas sociais ou de serviço, salvo aquelas cujo uso seja necessário à boa execução dos serviços;"}, {"k": "p", "t": "4.1.17 – Responsabilizar-se pelo cumprimento, por parte de seus empregados, dos dispositivos do Regulamento Interno da CONTRATANTE, sem que isso implique vínculo empregatício entre os empregados da CONTRATADA e a CONTRATANTE."}, {"k": "p", "t": "4.1.18 – A CONTRATADA será exclusivamente responsável por eventuais danos corporais e/ou materiais ou pecuniários causados à CONTRATANTE e/ou a terceiros decorrentes da falha na prestação de serviços ou atos praticados por seus funcionários. No caso de danos a terceiros, a CONTRATADA admite e concorda com a sua denunciação à lide, nos termos do art. 125 do CPC."}, {"k": "p", "t": "4.1.19 – A CONTRATADA, única e exclusivamente, responsabiliza-se por quaisquer acidentes ou danos que seus funcionários e/ou prepostos venham a sofrer durante a prestação de serviços, arcando com todas as despesas decorrentes do fato."}, {"k": "p", "t": "4.1.20 – A CONTRATANTE poderá suspender os pagamentos ou a execução dos serviços em virtude de inadimplemento, pela CONTRATADA, de qualquer cláusula ou condição deste contrato."}, {"k": "p", "t": "4.1.21 – A CONTRATADA irá cumprir com a Legislação de Proteção de Dados que tenha conexão com este Contrato, garantindo que todo o seu pessoal, agentes e subcontratados que tiverem acesso a dados pessoais estarão sujeitos a obrigações de confidencialidade, devendo implementar programa de segurança da informação com medidas físicas, técnicas e organizacionais adequadas a prevenir violação de dados pessoais."}, {"k": "p", "t": "4.1.22 – Designar um representante para representar a CONTRATADA nos assuntos referentes aos serviços pactuados;"}, {"k": "p", "t": "4.1.23 – Não poderá, em hipótese alguma, transferir ou delegar as atribuições e responsabilidades que assume por força deste contrato, sem autorização expressa da CONTRATANTE."}, {"k": "p", "t": "4.1.24 – Deverá comunicar-se com a CONTRATANTE sempre que ocorrer alguma anormalidade que possa prejudicar o atendimento das cláusulas deste contrato ou a prestação dos serviços."}, {"k": "h", "t": "5 - CLÁUSULA QUINTA – DO PREÇO"}, {"k": "p", "t": "A CONTRATANTE pagará à CONTRATADA, pela execução dos serviços objeto do presente Contrato, a importância de:"}, {"k": "p", "t": "5.1 – {{POSTOS_RESUMO}}"}, {"k": "p", "t": "5.2 – Valor Total Mensal do contrato: {{VALOR}}"}, {"k": "p", "t": "5.3 – Na hipótese de falta ao serviço de empregados sem reposição, a CONTRATANTE poderá descontar as referidas faltas do pagamento das faturas subsequentes."}, {"k": "h", "t": "6 - CLÁUSULA SEXTA – DO PAGAMENTO"}, {"k": "p", "t": "6.1 – O pagamento será realizado no dia 15 (quinze) do mês subsequente, mediante a apresentação das respectivas Notas Fiscais/Faturas, desde que não haja impedimentos legais."}, {"k": "p", "t": "6.2 – SUB-CLÁUSULA ÚNICA – Deverão acompanhar o faturamento os comprovantes de pagamento de pessoal e os respectivos recolhimentos da Previdência Social relativos ao mês anterior do faturamento e Certidões Negativas de Débitos atualizadas."}, {"k": "p", "t": "6.3 – O valor pactuado no contrato contempla custos, despesas e tributos, não sendo cabível a cobrança de nenhum valor adicional, a que título for."}, {"k": "p", "t": "6.4 – A CONTRATADA não poderá, em nenhuma hipótese, descontar títulos perante Instituições Bancárias ou emitir duplicata contra a CONTRATANTE, sob pena de rescisão contratual."}, {"k": "p", "t": "6.5 – A CONTRATANTE não autoriza que a empresa CONTRATADA, seus sócios ou diretores, negociem ou descontem em empresa de factoring ou transações congêneres os valores objeto deste contrato."}, {"k": "p", "t": "6.6 – A CONTRATANTE poderá reter o pagamento da fatura nas hipóteses de ausência e/ou falha na prestação de serviços; falta de recolhimento de encargos, tributos e contribuições; atraso no pagamento de salários dos funcionários alocados nas suas dependências."}, {"k": "h", "t": "7 - CLÁUSULA SÉTIMA – DA RESCISÃO"}, {"k": "p", "t": "7.1 – O prazo de vigência do presente contrato é por prazo indeterminado, iniciando em {{INICIO}}, podendo, no entanto, ser rescindido a qualquer momento, imotivadamente por qualquer das partes, mediante aviso prévio, por escrito, com antecedência mínima de 30 (trinta) dias, sem qualquer ônus para ambas as partes."}, {"k": "p", "t": "7.1.1 – O presente Instrumento ficará rescindido de pleno direito, independentemente de notificação judicial ou extrajudicial, nas seguintes hipóteses:"}, {"k": "p", "t": "7.1.2 – Descumprimento das obrigações ajustadas por quaisquer das PARTES, se não sanado o inadimplemento dentro de 5 (cinco) dias a contar da data do recebimento de notificação escrita pela parte prejudicada;"}, {"k": "p", "t": "7.1.3 – A CONTRATANTE compromete-se a não contratar, diretamente ou por meio de outra empresa terceirizada, quaisquer empregados vinculados à CONTRATADA, durante a vigência do contrato e pelo período de 180 (cento e oitenta) dias subsequentes ao seu término. Em caso de descumprimento, a CONTRATANTE obriga-se a indenizar a CONTRATADA mediante pagamento de valor equivalente a 06 (seis) vezes a última remuneração mensal do(s) colaborador(es) contratado(s)."}, {"k": "p", "t": "7.1.4 – Na hipótese de insolvência, falência, recuperação judicial ou extrajudicial ou ação semelhante de qualquer das PARTES;"}, {"k": "p", "t": "7.1.5 – Encerramento da atividade, venda, cessão de direitos, alteração societária, requerimento de recuperação judicial e deferimento de falência da CONTRATADA;"}, {"k": "p", "t": "7.1.6 – Condenação trabalhista da CONTRATADA em primeira instância decorrente de reclamação trabalhista proposta por seus funcionários que prestem ou prestaram serviços nas dependências da CONTRATANTE, sendo facultado à CONTRATANTE reter o pagamento das faturas, limitada a três, até que haja a satisfação da obrigação."}, {"k": "p", "t": "7.1.7 – Na ocorrência de resolução contratual, a CONTRATADA apresentará, no prazo de 07 (sete) dias, um relatório completo dos trabalhos executados. Após aprovação em igual período, a CONTRATANTE pagará, em até 10 (dez) dias úteis, os valores devidos pelos serviços executados."}, {"k": "h", "t": "8 - CLÁUSULA OITAVA – DO REAJUSTE"}, {"k": "p", "t": "8.1 – Os preços serão reajustados de acordo com a Convenção Coletiva de Trabalho da Categoria, incluindo todos os encargos decorrentes dos empregados, incluindo os de natureza fiscal e trabalhista. (Mês do Dissídio: Janeiro)"}, {"k": "p", "t": "8.2 – A CONTRATADA se compromete a entregar à CONTRATANTE a Convenção Coletiva aprovada para as categorias ora contratadas, no prazo máximo de 15 (quinze) dias da data da sua respectiva aprovação."}, {"k": "h", "t": "9 - CLÁUSULA NONA – DO VÍNCULO"}, {"k": "p", "t": "9.1 – Declaram as partes que o presente instrumento não estabelece qualquer vínculo empregatício entre a CONTRATADA e a CONTRATANTE, nem com qualquer dos empregados ou prestadores de serviços contratados a qualquer título pela CONTRATADA, respondendo esta integral e exclusivamente por todas e quaisquer reclamações judiciais ou extrajudiciais que tais empregados venham a formular contra a CONTRATANTE."}, {"k": "h", "t": "10 - CLÁUSULA DÉCIMA – TRIBUTOS/ENCARGOS"}, {"k": "p", "t": "10.1 – Todos os encargos tributários, trabalhistas, ISSQN, previdenciários e de FGTS decorrentes deste contrato, exceto aqueles que a legislação vigente impuser expressa e compulsoriamente à CONTRATANTE, serão de responsabilidade da CONTRATADA, sem que lhe assista qualquer direito a reembolso."}, {"k": "h", "t": "11 - DAS DISPOSIÇÕES GERAIS"}, {"k": "p", "t": "11.1 – Os tributos e contribuições que incidam ou venham a incidir sobre as importâncias pagas em decorrência direta ou indireta deste Contrato serão suportados pelo seu contribuinte. O presente contrato não implica em qualquer outra forma de associação, consórcio ou solidariedade ativa ou passiva entre as partes."}, {"k": "p", "t": "11.2 – Este contrato, bem como seus direitos e obrigações dele decorrentes, não poderão ser cedidos e/ou transferidos pelas partes. Este instrumento representa todos os acordos e condições estipulados pelas partes para o seu objetivo, revogando e substituindo os contratos anteriormente firmados pelas partes."}, {"k": "p", "t": "11.3 – Toda e qualquer alteração pertinente ao contrato deverá ser informada imediatamente à outra parte, sob pena de responsabilização da parte a quem cabia esta obrigação."}, {"k": "p", "t": "11.4 – Todo e qualquer serviço a ser executado, bem como a utilização de equipamento ou material que não estejam previstos no presente contrato, somente poderão ocorrer se houver determinação por escrito, devidamente assinada pela CONTRATANTE."}, {"k": "p", "t": "11.5 – A CONTRATADA responsabiliza-se por quaisquer ônus decorrentes de fiscalizações realizadas pelo Ministério da Economia, através das Delegacias Regionais do Trabalho, além da apresentação de defesas e recursos administrativos decorrentes de autuações fiscais."}, {"k": "p", "t": "11.6 – As partes contratantes obrigam-se por si, eleger o Foro da Cidade de São José/SC, para a propositura de qualquer ação e dirimir eventuais demandas judiciais."}, {"k": "p", "t": "E assim, por estarem de acordo e mediante a conformidade do presente instrumento, as partes a seguir o firmam em 02 (duas) vias de igual teor e forma, para um só efeito, na presença de 02 (duas) testemunhas abaixo assinadas."}, {"k": "center", "t": "{{LOCAL_DATA}}"}, {"dyn": "sign", "left": "{{CLIENTE}}", "leftSub": "CONTRATANTE", "right": "RG SERVIÇOS ESPECIALIZADOS EIRELI", "rightSub": "CONTRATADA"}]}, "vigilancia": {"blocks": [{"k": "title", "t": "CONTRATO DE PRESTAÇÃO DE SERVIÇOS DE VIGILÂNCIA PATRIMONIAL"}, {"k": "p", "t": "Pelo presente instrumento particular de prestação de serviços, de um lado:"}, {"k": "p", "t": "{{CLIENTE}}, inscrito no {{CLIENTE_CNPJ}}, estabelecido na {{CLIENTE_ENDERECO}}, doravante denominado CONTRATANTE, neste ato representado pela {{REPRESENTANTE}}, portador(a) do {{REPRESENTANTE_CPF}}; e de outro lado: GT VIG VIGILÂNCIA LTDA - ME, inscrita no CNPJ sob nº 53.924.563/0001-32, doravante denominada CONTRATADA, neste ato representada por seu sócio administrador Gabriel Norberto Fontanella Redante; têm entre si justo e contratado o presente CONTRATO DE PRESTAÇÃO DE SERVIÇOS DE VIGILÂNCIA PATRIMONIAL, que será regido pelas cláusulas e condições seguintes:"}, {"k": "h", "t": "1 - CLÁUSULA PRIMEIRA – DO OBJETO"}, {"k": "p", "t": "Constitui objeto do presente contrato a prestação de serviços de Vigilância Patrimonial Desarmada, compreendendo atividades de vigilância preventiva, controle de acessos, rondas ostensivas, monitoramento das áreas comuns, prevenção de ocorrências e proteção do patrimônio nas dependências do {{CLIENTE}}."}, {"k": "p", "t": "Os serviços serão executados através dos seguintes postos:"}, {"dyn": "postos_tabela"}, {"k": "p", "t": "1.2 Os serviços serão prestados por profissionais devidamente habilitados, treinados e contratados pela CONTRATADA, observadas todas as exigências legais aplicáveis à atividade de segurança privada, conforme a Lei 14.967/24."}, {"k": "p", "t": "1.3 Os vigilantes de ronda utilizarão câmeras corporais (Bodycam) para registro das atividades operacionais e ocorrências, observando-se a legislação vigente e a Lei Geral de Proteção de Dados – LGPD."}, {"k": "h", "t": "2 - CLÁUSULA SEGUNDA – DA VIGÊNCIA"}, {"k": "p", "t": "2.1 O presente contrato vigorará por prazo indeterminado, iniciando-se em {{INICIO}}."}, {"k": "p", "t": "2.2 Qualquer das partes poderá rescindir o presente contrato, independentemente de justificativa, mediante comunicação formal e escrita com antecedência mínima de 30 (trinta) dias."}, {"k": "p", "t": "2.3 Durante o período de aviso prévio permanecerão vigentes todas as obrigações assumidas pelas partes."}, {"k": "h", "t": "3 - CLÁUSULA TERCEIRA – DAS OBRIGAÇÕES DA CONTRATANTE"}, {"k": "p", "t": "3.1 Proporcionar condições adequadas para a execução dos serviços."}, {"k": "p", "t": "3.2 Disponibilizar aos profissionais da CONTRATADA acesso às áreas necessárias ao desempenho de suas funções."}, {"k": "p", "t": "3.3 Efetuar os pagamentos na forma e prazo previstos neste contrato."}, {"k": "p", "t": "3.4 Comunicar imediatamente à CONTRATADA qualquer ocorrência que possa interferir na execução dos serviços."}, {"k": "p", "t": "3.5 Exercer a fiscalização dos serviços por intermédio de representante designado."}, {"k": "p", "t": "3.6 Não permitir que moradores, visitantes ou terceiros exerçam subordinação direta sobre os vigilantes da CONTRATADA."}, {"k": "h", "t": "4 - CLÁUSULA QUARTA – DAS OBRIGAÇÕES DA CONTRATADA"}, {"k": "p", "t": "4.1 Executar os serviços contratados com zelo, eficiência e observância da legislação vigente."}, {"k": "p", "t": "4.2 Manter os profissionais devidamente uniformizados, identificados e aptos para o exercício de suas funções."}, {"k": "p", "t": "4.3 Fornecer uniformes, equipamentos operacionais, equipamentos de proteção individual (EPIs), equipamentos de comunicação e demais recursos necessários à prestação dos serviços."}, {"k": "p", "t": "4.4 Substituir profissionais ausentes por motivo de falta, férias, afastamentos ou licenças, em até duas horas, garantindo a continuidade dos serviços."}, {"k": "p", "t": "4.5 Cumprir integralmente as obrigações trabalhistas, previdenciárias, fiscais e tributárias decorrentes da contratação de seus empregados."}, {"k": "p", "t": "4.6 Fornecer mensalmente à CONTRATANTE os comprovantes de regularidade trabalhista, previdenciária e fundiária dos empregados vinculados ao contrato."}, {"k": "p", "t": "4.7 Manter supervisão operacional periódica dos postos de serviço."}, {"k": "p", "t": "4.8 Registrar e comunicar imediatamente à CONTRATANTE quaisquer ocorrências relevantes verificadas durante a prestação dos serviços."}, {"k": "p", "t": "4.9 Manter absoluto sigilo sobre informações obtidas em razão da execução deste contrato."}, {"k": "p", "t": "4.10 Cumprir integralmente a legislação de proteção de dados pessoais aplicável."}, {"k": "p", "t": "4.11 Disponibilizar e manter em funcionamento as Bodycams utilizadas pelos vigilantes de ronda."}, {"k": "p", "t": "4.12 Manter seus empregados subordinados exclusivamente à sua estrutura hierárquica, inexistindo qualquer vínculo empregatício com a CONTRATANTE."}, {"k": "h", "t": "5 - CLÁUSULA QUINTA – DA REGULARIDADE OPERACIONAL"}, {"k": "p", "t": "5.1 A CONTRATADA declara possuir todas as autorizações, registros e licenças exigid  "12.1 O presente contrato poderá ser rescindido por qualquer das partes mediante aviso prévio escrito de 30 (trinta) dias."}, {"k": "p", "t": "12.2 - Constituem hipóteses de rescisão imediata:"}, {"k": "p", "t": "a) descumprimento de qualquer cláusula contratual; b) falência ou recuperação judicial de qualquer das partes; c) perda das autorizações legais necessárias ao exercício das atividades da CONTRATADA; d) inadimplência superior a 30 (trinta) dias; e) prática de atos ilícitos que comprometam a continuidade da relação contratual."}, {"k": "h", "t": "13 - CLÁUSULA DÉCIMA TERCEIRA – DA AUSÊNCIA DE VÍNCULO EMPREGATÍCIO"}, {"k": "p", "t": "13.1 Não haverá qualquer vínculo empregatício entre a CONTRATANTE e os empregados da CONTRATADA."}, {"k": "p", "t": "13.2 Todas as obrigações trabalhistas, previdenciárias, fiscais e securitárias relativas aos empregados alocados na execução dos serviços serão de responsabilidade exclusiva da CONTRATADA."}, {"k": "h", "t": "14 - CLÁUSULA DÉCIMA QUARTA – DOS TRIBUTOS E ENCARGOS"}, {"k": "p", "t": "14.1 Todos os tributos, contribuições, encargos trabalhistas, previdenciários e fiscais decorrentes da execução deste contrato serão de responsabilidade exclusiva da CONTRATADA, ressalvadas as hipóteses legais de retenção obrigatória pela CONTRATANTE."}, {"k": "p", "t": "14.2 Na hipótese de o CONTRATANTE vir a ser condenado ao pagamento de qualquer verba trabalhista, previdenciária ou indenizatória em reclamação trabalhista movida por empregado da CONTRATADA em razão dos serviços objeto deste contrato, a CONTRATADA será previamente notificada no prazo de 5 (cinco) dias úteis após a condenação, tendo o direito de apresentar defesa ou comprovar o pagamento no prazo de 10 (dez) dias úteis contados do recebimento da notificação, ficando o desconto nos pagamentos mensais condicionado à ausência de manifestação ou ao reconhecimento da dívida pela CONTRATADA, sem prejuízo do direito de cobrança mediante ação regressiva e das demais sanções cabí

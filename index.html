<!-- Camada de dados: substitui o window.storage do Claude pelo Firebase (compartilhado) + localStorage (sessao local) -->
<script>
(function(){
  var ok=false, db=null;
  try{
    if(window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.apiKey && window.FIREBASE_CONFIG.apiKey!=="COLE_AQUI"){
      firebase.initializeApp(window.FIREBASE_CONFIG);
      db = firebase.database();
      ok=true;
    }
  }catch(e){ console.error("Firebase init falhou:", e); }
  window.__FB_OK__ = ok;
  var san=function(k){ return "shared/"+String(k).replace(/[.#$\[\]\/]/g,"_"); };
  window.storage = {
    get: async function(key, shared){
      try{
        if(shared && ok){ var snap=await db.ref(san(key)).once("value"); var v=snap.val(); return (v===null||v===undefined)?null:{value:v}; }
        var lv=localStorage.getItem(shared?("S_"+key):key); return lv!=null?{value:lv}:null;
      }catch(e){ console.error(e); var lv2=localStorage.getItem(shared?("S_"+key):key); return lv2!=null?{value:lv2}:null; }
    },
    set: async function(key, value, shared){
      try{
        if(shared && ok){ await db.ref(san(key)).set(value); }
        localStorage.setItem(shared?("S_"+key):key, value); // espelho local (cache/offline)
        return {value:value};
      }catch(e){ console.error(e); try{localStorage.setItem(shared?("S_"+key):key, value);}catch(_){} return {value:value}; }
    },
    delete: async function(key, shared){
      try{ if(shared && ok){ await db.ref(san(key)).remove(); } localStorage.removeItem(shared?("S_"+key):key); return {deleted:true}; }
      catch(e){ console.error(e); return {deleted:false}; }
    }
  };
})();
</script>

/* valor por extenso (R$) — pt-BR */
function extenso(valor){
  valor = Math.round((valor||0)*100)/100;
  const reais = Math.floor(valor); const cent = Math.round((valor-reais)*100);
  const U=["zero","um","dois","três","quatro","cinco","seis","sete","oito","nove","dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"];
  const D=["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"];
  const C=["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"];
  function ate999(n){
    if(n===0) return "";
    if(n===100) return "cem";
    let s=[];
    const c=Math.floor(n/100), d=Math.floor((n%100)/10), u=n%10, dd=n%100;
    if(c) s.push(C[c]);
    if(dd<20 && dd>0) s.push(U[dd]);
    else { if(d) s.push(D[d]); if(u) s.push(U[u]); }
    return s.join(" e ");
  }
  function inteiro(n){
    if(n===0) return "zero";
    const bi=Math.floor(n/1e9), mi=Math.floor((n%1e9)/1e6), mil=Math.floor((n%1e6)/1e3), r=n%1e3;
    let p=[];
    if(bi) p.push(ate999(bi)+(bi>1?" bilhões":" bilhão"));
    if(mi) p.push(ate999(mi)+(mi>1?" milhões":" milhão"));
    if(mil) p.push(mil===1?"mil":ate999(mil)+" mil");
    if(r) p.push(ate999(r));
    return p.join(", ").replace(/, ([^,]*)$/," e $1");
  }
  let txt = inteiro(reais) + (reais===1?" real":" reais");
  if(cent>0) txt += " e " + inteiro(cent) + (cent===1?" centavo":" centavos");
  return txt;
}

   - over.sal  : reajuste (escala salário, intrajornada, encargos e contribuição patronal)
   - over.insPct : percentual de insalubridade (ex.: 0.40 grau máximo) p/ Servente/ASG
   - maqShare  : rateio (R$150) somado na linha C – Máquinas/Equipamentos */
function computePosto(prof, regKey, maqShare=0, over={}) {
  const adm = (over.adm!=null) ? over.adm : SEED[regKey].admLucro[0];
  const lucro = (over.lucro!=null) ? over.lucro : SEED[regKey].admLucro[1];
  const salBase = prof.sal;
  const sal = over.sal ?? salBase;
  const f = salBase>0 ? sal/salBase : 1;           // factor de reajuste

  // I - REMUNERAÇÃO. Parte dos valores EXATOS de tabela (escalados por f) e, se a
  // insalubridade for alterada (flag grau máximo), aplica apenas o delta — preservando
  // a reconstrução exata dos preços quando nada muda.
  const salarioBase = sal;
  // Salário Normativo da Categoria (Piso 220h) = Salário Base ÷ fator da carga (escala junto com reajustes do piso)
  const normativo = (prof.fator && prof.fator>0) ? Math.round((salarioBase/prof.fator)*100)/100 : (prof.normativo!=null ? prof.normativo : salarioBase);
  const insPctBase = prof.ins || 0;
  const insPct   = over.insPct ?? insPctBase;        // % insalubridade efetivo
  const insalubBase = sal * insPctBase;
  const insalub  = sal * insPct;
  const deltaIns = insalub - insalubBase;            // variação da insalubridade
  const pericul  = (prof.perV||0) * f;
  const adNot    = (prof.adNot||0) * f;
  const horaNot  = (prof.horaNot||0) * f;
  const dsr      = (prof.dsr||0) * f;
  const grat     = (prof.grat||0) * f;
  const intraj   = (prof.intraj||0) * f;
  // Gratificação opcional (digitada na proposta): "assid" soma na assiduidade; "va" entra no vale-alimentação
  const gratValor = Number(over.gratValor)||0;
  const gratAssid = over.gratTipo==="assid" ? gratValor : 0;
  const gratVA    = over.gratTipo==="va"    ? gratValor : 0;
  const assid    = (prof.assid||0) * f + 0.07*deltaIns + gratAssid;   // 7% s/ insalub + gratificação
  const remBaseEnc = prof.remBaseEnc * f + deltaIns;               // F36 (base p/ encargos)
  const totalRem   = prof.totRem * f + deltaIns*1.07 + gratAssid;  // F35 (+ delta insalub + gratificação)

  // II - ENCARGOS (percentuais constantes × base)
  const encA = ENC_A.map(([k,p])=>[k,p,p*remBaseEnc]);
  const encB = ENC_B.map(([k,p])=>[k,p,p*remBaseEnc]);
  const encC = ENC_C.map(([k,p])=>[k,p,p*remBaseEnc]);
  const grupoA = SUM_A*remBaseEnc, grupoB = SUM_B*remBaseEnc;
  const grupoC = SUM_C*remBaseEnc, grupoD = PCT_D*remBaseEnc;
  const totalEnc = grupoA+grupoB+grupoC+grupoD;
  const mo = totalRem+totalEnc;                    // F72

  // III - BENEFÍCIOS (valores de tabela; gratificação-VA soma ao auxílio alimentação)
  const alim = prof.alim + gratVA, transp = prof.transp, funeral = prof.funeral, seguro = prof.seguro, benOut = prof.benOut||0;
  const totBenef = alim+transp+funeral+seguro+benOut;
  // VIII - linhas de alimentação (+ gratificação, se aplicável)
  const vaLinhas = gratVA>0 ? [...prof.va, ["GRATIFICAÇÃO", gratValor, 1]] : prof.va;

  // IV - INSUMOS DE MÃO DE OBRA
  const contrib = sal*0.01;                        // 1% do piso (escala c/ salário)
  const unif = (over.unif!=null) ? over.unif : (prof.unif||0);   // uniforme vindo do cadastro de Uniformes
  const mat  = (prof.mat||0) + (over.matShare||0);               // materiais: rateio de materiais específicos da proposta
  const maquinas = (prof.maq||0) + maqShare;       // linha C + rateio
  const totIns = unif+mat+maquinas+prof.epi+prof.trein+contrib+prof.assist+(prof.insOut||0);

  // V - DEMAIS COMPONENTES
  const base = mo+totBenef+totIns;
  const despAdm = base*adm;
  const lucroV = (base+despAdm)*lucro;
  const po = base+despAdm+lucroV;                  // F120 (PO)

  // VI - TRIBUTOS (gross-up: P1 = PO/(1-TO))
  const issPct = (prof.iss!=null) ? prof.iss : TRIB.ISS;   // ISS por função (Vigilância 3%, Asseio 2,5%)
  const pctTrib = TRIB.COFINS+TRIB.PIS+issPct;
  const p1 = po/(1-pctTrib);                      // F121
  const tributos = p1-po;

  // VII - DEMONSTRATIVO SALÁRIO (créditos/débitos)
  const creditos = [
    ["PISO", salarioBase],["INSALUBRIDADE", insalub],["PERICULOSIDADE", pericul],
    ["ADICIONAL NOTURNO", adNot],["HORA NOTURNA REDUZIDA", horaNot],["DSR", dsr],
    ["GRATIFICAÇÃO", grat],["INTRAJORNADA", intraj],["ASSIDUIDADE"+(gratAssid>0?" + GRATIFICAÇÃO":""), assid],
  ];
  const inssDeb=(prof.inssDeb||0)*f, irDeb=(prof.irDeb||0)*f, vaDeb=(prof.vaDeb||0), vtDeb=(prof.vtDeb||0);
  const totCred = creditos.reduce((s,x)=>s+x[1],0);
  const totDeb = inssDeb+irDeb+vaDeb+vtDeb;
  const liquido = totCred-totDeb;

  return {
    salarioBase, normativo, insalub, insPct, pericul, adNot, horaNot, dsr, grat, intraj, assid, remBaseEnc, totalRem,
    encA, encB, encC, grupoA, grupoB, grupoC, grupoD, totalEnc, mo,
    alim, transp, funeral, seguro, benOut, totBenef,
    unif, mat, maquinas, epi:prof.epi, trein:prof.trein, contrib, assist:prof.assist, insOut:prof.insOut||0, totIns,
    despAdm, lucro:lucroV, po, tributos, p1, issPct, pctTrib, gratAssidOn: gratAssid>0,
    adm, lucroPct:lucro,
    creditos, inssDeb, irDeb, vaDeb, vtDeb, totCred, totDeb, liquido,
    va:vaLinhas, tTar:prof.tTar, tDias:prof.tDias,
  };
}

// mescla o catálogo SEED de um segmento num exercício, preservando reajustes (sal) salvos por função
function mergeSeg(seg){
  return (ex)=>{
    const regioes={...ex.regioes};
    ["FPOLIS","BC"].forEach(reg=>{
      const snap=(regioes[reg]&&regioes[reg].funcoes)||[];
      const byTab=Object.fromEntries(snap.map(f=>[f.tab,f]));
      const merged=funcoesSeg(reg,seg).map(f=>{
        const old=byTab[f.tab];
        // preserva o piso (normativo) editado pelo usuário; Salário Base = normativo × fator
        const normativo = (old && old.normativo!=null) ? old.normativo : ((old && old.sal!=null && f.fator) ? old.sal/f.fator : f.normativo);
        const sal = Math.round(normativo*f.fator*100)/100;
        const empresaId = (old && old.empresaId) ? old.empresaId : f.empresaId;   // preserva vínculo de empresa editado
        return {...f, normativo:Math.round(normativo*100)/100, sal, empresaId};
      });
      regioes[reg]={ admLucro:(regioes[reg]&&regioes[reg].admLucro)||SEED[reg].admLucro, refs:refsSeg(reg,seg), funcoes:merged };
    });
    return {...ex, cndVinculo:ex.cndVinculo||seg, regioes};
  };
}
/* Normaliza o cadastro para {asseio:[...], vigilancia:[...]}, separando por sindicato
   (Asseio = SINDLIMP, Vigilância = SINDVIG) e garantindo o catálogo SEED em cada segmento. */
function migrarSind(s){
  let obj;
  if(Array.isArray(s)) obj={ asseio:s, vigilancia:[] };
  else if(s && (s.asseio||s.vigilancia)) obj={ asseio:s.asseio||[], vigilancia:s.vigilancia||[] };
  else return seedSind();
  obj.asseio = (obj.asseio||[]).map(mergeSeg("asseio")); if(obj.asseio.length===0) obj.asseio=seedSindicato();
  obj.vigilancia = (obj.vigilancia||[]).map(mergeSeg("vigilancia")); if(obj.vigilancia.length===0) obj.vigilancia=seedVigilancia();
  return obj;
}

function categoriaDe(tab){
  const t=(tab||"").toLowerCase();
  if(t.startsWith("líder")||t.startsWith("lider")) return "LÍDER";
  if(t.startsWith("servente")) return "SERVENTE";
  if(t.startsWith("asg")) return "ASG";
  if(t.startsWith("zelador")) return "ZELADOR";
  if(t.startsWith("recep")) return "RECEPÇÃO";
  if(t.startsWith("port")) return "PORTEIRO";        // Porteiro / Portaria
  if(t.startsWith("vigilante")) return "VIGILANTE";
  if(t.startsWith("vigia")) return "VIGIA";
  return null;
}
// versão de preços vigente p/ uma data ISO (a de maior vigência <= data; senão a mais antiga)
function versaoUni(uni, dataISO){
  if(!uni) return null;
  const vs = uni.versoes ? uni.versoes : [uni];   // compat: shape antigo conta como 1 versão
  if(!vs.length) return null;
  const ord=[...vs].sort((a,b)=>String(a.vigencia||"").localeCompare(String(b.vigencia||"")));
  const d=dataISO||today();
  let escolhida=ord[0];
  for(const v of ord){ if(String(v.vigencia||"")<=d) escolhida=v; }
  return escolhida;
}
function uniformeDeFuncao(uni, tab, dataISO){
  const v=versaoUni(uni, dataISO);
  if(!v) return 0;
  const esp=(v.especificos||[]).find(e=>e.funcao===tab);
  if(esp) return esp.itens ? uniMensal({itens:esp.itens}) : (Number(esp.mensal)||0);
  const cat=categoriaDe(tab); const kitKey=cat && v.vinculo && v.vinculo[cat];
  return (kitKey && v.kits[kitKey]) ? uniMensal(v.kits[kitKey]) : 0;
}
function migrarUni(u){
  const seedVer=()=>({ vigencia:"2026-01-01", criadoEm:today(), kits:JSON.parse(JSON.stringify(UNIF_SEED.kits)), vinculo:{...UNIF_SEED.vinculo}, especificos:[] });
  const normVer=(v)=>({ vigencia:v.vigencia||"2026-01-01", criadoEm:v.criadoEm||today(), criadoPor:v.criadoPor,
    kits:{...JSON.parse(JSON.stringify(UNIF_SEED.kits)), ...(v.kits||{})}, vinculo:{...UNIF_SEED.vinculo, ...(v.vinculo||{})}, especificos:v.especificos||[] });
  if(!u) return { versoes:[seedVer()] };
  if(u.versoes && u.versoes.length){ const versoes=u.versoes.map(normVer); versoes.sort((a,b)=>String(a.vigencia).localeCompare(String(b.vigencia))); return { versoes }; }
  if(u.kits) return { versoes:[ normVer(u) ] };   // shape antigo -> 1 versão
  return { versoes:[seedVer()] };
}

function Logo({size=28}){
  return <img src={LOGO_GT} alt="Grupo GT" style={{height:Math.round(size*1.25), width:"auto", maxWidth:"100%"}}/>;
}
function Card({children, className=""}){ return <div className={"bg-white rounded-xl border border-slate-200 shadow-sm "+className}>{children}</div>; }
function ConfirmDialog({pend, onClose}){
  if(!pend) return null;
  return <div className="fixed inset-0 z-50 grid place-items-center bg-black/30 p-4" onClick={onClose}>
    <div className="bg-white rounded-xl border border-slate-200 shadow-xl max-w-md w-full p-5" onClick={e=>e.stopPropagation()}>
      <div className="text-sm font-semibold text-slate-800 mb-1">{pend.titulo||"Confirmar"}</div>
      <div className="text-sm text-slate-600 mb-4 leading-relaxed">{pend.msg}</div>
      <div className="flex justify-end gap-2">
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn variant="danger" onClick={()=>{ const a=pend.acao; onClose(); a&&a(); }}>{pend.confirmLabel||"Excluir"}</Btn>
      </div>
    </div>
  </div>;
}
function Btn({children, onClick, variant="primary", className="", type, disabled, title}){
  const styles = {
    primary:"text-white", ghost:"bg-transparent text-slate-700 hover:bg-slate-100 border border-slate-200",
    soft:"text-slate-700", danger:"bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200",
  };
  const bg = variant==="primary"?{backgroundColor:C.navy}:variant==="soft"?{backgroundColor:C.mint}:{};
  return <button title={title} type={type} disabled={disabled} onClick={onClick}
    className={`inline-flex items-center justify-center gap-2 px-3.5 py-2 rounded-lg text-sm font-medium transition disabled:opacity-50 ${styles[variant]} ${className}`}
    style={bg}>{children}</button>;
}
function Field({label, children, className=""}){ return <label className={"block "+className}><span className="text-xs font-medium text-slate-500">{label}</span><div className="mt-1">{children}</div></label>; }
const inputCls = "w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-offset-0";
function Pill({children, tone="slate"}){ const t={slate:"bg-slate-100 text-slate-600",teal:"bg-teal-50 text-teal-700",navy:"text-white"};return <span className={"px-2 py-0.5 rounded-full text-xs font-medium "+(t[tone]||t.slate)} style={tone==="navy"?{backgroundColor:C.navy}:{}}>{children}</span>; }

/* ===================== LOGIN ===================== */
function Login({users, onLogin, onDefinirSenha}){
  const [login,setLogin]=useState(""); const [senha,setSenha]=useState(""); const [err,setErr]=useState("");
  const [modo,setModo]=useState("login");           // login | criar
  const [alvo,setAlvo]=useState(null);              // usuário em primeiro acesso
  const [s1,setS1]=useState(""); const [s2,setS2]=useState("");

  const go=()=>{
    const u=users.find(x=>x.login.toLowerCase()===login.trim().toLowerCase());
    if(!u){ setErr("Usuário não encontrado."); return; }
    if(u.senha!==senha){ setErr("Senha incorreta."); return; }
    if(u.precisaSenha){ setErr(""); setAlvo(u); setModo("criar"); setS1(""); setS2(""); return; }
    setErr(""); onLogin(u);
  };
  const criar=()=>{
    if(!senhaValida(s1)){ setErr("A senha deve ter exatamente 6 dígitos numéricos."); return; }
    if(s1!==s2){ setErr("As senhas não conferem."); return; }
    if(s1===SENHA_INICIAL){ setErr("Escolha uma senha diferente da inicial (123456)."); return; }
    if(senhaDuplicada(users, s1, alvo.id)){ setErr("Esta senha já está em uso por outro usuário. Escolha outra."); return; }
    const atualizado={...alvo, senha:s1, precisaSenha:false};
    onDefinirSenha(atualizado); setErr(""); onLogin(atualizado);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:`linear-gradient(135deg, ${C.mint}, #ffffff)`}}>
      <Card className="w-full max-w-md p-8">
        <div className="flex justify-center mb-6"><Logo size={40}/></div>
        <h1 className="text-center text-lg font-semibold text-slate-800">Proposta GT</h1>
        {modo==="login" ? <>
          <p className="text-center text-sm text-slate-500 mb-6">Acesse com seu usuário</p>
          <div className="space-y-3">
            <Field label="Usuário"><input className={inputCls} value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="ex.: gabriel"/></Field>
            <Field label="Senha"><input type="password" className={inputCls} value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••"/></Field>
            {err && <div className="text-sm text-rose-600">{err}</div>}
            <Btn className="w-full" onClick={go}>Entrar</Btn>
          </div>
          <p className="text-center text-xs text-slate-400 mt-6">No primeiro acesso, a senha é <b>123456</b>. Depois você criará sua senha de 6 dígitos.</p>
        </> : <>
          <p className="text-center text-sm text-slate-500 mb-1">Primeiro acesso</p>
          <p className="text-center text-xs text-slate-400 mb-6">Olá, {alvo?.nome?.split(" ")[0]}! Crie uma senha numérica de 6 dígitos.</p>
          <div className="space-y-3">
            <Field label="Nova senha (6 dígitos)"><input type="password" inputMode="numeric" maxLength={6} className={inputCls} value={s1} onChange={e=>setS1(e.target.value.replace(/\D/g,"").slice(0,6))} onKeyDown={e=>e.key==="Enter"&&criar()} placeholder="••••••"/></Field>
            <Field label="Confirmar senha"><input type="password" inputMode="numeric" maxLength={6} className={inputCls} value={s2} onChange={e=>setS2(e.target.value.replace(/\D/g,"").slice(0,6))} onKeyDown={e=>e.key==="Enter"&&criar()} placeholder="••••••"/></Field>
            {err && <div className="text-sm text-rose-600">{err}</div>}
            <Btn className="w-full" onClick={criar}><Check size={16}/>Criar senha e entrar</Btn>
            <button onClick={()=>{setModo("login");setErr("");setSenha("");}} className="w-full text-center text-xs text-slate-400 hover:text-slate-600">Voltar</button>
          </div>
        </>}
      </Card>
    </div>
  );
}

/* ===================== APP ===================== */

  const [users,setUsers]=useState([]);
  const [sind,setSind]=useState(null);
  const [uniformes,setUniformes]=useState(null);

    let cm=await sgetS(K.contratomodelos); if(!cm){ cm=CONTRATO_MODELOS; await ssetS(K.contratomodelos,cm); } setModelosCt(cm);
    let sess=await sget(K.sess); if(sess){ const found=u.find(x=>x.id===sess.userId); if(found) setMe(found);}

  const saveProps=(p)=>{setProps(p);ssetS(K.prop,p);};
  const saveClientes=(c)=>{setClientes(c);ssetS(K.cli,c);};

  const saveModelosCt=(m)=>{setModelosCt(m);ssetS(K.contratomodelos,m);};
  const login=(u)=>{setMe(u);sset(K.sess,{userId:u.id});};

          body * { visibility: hidden !important; }
          .print-area, .print-area * { visibility: visible !important; }
          .print-area { position: absolute !important; left: 0; top: 0; width: 100%; box-shadow: none !important; border: none !important; }
          .no-print { display: none !important; }
          .folha { page-break-before: always; }
          .quadro { break-inside: avoid; page-break-inside: avoid; }
          @page { size: A4; margin: 10mm; }
        }
        /* Compactação automática por folha (aplicada só quando a folha não cabe em 1 página) */
        .folha.fz-92 td,.folha.fz-92 th{font-size:9.2px!important;padding-top:1px!important;padding-bottom:1px!important;line-height:1.18!important}
        .folha.fz-85 td,.folha.fz-85 th{font-size:8.5px!important;padding-top:0!important;padding-bottom:0!important;line-height:1.12!important}
        .folha.fz-78 td,.folha.fz-78 th{font-size:7.8px!important;padding-top:0!important;padding-bottom:0!important;line-height:1.08!important}
        .folha.fz-72 td,.folha.fz-72 th{font-size:7.2px!important;padding-top:0!important;padding-bottom:0!important;line-height:1.04!important}
        .folha.fz-85,.folha.fz-78,.folha.fz-72{padding:14px!important}
      `}</style>
      {/* Sidebar */}
      <aside className="w-60 shrink-0 bg-white border-r border-slate-200 flex flex-col">
        <div className="p-4 border-b border-slate-100"><Logo/></div>
        <nav className="flex-1 p-3 space-y-1">
          {nav.map(n=>{const Ic=n.icon; const active=viewAtual===n.k;
            return <button key={n.k} onClick={()=>setView(n.k)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition ${active?"text-white":"text-slate-600 hover:bg-slate-50"}`}
              style={active?{backgroundColor:C.navy}:{}}>
              <Ic size={18}/>{n.label}</button>;})}
        </nav>
        <div className="p-3 border-t border-slate-100">
          <div className="flex items-center gap-2 px-2 py-2">
            <div className="w-8 h-8 rounded-full grid place-items-center text-white text-xs font-bold" style={{backgroundColor:C.teal}}>{me.nome.slice(0,2).toUpperCase()}</div>
            <div className="min-w-0 flex-1"><div className="text-sm font-medium text-slate-700 truncate">{me.nome.split(" ")[0]}</div>
              <div className="text-xs text-slate-400">{papelLabel}</div></div>
            <button onClick={logout} title="Sair" className="text-slate-400 hover:text-rose-500"><LogOut size={18}/></button>

      {/* Main */}
      <main className="flex-1 min-w-0 overflow-auto">
        <div className="p-6 max-w-[1180px] mx-auto">
          {viewAtual==="dash" && <Dashboard me={me} isAdmin={isAdmin} props={props} oss={oss} contratos={contratos} saveProps={saveProps} users={users}/>}
          {viewAtual==="prop" && <Propostas me={me} sind={sind} uniformes={uniformes} empresas={empresas} cndEmpresa={cndEmpresa} props={props} saveProps={saveProps} clientes={clientes} saveClientes={saveClientes}/>}
          {viewAtual==="os" && <OrdensServico me={me} isAdmin={isAdmin} props={props} oss={oss} saveOss={saveOss} users={users}/>}
          {viewAtual==="contratos" && <Contratos me={me} isAdmin={isAdmin} props={props} oss={oss} contratos={contratos} saveContratos={saveContratos} modelos={modelosCt} saveModelos={saveModelosCt}/>}
          {viewAtual==="sind" && <Sindicatos sind={sind} saveSind={saveSind} isAdmin={isAdmin} me={me} props={props} empresas={empresas}/>}
          {viewAtual==="unif" && <Uniformes uniformes={uniformes} saveUniformes={saveUniformes} sind={sind} isAdmin={isAdmin}/>}
          {viewAtual==="apres" && <Apresentacao me={me} users={users} saveUsers={saveUsers}/>}
          {viewAtual==="empresas" && <Empresas empresas={empresas} saveEmpresas={saveEmpresas} isAdmin={isAdmin}/>}
          {viewAtual==="cnds_asseio" && <CNDs me={me} grupo="asseio" empresas={empresas} cndEmpresa={cndEmpresa} saveCndEmpresa={saveCndEmpresa} isAdmin={isAdmin}/>}
          {viewAtual==="cnds_vigilancia" && <CNDs me={me} grupo="vigilancia" empresas={empresas} cndEmpresa={cndEmpresa} saveCndEmpresa={saveCndEmpresa} isAdmin={isAdmin}/>}
          {viewAtual==="rel" && <Relatorios me={me} isAdmin={isAdmin} props={props} oss={oss} contratos={contratos} users={users}/>}

        </div>
      </main>
    </div>
  );

/* ===================== DASHBOARD ===================== */
function Header({title, sub, right}){
  return <div className="flex items-end justify-between mb-5">
    <div><h1 className="text-xl font-bold text-slate-800">{title}</h1>{sub&&<p className="text-sm text-slate-500 mt-0.5">{sub}</p>}</div>
    {right}</div>;
}
function Kpi({label, value, icon:Ic, tone}){
  return <Card className="p-4"><div className="flex items-center justify-between">
    <div><div className="text-xs text-slate-500">{label}</div><div className="text-2xl font-bold text-slate-800 mt-1">{value}</div></div>
    <div className="w-10 h-10 rounded-lg grid place-items-center" style={{backgroundColor:tone||C.mint}}><Ic size={20} style={{color:C.navy}}/></div>
  </div></Card>;
}
/* ===================== GESTÃO: helpers compartilhados ===================== */
const MESES_PT=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
function mkMesLabel(key){ const [y,m]=key.split("-"); return MESES_PT[(parseInt(m)||1)-1]+"/"+y.slice(2); }
function ultimosMeses(n){ const arr=[]; const base=new Date(); for(let i=n-1;i>=0;i--){ const d=new Date(base.getFullYear(), base.getMonth()-i, 1); const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); arr.push({key, label:mkMesLabel(key)}); } return arr; }
function diasDesde(dateStr){ if(!dateStr) return null; const d=new Date(String(dateStr).slice(0,10)+"T00:00:00"); if(isNaN(d)) return null; return Math.floor((Date.now()-d.getTime())/86400000); }
const ptData=(d)=> d? String(d).slice(0,10).split("-").reverse().join("/") : "—";

function Donut({data, colors, height=200}){
  if(!data || data.length===0) return <Empty texto="Sem dados"/>;
  return <div style={{height}}><ResponsiveContainer><PieChart>
    <Pie data={data} dataKey="value" nameKey="name" innerRadius={"58%"} outerRadius={"82%"} paddingAngle={2}>
      {data.map((e,i)=><Cell key={i} fill={colors[i%colors.length]}/>)}
    </Pie><Tooltip formatter={(v)=>BRL(v)}/></PieChart></ResponsiveContainer></div>;
}
function LegendaVals({data, colors, money=true}){
  const tot=data.reduce((s,d)=>s+d.value,0)||1;
  return <div className="space-y-1.5 mt-1">{data.map((e,i)=>
    <div key={i} className="flex items-center justify-between text-xs">
      <span className="inline-flex items-center gap-1.5 text-slate-600"><span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor:colors[i%colors.length]}}/>{e.name}</span>
      <span className="text-slate-500">{money?BRL(e.value):e.value} <span className="text-slate-400">· {(e.value/tot*100).toFixed(0)}%</span></span>
    </div>)}</div>;
}
function Funil({stages}){
  const max=Math.max(...stages.map(s=>s.value),1);
  return <div className="space-y-2.5">{stages.map((s,i)=>{ const pct=Math.max(s.value/max*100, s.value>0?6:2);
    return <div key={i}>
      <div className="flex items-center justify-between text-xs mb-1">
        <span className="font-medium text-slate-600">{s.label}</span>
        <span className="text-slate-500">{s.count} · <b className="text-slate-700">{BRL(s.value)}</b></span>
      </div>
      <div className="h-7 rounded-md bg-slate-100 overflow-hidden">
        <div className="h-full rounded-md flex items-center justify-end pr-2 text-[11px] font-semibold text-white transition-all" style={{width:pct+"%", backgroundColor:s.color}}>{s.count>0?s.count:""}</div>
      </div>
    </div>; })}</div>;
}
function StepFlow({steps}){
  return <div className="flex items-stretch gap-2 flex-wrap">{steps.map((s,i)=>
    <React.Fragment key={i}>
      <div className="flex-1 min-w-[120px] rounded-lg border p-3 text-center" style={{borderColor:s.color+"55", backgroundColor:s.color+"10"}}>
        <div className="text-2xl font-bold" style={{color:s.color}}>{s.value}</div>
        <div className="text-[11px] text-slate-500 mt-0.5">{s.label}</div>
        {s.sub!=null && <div className="text-[11px] text-slate-400">{s.sub}</div>}
      </div>
      {i<steps.length-1 && <div className="self-center text-slate-300"><ChevronRight size={18}/></div>}
    </React.Fragment>)}</div>;
}

/* ===================== DASHBOARD ===================== */
function Dashboard({me, isAdmin, props, oss=[], contratos=[], saveProps, users}){
  const [scope,setScope]=useState(isAdmin?"all":"me");
  const [periodo,setPeriodo]=useState("12m"); // 12m | ano | tudo
  const [tipo,setTipo]=useState("todas");     // todas | normais | extras
  const anoAtual=new Date().getFullYear();
  const inPeriodo=(d)=>{ if(periodo==="tudo") return true; if(periodo==="ano") return String(d||"").slice(0,4)===String(anoAtual);
    const lim=new Date(); lim.setMonth(lim.getMonth()-11); lim.setDate(1); return new Date(String(d||"1970-01-01").slice(0,10)+"T00:00:00")>=lim; };
  const tipoOk=(p)=> tipo==="todas"? true : tipo==="extras"? !!p.extra : !p.extra;
  const base = useMemo(()=> props.filter(p=> (scope==="me"? p.consultorId===me.id : true) && inPeriodo(p.criadoEm) && tipoOk(p)), [props,scope,periodo,tipo,me.id]);

  const fechadas = base.filter(p=>p.status==="Fechada");
  const perdidas = base.filter(p=>p.status==="Perdida");
  const abertas = base.filter(p=>p.status==="Rascunho"||p.status==="Enviada");
  const mrr = fechadas.reduce((s,p)=>s+p.valorMensalTotal,0);
  const pipeline = abertas.reduce((s,p)=>s+p.valorMensalTotal,0);   // mensal (abertas)
  const globalFechado = fechadas.reduce((s,p)=>s+p.valorGlobal,0);
  const decididas = fechadas.length+perdidas.length;
  const conv = decididas? fechadas.length/decididas*100 : 0;
  const ticket = fechadas.length? mrr/fechadas.length : 0;          // ticket médio MENSAL
  const valorContratado = contratos.reduce((s,c)=>s+(c.valorMensal||0),0);

  // Funil comercial
  const stCount=(st)=>base.filter(p=>p.status===st);
  const sumM=(arr)=>arr.reduce((s,p)=>s+p.valorMensalTotal,0);
  const stages=[
    {label:"Rascunho", count:stCount("Rascunho").length, value:sumM(stCount("Rascunho")), color:C.gray},
    {label:"Enviada", count:stCount("Enviada").length, value:sumM(stCount("Enviada")), color:C.teal},
    {label:"Fechada", count:fechadas.length, value:mrr, color:C.navy},
  ];

  // Evolução mensal
  const meses = useMemo(()=> ultimosMeses(periodo==="ano"? (new Date().getMonth()+1) : 12), [periodo]);
  const serie = meses.map(mn=>{ const doMes=base.filter(p=>(p.criadoEm||"").slice(0,7)===mn.key);
    const fMes=doMes.filter(p=>p.status==="Fechada");
    return { label:mn.label, criadas:doMes.length, fechado:fMes.reduce((s,p)=>s+p.valorMensalTotal,0), mrr:fMes.reduce((s,p)=>s+p.valorMensalTotal,0) }; });

  // Ranking consultores
  const ranking = useMemo(()=>{ const m={};
    base.forEach(p=>{ const k=p.consultorNome||"—"; (m[k]=m[k]||{nome:k,total:0,fechadas:0,perdidas:0,global:0,mrr:0});
      const o=m[k]; o.total++; if(p.status==="Fechada"){o.fechadas++; o.global+=p.valorGlobal; o.mrr+=p.valorMensalTotal;} if(p.status==="Perdida") o.perdidas++; });
    return Object.values(m).map(o=>({...o, conv:(o.fechadas+o.perdidas)?o.fechadas/(o.fechadas+o.perdidas)*100:0})).sort((a,b)=>b.mrr-a.mrr);
  },[base]);
  const maxMrrRank = Math.max(...ranking.map(r=>r.mrr),1);

  // Mix
  const segMix=[["asseio","Asseio"],["vigilancia","Vigilância"],["misto","Misto"]]
    .map(([k,l])=>({name:l, value:fechadas.filter(p=>(p.segmento||"")===k).reduce((s,p)=>s+p.valorMensalTotal,0)})).filter(d=>d.value>0);
  const segColors=[C.navy,C.teal,C.gray];
  const regMix=[["FPOLIS","Florianópolis"],["BC","Litoral Norte"]]
    .map(([k,l])=>({name:l, value:fechadas.filter(p=>p.regiao===k).reduce((s,p)=>s+p.valorMensalTotal,0)})).filter(d=>d.value>0);
  const regColors=[C.navy,C.teal];

  // Funil de execução (operações)
  const fechIds=new Set(fechadas.map(p=>p.id));
  const osDeFech=oss.filter(o=>fechIds.has(o.propostaId));
  const osEnviadas=osDeFech.filter(o=>o.status==="Enviada");
  const ctsBase=contratos.filter(c=> fechIds.has(c.propostaId));

  // Pendências
  const pendentesAlt = props.filter(p=>p.precoAltTipo==="reducao" && p.precoAltAuth==="pendente");
  const autorizar=(id)=> saveProps && saveProps(props.map(p=>p.id===id?{...p, precoAltAuth:"autorizado", precoAltAutorizadoPor:me.nome, precoAltAutorizadoEm:today()}:p));
  const fechadasSemOS = fechadas.filter(p=> !oss.some(o=>o.propostaId===p.id));
  const osSemContrato = oss.filter(o=> o.status==="Enviada" && !contratos.some(c=>c.osId===o.id));
  const enviadasParadas = base.filter(p=> p.status==="Enviada" && (diasDesde(p.atualizadoEm||p.criadoEm)||0)>15)
    .sort((a,b)=>(diasDesde(b.atualizadoEm||b.criadoEm)||0)-(diasDesde(a.atualizadoEm||a.criadoEm)||0));

  const tabBtn=(k,l)=> <button key={k} onClick={()=>setPeriodo(k)} className={`px-3 py-1.5 rounded-md text-sm font-medium ${periodo===k?"text-white":"text-slate-600"}`} style={periodo===k?{backgroundColor:C.navy}:{}}>{l}</button>;

  return (
    <div>
      <Header title="Dashboard" sub={"Visão executiva do comercial · valores mensais"+(tipo==="extras"?" · Propostas Extras":tipo==="normais"?" · Propostas Normais":"")}
        right={<div className="flex gap-2 flex-wrap">
          <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">{tabBtn("12m","12 meses")}{tabBtn("ano",anoAtual)}{tabBtn("tudo","Tudo")}</div>
          <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">
            {[["todas","Todas"],["normais","Normais"],["extras","Extras"]].map(([k,l])=><button key={k} onClick={()=>setTipo(k)} className={`px-3 py-1.5 rounded-md text-sm font-medium ${tipo===k?"text-white":"text-slate-600"}`} style={tipo===k?{backgroundColor:C.navy}:{}}>{l}</button>)}
          </div>
          {isAdmin && <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">
            {[["all","Setor"],["me","Eu"]].map(([k,l])=><button key={k} onClick={()=>setScope(k)} className={`px-3 py-1.5 rounded-md text-sm font-medium ${scope===k?"text-white":"text-slate-600"}`} style={scope===k?{backgroundColor:C.navy}:{}}>{l}</button>)}
          </div>}
        </div>}/>

      {/* KPIs principais — 3 em cima, 3 embaixo, todos em base MENSAL */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-5">
        <Kpi label="Carteira recorrente (MRR)" value={BRL(mrr)} icon={Wallet} tone={C.mint}/>
        <Kpi label="Pipeline em aberto (mensal)" value={BRL(pipeline)} icon={Clock} tone="#E7F0F5"/>
        <Kpi label="Ticket médio mensal" value={BRL(ticket)} icon={FileText} tone={C.mint}/>
        <Kpi label="Taxa de fechamento" value={conv.toFixed(0)+"%"} icon={ShieldCheck} tone="#E7F0F5"/>
        <Kpi label="Propostas no período" value={base.length} icon={BarChart3} tone={C.mint}/>
        <Kpi label="Contratos · mensal" value={contratos.length+" · "+BRL(valorContratado)} icon={FileSignature} tone="#E7F0F5"/>
      </div>

      {/* Funil + Mix */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
        <Card className="p-4">
          <div className="text-sm font-semibold text-slate-700 mb-1">Funil comercial</div>
          <div className="text-[11px] text-slate-400 mb-3">Propostas por etapa (qtd · valor mensal). {perdidas.length>0 && <>Perdidas no período: <b>{perdidas.length}</b> ({BRL(sumM(perdidas))}).</>}</div>
          <Funil stages={stages}/>
        </Card>
        <Card className="p-4">
          <div className="text-sm font-semibold text-slate-700 mb-1">Carteira por segmento</div>
          <div className="text-[11px] text-slate-400 mb-2">Mensal fechado · Asseio × Vigilância</div>
          <Donut data={segMix} colors={segColors} height={170}/>
          <LegendaVals data={segMix} colors={segColors}/>
        </Card>
        <Card className="p-4">
          <div className="text-sm font-semibold text-slate-700 mb-1">Carteira por região</div>
          <div className="text-[11px] text-slate-400 mb-2">Mensal fechado · Florianópolis × Litoral Norte</div>
          <Donut data={regMix} colors={regColors} height={170}/>
          <LegendaVals data={regMix} colors={regColors}/>
        </Card>
      </div>

      {/* Evolução mensal */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <Card className="p-4">

            <th className="text-center py-2 font-medium">Fechadas</th>

            <td className="py-2.5 text-center"><span className="text-xs font-semibold" style={{color:r.conv>=50?C.navy:C.gray}}>{r.conv.toFixed(0)}%</span></td>
            <td className="py-2.5 pl-3">
              <div className="flex items-center justify-end gap-2">
                <div className="hidden sm:block w-24 h-2 rounded-full bg-slate-100 overflow-hidden"><div className="h-full rounded-full" style={{width:(r.mrr/maxMrrRank*100)+"%", backgroundColor:C.navy}}/></div>
                <span className="font-semibold text-slate-800 w-28 text-right">{BRL(r.mrr)}</span>

      {/* Funil de execução */}

        <StepFlow steps={[
          {label:"Propostas fechadas", value:fechadas.length, color:C.navy},
          {label:"OS geradas", value:osDeFech.length, color:C.teal, sub: fechadas.length? Math.round(osDeFech.length/fechadas.length*100)+"% das fechadas":null},
          {label:"OS enviadas", value:osEnviadas.length, color:C.teal},

      {/* Pendências e alertas */}

          <div className="text-[11px] text-slate-400 mb-3">Itens que pedem atenção da gestão.</div>
          <div className="space-y-2">
            <AlertRow tone="amber" n={enviadasParadas.length} txt="Propostas enviadas há mais de 15 dias sem desfecho"/>

}
function AlertRow({tone, n, txt}){
  const tones={amber:"bg-amber-50 text-amber-700 border-amber-200", sky:"bg-sky-50 text-sky-700 border-sky-200", teal:"bg-teal-50 text-teal-700 border-teal-200", rose:"bg-rose-50 text-rose-700 border-rose-200"};
  const dim = n===0;
  return <div className={`flex items-center gap-3 rounded-lg border px-3 py-2 ${dim?"bg-slate-50 border-slate-100":tones[tone]}`}>
    <span className={`text-lg font-bold w-8 text-center ${dim?"text-slate-300":""}`}>{n}</span>
    <span className={`text-xs ${dim?"text-slate-400":""}`}>{txt}</span>
  </div>;
}
function Empty({texto}){ return <div className="text-center py-10 text-slate-400 text-sm">{texto}</div>; }

/* ===================== SINDICATOS ===================== */
function Sindicatos({sind, saveSind, isAdmin, me, props=[], empresas=[]}){
  const [seg,setSeg]=useState("asseio");
  const lista = sind[seg]||[];
  const [reg,setReg]=useState("FPOLIS");
  const [exIdx,setExIdx]=useState(lista.length-1);
  const idx = Math.min(exIdx, lista.length-1);
  const ex = lista[idx] || lista[lista.length-1];
  const dados = ex.regioes[reg];
  const refs = dados.refs||{};
  const [busca,setBusca]=useState("");
  const [confExc,setConfExc]=useState(null);
  const funcoes = (dados.funcoes||[]).filter(f=>f.tab.toLowerCase().includes(busca.toLowerCase()));
  const trocaSeg=(s)=>{ setSeg(s); setExIdx((sind[s]||[]).length-1); setBusca(""); };

  const novoExercicio=()=>{
    const ult=lista[lista.length-1];
    const ano=ult.exercicio+1;
    const clone=JSON.parse(JSON.stringify(ult));
    clone.exercicio=ano; clone.vigenciaInicio=`${ano}-01-01`; clone.criadoEm=today(); clone.criadoPor=me.nome;
    const novoSeg=[...lista,clone]; const novo={...sind,[seg]:novoSeg}; saveSind(novo); setExIdx(novoSeg.length-1);
  };
  // Propostas que usam este exercício/segmento (bloqueiam exclusão)
  const propsVinculadas = (props||[]).filter(p=>{
    const segs = p.segmentos || [p.segmento];
    if(!segs.includes(seg)) return false;
    const exsItens = (p.itens||[]).filter(it=>(it.segmento||p.segmento)===seg).map(it=>it.exercicio);
    return exsItens.includes(ex.exercicio) || p.exercicioRef===ex.exercicio;
  });
  // Só exclui exercícios criados depois do base (idx>0), o último da lista, sem propostas vinculadas
  const podeExcluirEx = isAdmin && idx>0 && idx===lista.length-1 && propsVinculadas.length===0;
  const excluirExercicio=()=>{
    if(!podeExcluirEx) return;
    setConfExc({ titulo:"Excluir exercício", msg:`Excluir o exercício ${ex.exercicio} do segmento ${seg==="asseio"?"Asseio":"Vigilância"}? Esta ação não pode ser desfeita.`,
      acao:()=>{ const novoSeg=lista.filter((_,i)=>i!==idx); saveSind({...sind,[seg]:novoSeg}); setExIdx(novoSeg.length-1); } });
  };
  const baseDe=(t)=>{ const m=(t||"").search(/\d/); return m<0? t.trim() : t.slice(0,m).trim(); };
  const editNormativo=(fidx, value)=>{
    const novo=JSON.parse(JSON.stringify(sind));
    const arr=novo[seg][idx].regioes[reg].funcoes;
    const base=baseDe(arr[fidx].tab);
    const novoNorm=parseFloat(String(value).replace(",","."))||0;
    arr.forEach(f=>{
      if(baseDe(f.tab)===base){
        f.normativo=novoNorm;
        f.sal=Math.round(novoNorm*(f.fator||1)*100)/100;
        const prof=SEED[reg].funcoes.find(p=>p.t===f.tab);
        if(prof) f.preco=Math.round(computePosto(prof, reg, 0, {sal:f.sal}).p1*100)/100;
      }
    });
    saveSind(novo);
  };
  const editRef=(grupo, chave, value)=>{
    const novo=JSON.parse(JSON.stringify(sind));
    novo[seg][idx].regioes[reg].refs[grupo][chave]=parseFloat(value)||0;
    saveSind(novo);
  };
  const editEmpresa=(fidx, empresaId)=>{
    const novo=JSON.parse(JSON.stringify(sind));
    novo[seg][idx].regioes[reg].funcoes[fidx].empresaId=empresaId; saveSind(novo);
  };
  const editavel = isAdmin && idx===lista.length-1;
  const temRefs = refs.va_sindlimp || refs.va_sindvig || refs.transporte;

  return (
    <div>
      <ConfirmDialog pend={confExc} onClose={()=>setConfExc(null)}/>
      <Header title="Sindicatos" sub="Salário normativo por categoria, vale-alimentação e vale-transporte — por segmento e exercício"
        right={isAdmin && <div className="flex gap-2">
          {idx>0 && idx===lista.length-1 && <Btn variant="ghost" onClick={excluirExercicio} disabled={!podeExcluirEx}><Trash2 size={16}/>Excluir exercício</Btn>}
          <Btn variant="soft" onClick={novoExercicio}><Plus size={16}/>Novo exercício (reajuste)</Btn>
        </div>}/>

      {/* seletor de segmento */}
      <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1 mb-4 w-fit">
        {[["asseio","Asseio"],["vigilancia","Vigilância"]].map(([k,l])=>
          <button key={k} onClick={()=>trocaSeg(k)} className={`px-4 py-1.5 rounded-md text-sm font-medium ${seg===k?"text-white":"text-slate-600"}`} style={seg===k?{backgroundColor:C.navy}:{}}>{l}</button>)}
      </div>

      <div className="flex flex-wrap items-center gap-3 mb-4">
        <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">
          {["FPOLIS","BC"].map(r=><button key={r} onClick={()=>setReg(r)} className={`px-3 py-1.5 rounded-md text-sm font-medium ${reg===r?"text-white":"text-slate-600"}`} style={reg===r?{backgroundColor:C.navy}:{}}>{r==="FPOLIS"?"Grande Fpolis":"Litoral Norte"}</button>)}
        </div>
        <div className="flex items-center gap-2 text-sm">
          <History size={16} className="text-slate-400"/>
          <select value={idx} onChange={e=>setExIdx(parseInt(e.target.value))} className="px-3 py-1.5 rounded-lg border border-slate-300 text-sm bg-white">
            {lista.map((s,i)=><option key={i} value={i}>Exercício {s.exercicio} — vigência {s.vigenciaInicio}</option>)}
          </select>
        </div>
        {editavel ? <Pill tone="teal">Editável (exercício vigente)</Pill> : <Pill>Somente leitura (histórico)</Pill>}
      </div>

      {isAdmin && idx>0 && idx===lista.length-1 && propsVinculadas.length>0 &&
        <div className="mb-4 text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-lg px-4 py-2">
          O exercício {ex.exercicio} não pode ser excluído: há {propsVinculadas.length} proposta(s) vinculada(s) com estes valores.
        </div>}

      {seg==="vigilancia" && (dados.funcoes||[]).length===0 &&
        <div className="mb-4 text-sm text-slate-600 bg-amber-50 border border-amber-100 rounded-lg px-4 py-3">
          Segmento <b>Vigilância</b> ainda sem tabelas cadastradas. As funções (vigilante patrimonial, etc.) e seus valores serão importados quando você fornecer a Planilha de Custos da Vigilância. O vínculo de CND's e o histórico por exercício já estão prontos.
        </div>}

      {temRefs && <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
        <Card className="p-4">
          <div className="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2"><Utensils size={16} style={{color:C.navy}}/>Vale-alimentação (unitário)</div>
          {refs.va_sindlimp && <><div className="text-xs text-slate-500 mb-2">SINDLIMP — limpeza/zeladoria/portaria</div>
            {Object.entries(refs.va_sindlimp).map(([h,v])=>
              <RefRow key={h} label={h} value={v} edit={editavel} onChange={x=>editRef("va_sindlimp",h,x)}/>)}</>}
          {refs.va_sindvig && <><div className="text-xs text-slate-500 mt-3 mb-2">SINDVIG — vigia</div>
            {Object.entries(refs.va_sindvig).map(([h,v])=>
              <RefRow key={h} label={h} value={v} edit={editavel} onChange={x=>editRef("va_sindvig",h,x)}/>)}</>}
        </Card>
        <Card className="p-4">
          <div className="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2"><Bus size={16} style={{color:C.navy}}/>Vale-transporte</div>
          <div className="text-xs text-slate-500 mb-2">Tarifa de referência (diário = tarifa × 2)</div>
          {refs.transporte && Object.entries(refs.transporte).map(([h,v])=>
            <RefRow key={h} label={h} value={v} edit={editavel} onChange={x=>editRef("transporte",h,x)}/>)}
        </Card>
        <Card className="p-4">
          <div className="text-sm font-semibold text-slate-700 mb-2">Como funciona o histórico</div>
          <p className="text-xs text-slate-500 leading-relaxed">Cada exercício congela os valores vigentes. Ao sair o reajuste anual, crie um <b>novo exercício</b> e atualize aqui — as propostas já emitidas mantêm os valores da data em que foram geradas; novas propostas usam o exercício vigente.</p>
          <div className="mt-3 text-xs text-slate-400">Criado por {ex.criadoPor} em {ex.criadoEm}</div>
        </Card>
      </div>}

      {(dados.funcoes||[]).length>0 && <Card className="p-0 overflow-hidden">
        <div className="p-4 flex items-center justify-between border-b border-slate-100">
          <div className="text-sm font-semibold text-slate-700">Salário normativo por categoria <span className="font-normal text-slate-400">— Piso 220h editável (verde); Salário Base = Piso × fator da carga</span></div>
          <div className="relative"><Search size={15} className="absolute left-2.5 top-2.5 text-slate-400"/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar função…" className="pl-8 pr-3 py-1.5 rounded-lg border border-slate-300 text-sm"/></div>
        </div>
        <div className="overflow-auto max-h-[420px]">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-500 text-xs sticky top-0">
              <tr><th className="text-left px-4 py-2 font-medium">Tipo de serviço</th>
              <th className="text-left px-4 py-2 font-medium">Empresa</th>
              <th className="text-center px-4 py-2 font-medium">Sindicato VA</th>
              <th className="text-right px-4 py-2 font-medium">Salário normativo (Piso 220h)</th>
              <th className="text-right px-4 py-2 font-medium">Salário Base (Linha A)</th>
              <th className="text-right px-4 py-2 font-medium">Preço/posto (ref.)</th></tr>
            </thead>
            <tbody>
              {funcoes.map((f,i)=>{ const realIdx=dados.funcoes.indexOf(f); const salBase=(f.normativo!=null&&f.fator!=null)? f.normativo*f.fator : f.sal; const empAtual=f.empresaId||empresaDefaultDe(f.tab); return (
                <tr key={i} className="border-t border-slate-50 hover:bg-slate-50/50">
                  <td className="px-4 py-2.5 text-slate-700">{f.tab}</td>
                  <td className="px-4 py-2.5">
                    {editavel
                      ? <select value={empAtual} onChange={e=>editEmpresa(realIdx,e.target.value)} className="px-2 py-1 rounded-lg border border-slate-300 text-sm bg-white max-w-[150px]">
                          {empresas.map(em=><option key={em.id} value={em.id}>{empLabel(em)}</option>)}
                        </select>
                      : <Pill>{empLabel(empById(empresas,empAtual))}</Pill>}
                  </td>
                  <td className="px-4 py-2.5 text-center"><Pill tone={f.sind==="VIG"?"teal":"slate"}>{f.sind==="VIG"?"SINDVIG":"SINDLIMP"}</Pill></td>
                  <td className="px-4 py-2.5 text-right font-medium text-slate-800">
                    {editavel? <input type="number" step="0.01" value={f.normativo!=null?f.normativo:f.sal} onChange={e=>editNormativo(realIdx,e.target.value)} className="w-28 text-right px-2 py-1 rounded border border-emerald-300 bg-emerald-50"/> : BRL(f.normativo!=null?f.normativo:f.sal)}
                  </td>
                  <td className="px-4 py-2.5 text-right text-slate-600">{BRL(salBase)}</td>
                  <td className="px-4 py-2.5 text-right text-slate-500">{BRL(f.preco)}</td>
                </tr>);})}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-slate-200 bg-slate-50 font-semibold sticky bottom-0">
                <td className="px-4 py-2.5 text-slate-700" colSpan={5}>TOTAL — soma dos preços por posto ({funcoes.length} funç{funcoes.length===1?"ão":"ões"}) · conferência externa</td>
                <td className="px-4 py-2.5 text-right" style={{color:C.navy}}>{BRL(funcoes.reduce((s,f)=>s+(f.preco||0),0))}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </Card>}
    </div>
  );
}
function RefRow({label, value, edit, onChange}){
  return <div className="flex items-center justify-between py-1.5 border-b border-slate-50 last:border-0">
    <span className="text-sm text-slate-600">{label}</span>
    {edit? <input type="number" step="0.01" value={value} onChange={e=>onChange(e.target.value)} className="w-24 text-right px-2 py-1 rounded border border-slate-200 text-sm"/>
      : <span className="text-sm font-medium text-slate-800">{BRL(value)}</span>}
  </div>;
}

/* ===================== UNIFORMES ===================== */
function Uniformes({uniformes, saveUniformes, sind, isAdmin}){
  const dados = uniformes && uniformes.versoes ? uniformes : migrarUni(uniformes);
  const versoes = dados.versoes;
  const [verIdx,setVerIdx]=useState(versoes.length-1);
  const vidx = Math.min(verIdx, versoes.length-1);
  const ver = versoes[vidx];
  const uni = ver;                                  // dados da versão selecionada
  const kitsKeys = Object.keys(uni.kits);
  const editavel = isAdmin && vidx===versoes.length-1;   // só a versão vigente (última) é editável
  const [espFunc,setEspFunc]=useState("");
  const [espVal,setEspVal]=useState("");
  const [novaVig,setNovaVig]=useState("");
  const [confExc,setConfExc]=useState(null);

  const saveVer=(nv)=>{ const n=JSON.parse(JSON.stringify(dados)); n.versoes[vidx]=nv; saveUniformes(n); };
  const upItem=(kk,idx,patch)=>{ const nv=JSON.parse(JSON.stringify(uni)); nv.kits[kk].itens[idx]={...nv.kits[kk].itens[idx],...patch}; saveVer(nv); };
  const addItemKit=(kk)=>{ const nv=JSON.parse(JSON.stringify(uni)); nv.kits[kk].itens.push({item:"Novo item",anual:1,valor:0}); saveVer(nv); };
  const rmItemKit=(kk,idx)=>{ const nv=JSON.parse(JSON.stringify(uni)); nv.kits[kk].itens.splice(idx,1); saveVer(nv); };
  const setVinc=(cat,kk)=>{ const nv=JSON.parse(JSON.stringify(uni)); nv.vinculo[cat]=kk; saveVer(nv); };
  const catsDoKit=(kk)=> CATEGORIAS_UNIF.filter(c=>uni.vinculo[c]===kk);

  const todasFuncoes = (()=>{ const set=new Set();
    ["asseio","vigilancia"].forEach(seg=>{ const l=(sind&&sind[seg])||[]; const ex=l[l.length-1];
      ["FPOLIS","BC"].forEach(r=> ((ex&&ex.regioes&&ex.regioes[r]&&ex.regioes[r].funcoes)||[]).forEach(f=>set.add(f.tab))); });
    return [...set].sort(); })();
  const addEsp=()=>{ const v=parseFloat(String(espVal).replace(",","."))||0; if(!espFunc||v<=0) return;
    const nv=JSON.parse(JSON.stringify(uni)); nv.especificos=(nv.especificos||[]).filter(e=>e.funcao!==espFunc); nv.especificos.push({funcao:espFunc, mensal:v});
    saveVer(nv); setEspFunc(""); setEspVal(""); };
  const rmEsp=(funcao)=>{ const nv=JSON.parse(JSON.stringify(uni)); nv.especificos=(nv.especificos||[]).filter(e=>e.funcao!==funcao); saveVer(nv); };

  // novo reajuste: cria uma versão (cópia da última) com nova data de vigência
  const ultima = versoes[versoes.length-1];
  const criarReajuste=()=>{
    if(!novaVig){ return; }
    if(versoes.some(v=>v.vigencia===novaVig)){ return; }
    const nova={ vigencia:novaVig, criadoEm:today(), criadoPor:undefined,
      kits:JSON.parse(JSON.stringify(ultima.kits)), vinculo:JSON.parse(JSON.stringify(ultima.vinculo)), especificos:JSON.parse(JSON.stringify(ultima.especificos||[])) };
    const n=JSON.parse(JSON.stringify(dados)); n.versoes.push(nova); n.versoes.sort((a,b)=>String(a.vigencia).localeCompare(String(b.vigencia)));
    saveUniformes(n); setNovaVig(""); setVerIdx(n.versoes.length-1);
  };
  const podeExcluirVer = isAdmin && versoes.length>1 && vidx===versoes.length-1;
  const excluirReajuste=()=>{ if(!podeExcluirVer) return;
    setConfExc({ titulo:"Excluir reajuste", msg:`Excluir a tabela de uniformes com vigência ${fmtData(ver.vigencia)}? Esta ação não pode ser desfeita. Propostas que usaram esta vigência mantêm os valores salvos.`,
      acao:()=>{ const n=JSON.parse(JSON.stringify(dados)); n.versoes.splice(vidx,1); saveUniformes(n); setVerIdx(n.versoes.length-1); } }); };

  const inp="w-full px-2 py-1.5 rounded-lg border border-slate-300 text-sm disabled:bg-slate-50";
  return (
    <div>
      <ConfirmDialog pend={confExc} onClose={()=>setConfExc(null)}/>
      <Header title="Uniformes" sub="Custo mensal por kit = valor unitário × quantidade anual ÷ 12 — com histórico de preços por vigência"
        right={isAdmin && <div className="flex gap-2">
          {podeExcluirVer && <Btn variant="ghost" onClick={excluirReajuste}><Trash2 size={16}/>Excluir reajuste</Btn>}
        </div>}/>

      {/* Barra de vigência / histórico de preços */}
      <Card className="p-3 mb-4">
        <div className="flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2 text-sm">
            <History size={16} className="text-slate-400"/>
            <span className="text-slate-500">Vigência dos preços:</span>
            <select value={vidx} onChange={e=>setVerIdx(parseInt(e.target.value))} className="px-3 py-1.5 rounded-lg border border-slate-300 text-sm bg-white">
              {versoes.map((v,i)=><option key={i} value={i}>{fmtData(v.vigencia)}{i===versoes.length-1?" (vigente)":""}</option>)}
            </select>
          </div>
          {editavel ? <Pill tone="teal">Editável (vigência atual)</Pill> : <Pill>Somente leitura (histórico)</Pill>}
          {isAdmin && <div className="flex items-center gap-2 ml-auto">
            <span className="text-[11px] text-slate-400">Novo reajuste a partir de:</span>
            <input type="date" value={novaVig} onChange={e=>setNovaVig(e.target.value)} min={ultima.vigencia} className="px-2 py-1.5 rounded-lg border border-slate-300 text-sm"/>
            <Btn variant="soft" onClick={criarReajuste} disabled={!novaVig || versoes.some(v=>v.vigencia===novaVig)}><Plus size={16}/>Criar reajuste</Btn>
          </div>}
        </div>
        <div className="text-[11px] text-slate-400 mt-2">Um reajuste cria uma nova tabela de preços a partir da data informada, copiando a vigente. As propostas já emitidas mantêm os valores da vigência usada na época — mesmo que sejam alteradas depois.</div>
      </Card>

      <div className="grid lg:grid-cols-2 gap-4 mb-4">
        {kitsKeys.map(kk=>{ const kit=uni.kits[kk]; const total=uniMensal(kit);
          return <Card key={kk} className="p-4">
            <div className="flex items-center justify-between mb-1">
              <div className="text-sm font-semibold text-slate-700 inline-flex items-center gap-2"><Shirt size={16} style={{color:C.navy}}/>{kit.nome}</div>
              <Pill tone="teal">{BRL(total)}/mês</Pill>
            </div>
            <div className="text-[11px] text-slate-400 mb-2">Aplica-se a: {catsDoKit(kk).join(", ")||"—"}</div>
            <table className="w-full text-sm">
              <thead className="text-[11px] text-slate-400"><tr>
                <th className="text-left font-medium py-1">Item</th><th className="text-center font-medium w-16">Qtd/ano</th>
                <th className="text-right font-medium w-24">Valor unit.</th><th className="text-right font-medium w-24">Mensal</th>{editavel&&<th className="w-8"></th>}</tr></thead>
              <tbody>
                {kit.itens.map((it,i)=>{ const mensal=(Number(it.valor)||0)*(Number(it.anual)||0)/12;
                  return <tr key={i} className="border-t border-slate-50">
                    <td className="py-1 pr-2">{editavel? <input value={it.item} onChange={e=>upItem(kk,i,{item:e.target.value})} className={inp}/> : it.item}</td>
                    <td className="py-1 text-center">{editavel? <input type="number" min="0" value={it.anual} onChange={e=>upItem(kk,i,{anual:parseFloat(e.target.value)||0})} className="w-14 text-center px-1 py-1 rounded border border-slate-200"/> : it.anual}</td>
                    <td className="py-1 text-right">{editavel? <input type="number" min="0" step="0.01" value={it.valor} onChange={e=>upItem(kk,i,{valor:parseFloat(e.target.value)||0})} className="w-20 text-right px-1 py-1 rounded border border-slate-200"/> : BRL(it.valor)}</td>
                    <td className="py-1 text-right font-medium text-slate-700">{BRL(mensal)}</td>
                    {editavel&&<td className="py-1 text-right"><button onClick={()=>rmItemKit(kk,i)} className="text-rose-400 hover:text-rose-600"><Trash2 size={14}/></button></td>}
                  </tr>;})}
                <tr className="border-t border-slate-200 font-semibold"><td className="py-1.5">TOTAL</td><td></td><td></td><td className="text-right" style={{color:C.navy}}>{BRL(total)}</td>{editavel&&<td></td>}</tr>
              </tbody>
            </table>
            {editavel && <button onClick={()=>addItemKit(kk)} className="mt-2 text-xs text-slate-500 inline-flex items-center gap-1 hover:text-slate-700"><Plus size={13}/>Adicionar item</button>}
          </Card>;
        })}
      </div>

      <Card className="p-4 mb-4">
        <div className="text-sm font-semibold text-slate-700 mb-1">Vínculo de funções (categoria → kit)</div>
        <div className="text-[11px] text-slate-400 mb-3">Define qual kit cada categoria de função recebe. Todas as cargas horárias da categoria herdam o valor.</div>
        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-2">
          {CATEGORIAS_UNIF.map(cat=> <div key={cat} className="flex items-center justify-between gap-2 rounded-lg border border-slate-200 px-3 py-2">
            <span className="text-sm text-slate-600">{cat}</span>
            {editavel? <select value={uni.vinculo[cat]||""} onChange={e=>setVinc(cat,e.target.value)} className="px-2 py-1 rounded-lg border border-slate-300 text-sm bg-white">
              {kitsKeys.map(kk=><option key={kk} value={kk}>{uni.kits[kk].nome}</option>)}</select>
              : <Pill>{uni.kits[uni.vinculo[cat]]?.nome||"—"}</Pill>}
          </div>)}
        </div>
      </Card>

      <Card className="p-4">
        <div className="text-sm font-semibold text-slate-700 mb-1">Uniforme específico por função</div>
        <div className="text-[11px] text-slate-400 mb-3">Sobrepõe o kit da categoria para uma função específica (custo mensal direto).</div>
        {editavel && <div className="flex flex-wrap items-end gap-2 mb-3">
          <label className="flex-1 min-w-[200px]"><span className="text-[11px] text-slate-400">Função</span>
            <select value={espFunc} onChange={e=>setEspFunc(e.target.value)} className={inp}>
              <option value="">Selecione…</option>{todasFuncoes.map(t=><option key={t} value={t}>{t}</option>)}</select></label>
          <label className="w-40"><span className="text-[11px] text-slate-400">Custo mensal (R$)</span>
            <input type="number" min="0" step="0.01" value={espVal} onChange={e=>setEspVal(e.target.value)} placeholder="0,00" className={inp}/></label>
          <Btn variant="soft" onClick={addEsp}><Plus size={16}/>Incluir</Btn>
        </div>}
        {(uni.especificos||[]).length===0 ? <div className="text-xs text-slate-400">Nenhum uniforme específico cadastrado.</div>
          : <div className="space-y-1">
            {(uni.especificos||[]).map((e,i)=><div key={i} className="flex items-center justify-between rounded-lg border border-slate-100 px-3 py-2 text-sm">
              <span className="text-slate-600">{e.funcao}</span>
              <span className="inline-flex items-center gap-3"><b className="text-slate-700">{BRL(e.mensal)}/mês</b>
                {editavel && <button onClick={()=>rmEsp(e.funcao)} className="text-rose-400 hover:text-rose-600"><Trash2 size={15}/></button>}</span>
            </div>)}
          </div>}
      </Card>
    </div>
  );
}
function Empresas({empresas, saveEmpresas, isAdmin}){
  const [edit,setEdit]=useState(null);

    <div>

        right={<div className="flex gap-2"><Btn variant="ghost" onClick={()=>setEdit(null)}>Cancelar</Btn><Btn onClick={salvar} disabled={!edit.razaoSocial.trim()}><Save size={16}/>Salvar</Btn></div>}/>

          <Field label="Regime de tributação"><input className={inp} value={edit.regime} onChange={e=>up({regime:e.target.value})}/></Field>

          <Field label="Número"><input className={inp} value={edit.numero} onChange={e=>up({numero:e.target.value})}/></Field>
          <Field label="Bairro"><input className={inp} value={edit.bairro} onChange={e=>up({bairro:e.target.value})}/></Field>

          <Field label="CEP"><input className={inp} value={edit.cep} onChange={e=>up({cep:e.target.value})}/></Field>
          <Field label="Responsável"><input className={inp} value={edit.responsavel} onChange={e=>up({responsavel:e.target.value})}/></Field>

          <Field label="Diretor (assinatura)"><input className={inp} value={edit.diretor} onChange={e=>up({diretor:e.target.value})}/></Field>
          <Field label="Cargo (assinatura)"><input className={inp} value={edit.cargo} onChange={e=>up({cargo:e.target.value})}/></Field>

  );

function Propostas({me, sind, uniformes, empresas, cndEmpresa, props, saveProps, clientes, saveClientes}){
  const [tab,setTab]=useState("lista"); // lista | nova | editar | ver
  const [atual,setAtual]=useState(null);
  const [novaExtra,setNovaExtra]=useState(false);
  const [confExc,setConfExc]=useState(null);
  const excluir=(p)=>{ setConfExc({ titulo:"Excluir proposta", msg:`Excluir a proposta ${p.numero} (${p.razaoSocial})? Esta ação não pode ser desfeita.`,
    acao:()=>{ saveProps(props.filter(x=>x.id!==p.id)); setTab("lista"); setAtual(null); } }); };
  return (
    <div>
      <ConfirmDialog pend={confExc} onClose={()=>setConfExc(null)}/>
      {tab==="lista" && <PropLista props={props} me={me} onNova={()=>{setAtual(null);setNovaExtra(false);setTab("nova");}} onNovaExtra={()=>{setAtual(null);setNovaExtra(true);setTab("nova");}} onVer={p=>{setAtual(p);setTab("ver");}} onEditar={p=>{setAtual(p);setTab("editar");}} onExcluir={excluir}/>}
      {tab==="nova" && <PropEditor me={me} sind={sind} uniformes={uniformes} empresas={empresas} cndEmpresa={cndEmpresa} clientes={clientes} saveClientes={saveClientes} extra={novaExtra}
        onCancel={()=>setTab("lista")} onSalvar={(p)=>{const novo=[p,...props]; saveProps(novo); setAtual(p); setTab("ver");}}/>}
      {tab==="editar" && atual && <PropEditor me={me} sind={sind} uniformes={uniformes} empresas={empresas} cndEmpresa={cndEmpresa} propEdit={atual} clientes={clientes} saveClientes={saveClientes}
        onCancel={()=>setTab("ver")} onSalvar={(p)=>{const novo=props.map(x=>x.id===p.id?p:x); saveProps(novo); setAtual(p); setTab("ver");}}/>}
      {tab==="ver" && atual && <PropView prop={atual} empresas={empresas} onVoltar={()=>setTab("lista")}
        onEditar={()=>setTab("editar")} onExcluir={()=>excluir(atual)}
        onSolicitarAut={()=>{const at={...atual, precoAltAuth:"pendente", precoAltSolicitadoEm:today()}; const novo=props.map(x=>x.id===atual.id?at:x); saveProps(novo); setAtual(at);}}
        onStatus={(st)=>{const novo=props.map(x=>x.id===atual.id?{...x,status:st}:x); saveProps(novo); setAtual({...atual,status:st});}}/>}
    </div>
  );
}

          <th className="text-left px-4 py-2.5 font-medium">Consultor</th><th className="text-left px-4 py-2.5 font-medium">Região</th>

          <td className="px-4 py-3 font-medium text-slate-700 cursor-pointer" onClick={()=>onVer(p)}>{p.razaoSocial}</td>
          <td className="px-4 py-3 text-slate-500">{p.consultorNome.split(" ")[0]}</td>
          <td className="px-4 py-3 text-slate-500">{p.regiao==="FPOLIS"?"Fpolis":"BC"}</td>
          <td className="px-4 py-3 text-right text-slate-600">{BRL(p.valorMensalTotal)}</td>
